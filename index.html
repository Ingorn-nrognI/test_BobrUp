function startGame() {
  document.getElementById("menu").style.display = "none";
  document.getElementById("game").style.display = "block";
  
  // Запуск игры
  initGame();
}
  
function openRooms() {
  document.getElementById("roomsModal").style.display = "block";
  loadRooms();
}

function closeRooms() {
  document.getElementById("roomsModal").style.display = "none";
}
  async function loadRooms() {
  const list = document.getElementById("roomsList");
  list.innerHTML = "Загрузка...";

  const snapshot = await db.collection("rooms").get();

  list.innerHTML = "";

  if (snapshot.empty) {
    list.innerHTML = "Нет комнат";
    return;
  }

  snapshot.forEach(doc => {
    const room = doc.data();

    const div = document.createElement("div");
    div.className = "roomItem";
    div.innerText = `Комната (${room.players.length}/3)`;

    div.onclick = () => joinRoom(doc.id);

    list.appendChild(div);
  });
}
  async function createRoom() {
  const name = document.getElementById("nickname").innerText;

  const room = {
    players: [name],
    status: "waiting",
    created: Date.now()
  };

  const docRef = await db.collection("rooms").add(room);

  joinRoom(docRef.id);
}
  async function joinRoom(roomId) {
  const name = document.getElementById("nickname").innerText;
  const roomRef = db.collection("rooms").doc(roomId);

  const doc = await roomRef.get();
  const room = doc.data();

  if (room.players.length >= 3) {
    alert("Комната заполнена");
    return;
  }

  if (!room.players.includes(name)) {
    room.players.push(name);
  }

  await roomRef.update({
    players: room.players
  });

  openRoomScreen(roomId);
}
  function openRoomScreen(roomId) {
  const list = document.getElementById("roomsList");
  list.innerHTML = "Ожидание игроков...";

  const roomRef = db.collection("rooms").doc(roomId);

  roomRef.onSnapshot(doc => {
    const room = doc.data();

    list.innerHTML = `
      Игроки: ${room.players.length}/3 <br><br>
      ${room.players.join("<br>")}
    `;

    if (room.players.length === 3) {
      startMultiplayerGame(roomId);
    }
  });
}
  function startMultiplayerGame(roomId) {
  closeRooms();

async function openLeaderboard() {
  const contentDiv = document.getElementById("leaderboardContent");
  contentDiv.innerHTML = "Загрузка...";

  try {
    const leaderboardRef = db.collection("leaderboard");
    const snapshot = await leaderboardRef.orderBy("score", "desc").limit(10).get();

    contentDiv.innerHTML = "";

    if (snapshot.empty) {
      contentDiv.innerHTML = "<p>Пока нет рекордов</p>";
      return;
    }

    let index = 1;
    snapshot.forEach((doc) => {
      const p = doc.data();
      const row = document.createElement("div");
      row.textContent = `${index}. ${p.name} — ${p.score}`;
      contentDiv.appendChild(row);
      index++;
    });

  } catch (e) {
    contentDiv.innerHTML = "Ошибка загрузки";
    console.error(e);
  }

  document.getElementById("leaderboardModal").style.display = "block";
}

function closeLeaderboard() {
  document.getElementById("leaderboardModal").style.display = "none";
}

async function saveBestScore(score) {
  const name = document.getElementById("nickname").innerText;

  try {
    // Сначала ищем игрока по имени
    const snapshot = await db.collection("leaderboard")
                             .where("name", "==", name)
                             .get();

    if (!snapshot.empty) {
      // Игрок уже есть, проверяем рекорд
      snapshot.forEach((doc) => {
        const data = doc.data();
        if (score > data.score) {
          doc.ref.update({ score: score, date: Date.now() });
        }
      });
    } else {
      // Игрока нет → создаем запись
      await db.collection("leaderboard").add({
        name: name,
        score: score,
        date: Date.now()
      });
    }
  } catch (e) {
    console.error("Ошибка записи:", e);
  }
}

function initGame() {
  
  function fullResetMenu() {

  menu.removeAttribute("style");

  const bottomBar = document.querySelector(".bottom-bar");
  if (bottomBar) bottomBar.removeAttribute("style");

  // Принудительно применяем CSS класс для восстановления
  menu.classList.add("menu-reset");
  
  // Минимальная задержка (один кадр) - незаметно для пользователя
  requestAnimationFrame(() => {
    menu.classList.remove("menu-reset");
  });
}
  // Защита от повторного запуска
  if (window.gameInitialized) return;
  window.gameInitialized = true;

  const ctx = canvas.getContext("2d");

  // === НАСТРОЙКИ ДОРОГИ ===
  const roadLeft = 0.15;   // левый край дороги
  const roadRight = 0.85;  // правый край дороги
  const laneOffset = 0.2;  // расстояние от центра до боковых полос

  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const log = new Image();
  log.src = "log.png";
  log.onerror = () => console.log("Ошибка загрузки log.png");

  // Игрок
  let player = {
    x: canvas.width / 2 - 30,
    y: canvas.height - 150,
    width: 60,
    height: 60,
    dy: 0,
    gravity: 0.6,
jump: -13,
    grounded: true,
    gameOver: false,
    gameOverText: "Ты врезался!"
  };

  // Полосы на дороге
  const roadCenter = (roadLeft + roadRight) / 2;
  const lane1 = canvas.width * (roadCenter - laneOffset);
  const lane2 = canvas.width * roadCenter;
  const lane3 = canvas.width * (roadCenter + laneOffset);

  // Устанавливаем текущему игроку среднюю полосу
  player.x = lane2 - player.width / 2;

 // Обработчик изменения размера экрана
  window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    
    // Пересчитываем координаты полос
    const newLane2 = canvas.width * roadCenter;
    
    // Обновляем позицию игрока
    player.x = newLane2 - player.width / 2;
    
    // Если меню видимо, принудительно восстанавливаем размер
    const menu = document.getElementById("menu");
    if (menu.style.display === "flex") {
      menu.style.width = "100%";
      menu.style.height = "100%";
    }
  });

  // Препятствия
let obstacles1 = [];

let obstacles3 = [];
let gameSpeed = 0.008;
let lastTime = performance.now();
let deltaTime = 1; // 👈 ДОБАВИТЬ ЭТО
let score = 0;
let gameStarted = false;   // игра ещё не началась
let startTimer = 3;        // таймер
let showStartText = true;  // показывать ли START
// Флаги для каждой полосы (кто в режиме наблюдателя)
let isWatching1 = false;  // левая полоса
let isWatching2 = false;  // средняя полоса (игрок)
let isWatching3 = false;  // правая полоса
  
  // Для хранения бревна, в которое врезался игрок
let frozenObstacle = null;
  
  // Кнопки для Game Over

  let watchBtn = {x: 0, y: 0, w: 0, h: 0};

    // Кнопка выхода в правом нижнем углу (для наблюдателя)
  let exitToMenuBtn = {x: 0, y: 0, w: 0, h: 0};
  let showExitButton = false;

  if (!isWatching1) obstacles1.push({ x: lane1, z: 1 });
}

function spawnObstacle2() {
  if (!isWatching2) obstacles2.push({ x: lane2, z: 1, passed: false });
}

function spawnObstacle3() {
  if (!isWatching3) obstacles3.push({ x: lane3, z: 1 });
}
function jump() {

    // Обработчики событий
    canvas.addEventListener("click", (e) => {

    const rect = canvas.getBoundingClientRect();

    if (showExitButton &&

      // Очищаем интервалы
      clearInterval(spawnInterval1);

  canvas.addEventListener("touchstart", (e) => {
    e.preventDefault();
    const touch = e.touches[0];
    const rect = canvas.getBoundingClientRect();
    const x = touch.clientX - rect.left;
    const y = touch.clientY - rect.top;

    if (showExitButton && 
        x > exitToMenuBtn.x && x < exitToMenuBtn.x + exitToMenuBtn.w &&
        y > exitToMenuBtn.y && y < exitToMenuBtn.y + exitToMenuBtn.h) {
      clearInterval(spawnInterval1);

      clearInterval(spawnInterval3);
      window.gameInitialized = false;
      fullResetMenu();
      return;
    }

    if (player.gameOver) {
      if (x > watchBtn.x && x < watchBtn.x + watchBtn.w &&
          y > watchBtn.y && y < watchBtn.y + watchBtn.h) {

  function updatePlayer() {
  // ЕСЛИ ИГРОК НАБЛЮДАЕТ - НЕ ОБНОВЛЯЕМ ЕГО ФИЗИКУ
  if (!player.gameOver && gameStarted) {
    player.dy += player.gravity * deltaTime;
player.y += player.dy * deltaTime;
  }
  
  if (player.y >= canvas.height - 150) {
    player.y = canvas.height - 150;
    player.dy = 0;
    player.grounded = true;
  }
}

  function updateObstacles1() {
  if (!isWatching1 && gameStarted) {
    obstacles1.forEach(o => {
      o.z -= (gameSpeed + (1 - o.z) * 0.015) * deltaTime;
    });
    obstacles1 = obstacles1.filter(o => o.z > 0);
  }
}

function updateObstacles2() {
  if (!isWatching2 && gameStarted) {
    obstacles2.forEach(o => {
      o.z -= (gameSpeed + (1 - o.z) * 0.015) * deltaTime;
    });
    obstacles2 = obstacles2.filter(o => o.z > 0);
  }
}

function updateObstacles3() {
  if (!isWatching3 && gameStarted) {
    obstacles3.forEach(o => {
      o.z -= (gameSpeed + (1 - o.z) * 0.015) * deltaTime;
    });
    obstacles3 = obstacles3.filter(o => o.z > 0);
  }
}

  function drawRoad() {
    ctx.fillStyle = "#555";
    ctx.beginPath();
    ctx.moveTo(canvas.width * roadLeft, canvas.height);
    ctx.lineTo(canvas.width * roadRight, canvas.height);
    ctx.lineTo(canvas.width * (roadRight - 0.2), 0);
    ctx.lineTo(canvas.width * (roadLeft + 0.2), 0);
    ctx.closePath();
    ctx.fill();
  }

  function drawObstacles1() {
    obstacles1.forEach(o => {
      let scale = 1 - o.z;
      let size = 60 * scale;
      let x = canvas.width / 2 + (lane1 - canvas.width / 2) * scale - size/2;
      let y = 100 + (canvas.height - 200) * scale;

      ctx.drawImage(log, x, y, size, size);
      
      if (!player.gameOver && scale > 0.85 &&
          player.x < x + size && player.x + player.width > x &&
          player.y < y + size && player.y + player.height > y) {
        player.gameOver = true;
      }
    });
  }

  function drawObstacles2() {
  // Рисуем замороженное бревно
  if (frozenObstacle) {
    ctx.drawImage(log, frozenObstacle.x, frozenObstacle.y, frozenObstacle.size, frozenObstacle.size);
  }
  
  if (!player.gameOver && !isWatching2) {
    for (let i = 0; i < obstacles2.length; i++) {
      let o = obstacles2[i];
      let scale = 1 - o.z;
      let size = 60 * scale;
      let x = canvas.width / 2 + (lane2 - canvas.width / 2) * scale - size/2;
      let y = 100 + (canvas.height - 200) * scale;

      ctx.drawImage(log, x, y, size, size);
      
      // ПРОВЕРКА СТОЛКНОВЕНИЯ (СНАЧАЛА!)
      if (scale > 0.85 &&
          player.x < x + size && player.x + player.width > x &&
          player.y < y + size && player.y + player.height > y) {
        
        frozenObstacle = { x: x, y: y, size: size };
        player.frozenX = player.x;
        player.frozenY = player.y;
        obstacles2 = [];
        player.gameOverText = "Ты врезался! Счёт: " + score;
        saveBestScore(score);
        player.gameOver = true;
        return; // Выходим, очки за это бревно НЕ начисляем
      }
      
      // НАЧИСЛЕНИЕ ОЧКОВ (только если не врезался)
      if (!o.passed && o.z < 0.2 && !player.gameOver) {
        o.passed = true;
        
        // Очки только когда игрок в воздухе (перепрыгнул)
        if (!player.grounded) {
          score++;
        }
      }
    }
  }
}
  
  function drawObstacles3() {
    obstacles3.forEach(o => {
      let scale = 1 - o.z;
      let size = 60 * scale;
      let x = canvas.width / 2 + (lane3 - canvas.width / 2) * scale - size/2;
      let y = 100 + (canvas.height - 200) * scale;

      ctx.drawImage(log, x, y, size, size);
      
      if (!player.gameOver && scale > 0.85 &&
          player.x < x + size && player.x + player.width > x &&
          player.y < y + size && player.y + player.height > y) {
        player.gameOver = true;
      }
    });
  }

  function drawPlayer() {
  // Если есть замороженное бревно и игрок в режиме наблюдателя - рисуем на замороженной позиции
  if (frozenObstacle && isWatching2) {
    ctx.drawImage(beaver, player.frozenX || player.x, player.frozenY || player.y, player.width, player.height);
  } else {
    ctx.drawImage(beaver, player.x, player.y, player.width, player.height);
  }
}
  function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
  ctx.fill();
}
// Сначала функция drawExitButton (отдельно)
function drawExitButton() {
  if (!showExitButton) return;
  
  const btnWidth = 100;
  const btnHeight = 45;
  const padding = 20;
  
  const btnX = canvas.width - btnWidth - padding;
  const btnY = canvas.height - btnHeight - padding;
  
  exitToMenuBtn = { x: btnX, y: btnY, w: btnWidth, h: btnHeight };
  
  ctx.fillStyle = "#dc3545";
  ctx.beginPath();
  ctx.moveTo(btnX + 10, btnY);
  ctx.lineTo(btnX + btnWidth - 10, btnY);
  ctx.quadraticCurveTo(btnX + btnWidth, btnY, btnX + btnWidth, btnY + 10);
  ctx.lineTo(btnX + btnWidth, btnY + btnHeight - 10);
  ctx.quadraticCurveTo(btnX + btnWidth, btnY + btnHeight, btnX + btnWidth - 10, btnY + btnHeight);
  ctx.lineTo(btnX + 10, btnY + btnHeight);
  ctx.quadraticCurveTo(btnX, btnY + btnHeight, btnX, btnY + btnHeight - 10);
  ctx.lineTo(btnX, btnY + 10);
  ctx.quadraticCurveTo(btnX, btnY, btnX + 10, btnY);
  ctx.closePath();
  ctx.fill();
  
  ctx.fillStyle = "#fff";
  ctx.font = "bold 16px Arial";
  ctx.textAlign = "center";
  ctx.fillText("Выйти", btnX + btnWidth/2, btnY + btnHeight/2 + 5);
}

// Потом функция drawGameOver (отдельно)
function drawGameOver() {
  // Фон (затемнение экрана)
  ctx.fillStyle = "rgba(0,0,0,0.5)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

    // ОВАЛЬНОЕ ОКНО
    const boxWidth = 300;
    const boxHeight = 180;
    const boxX = canvas.width / 2 - boxWidth / 2;
    const boxY = canvas.height / 2 - boxHeight / 2;

    // рисуем окно
    ctx.fillStyle = "rgba(0,0,0,0.7)";
    roundRect(ctx, boxX, boxY, boxWidth, boxHeight, 25);

    // ТЕКСТ
    ctx.fillStyle = "#fff";
    ctx.font = "22px Arial";
    ctx.textAlign = "center";
    ctx.fillText(player.gameOverText, canvas.width/2, boxY + 50);

    // КНОПКИ
    const btnWidth = 110;
    const btnHeight = 40;

    const watchX = boxX + 20;
    const watchY = boxY + 100;
    watchBtn = { x: watchX, y: watchY, w: btnWidth, h: btnHeight };

    ctx.fillStyle = "#28a745";
    roundRect(ctx, watchX, watchY, btnWidth, btnHeight, 15);
    ctx.fillStyle = "#fff";
    ctx.font = "16px Arial";
    ctx.fillText("Смотреть", watchX + btnWidth/2, watchY + 25);

    const exitX = boxX + boxWidth - btnWidth - 20;
    const exitY = watchY;
    exitBtn = { x: exitX, y: exitY, w: btnWidth, h: btnHeight };

    ctx.fillStyle = "#dc3545";
    roundRect(ctx, exitX, exitY, btnWidth, btnHeight, 15);
    ctx.fillStyle = "#fff";
    ctx.fillText("Выйти", exitX + btnWidth/2, exitY + 25);
  }

  function drawStartTimer() {
  ctx.fillStyle = "rgba(0,0,0,0.5)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "#fff";
  ctx.textAlign = "center";

  if (startTimer > 0) {
    ctx.font = "bold 80px Arial";
    ctx.fillText(startTimer, canvas.width / 2, canvas.height / 2);
  } else if (showStartText) {
    ctx.font = "bold 60px Arial";
    ctx.fillText("START", canvas.width / 2, canvas.height / 2);
  }
}
  function loop(currentTime) {
  deltaTime = (currentTime - lastTime) / 16.67; // нормализация под 60 FPS

// Защита от скачков FPS (и слишком маленьких, и слишком больших)
deltaTime = Math.min(2, Math.max(0.5, deltaTime));

  lastTime = currentTime;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawRoad();
    updatePlayer();
    updateObstacles1();
    updateObstacles2();
    updateObstacles3();
    drawObstacles1();
    drawObstacles2();
    drawObstacles3();
    drawPlayer();
    if (!gameStarted) {
  drawStartTimer();
}
    ctx.fillStyle = "#fff";
ctx.font = "20px Arial";
ctx.textAlign = "left";   // 👈 ВАЖНО: фикс выравнивания
ctx.fillText("Score: " + score, 20, 40);
    
    if (player.gameOver) {
      drawGameOver();
    }
    
    drawExitButton();
    
    if (gameStarted) {
  gameSpeed += 0.00001 * deltaTime;
}
    
    requestAnimationFrame(loop);
  }

  // Запуск спавна препятствий
  let spawnInterval1 = setInterval(spawnObstacle1, 1200);
  let spawnInterval2 = setInterval(spawnObstacle2, 1500);
  let spawnInterval3 = setInterval(spawnObstacle3, 1800);

    // Таймер перед стартом
  let countdown = setInterval(() => {
    startTimer--;
    
    if (startTimer < 0) {
      clearInterval(countdown);
      
      // ОЧИЩАЕМ ВСЕ БРЕВНА
      obstacles1 = [];
      obstacles2 = [];
      obstacles3 = [];
      
      gameStarted = true;
      showStartText = false;
    }
  }, 1000);
  
  // Запуск игрового цикла
  requestAnimationFrame(loop);
}
</script>
