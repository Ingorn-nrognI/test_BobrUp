<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu + Game</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #87CEEB;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* Верхняя панель */
.top-bar {
  display: flex;
  justify-content: space-between;
  padding: 15px;
  color: white;
  font-size: 18px;
}

.settings {
  cursor: pointer;
}

/* Центр */
.main {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 24px;
  color: white;
}

/* Нижнее меню */
.bottom-bar {
  position: fixed;
  bottom: 20px;           /* чуть выше края экрана */
  left: 50%;              /* центрируем по горизонтали */
  transform: translateX(-50%); /* сдвигаем в центр */
  width: 90%;             /* чуть меньше полной ширины */
  max-width: 600px;       /* ограничиваем для больших экранов */
  display: flex;
  justify-content: space-around; /* равномерно распределяем кнопки */
  background: rgba(0, 0, 0, 0.6); /* полупрозрачный черный */
  padding: 15px 20px;
  border-radius: 50px;     /* делает панель овальной */
  box-sizing: border-box;
  box-shadow: 0 4px 10px rgba(0,0,0,0.3); /* небольшая тень */
}

.bottom-btn {
  flex: 1;
  margin: 0 10px;          /* отступ между кнопками */
  padding: 12px 0;
  text-align: center;
  color: white;
  cursor: pointer;
  border-radius: 25px;      /* овальные кнопки */
  background: #444;         /* базовый цвет */
  font-weight: bold;
  transition: 0.2s;
}

.bottom-btn.play {
  background: #28a745;      /* зеленая кнопка Играть */
}

.bottom-btn:hover {
  background: #555;
}

.bottom-btn:last-child {
  border-right: none;
}

.play {
  background: #28a745;
  font-weight: bold;
}

/* Canvas для игры */
#game {
  display: none; /* скрыт пока не играем */
  background: #87CEEB;
}
</style>
</head>

<body>

<!-- МЕНЮ -->
<div id="menu">
  <div class="top-bar">
    <div id="nickname">Игрок</div>
    <div class="settings" onclick="openSettings()">⚙️</div>
  </div>

  <div class="main">Beaver Runner 🦫</div>

  <div class="bottom-bar">
    <div class="bottom-btn" onclick="openLeaderboard()">📊 Таблица</div>
    <div class="bottom-btn play" onclick="startGame()">▶ Играть</div>
    <div class="bottom-btn" onclick="openSkins()">🎨 Скины</div>
  </div>
</div>

<!-- Canvas для игры -->
<canvas id="game"></canvas>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
// Получаем ник из Telegram
if (window.Telegram && Telegram.WebApp) {
  const user = Telegram.WebApp.initDataUnsafe.user;
  if (user) {
    document.getElementById("nickname").innerText =
      user.username || user.first_name;
  }
}

// ========================
// КНОПКИ МЕНЮ
// ========================

function startGame() {
  document.getElementById("menu").style.display = "none";
  document.getElementById("game").style.display = "block";

  // Запуск игры
  initGame();
}

function openLeaderboard() {
  alert("Таблица лидеров");
}

function openSkins() {
  alert("Скины");
}

function openSettings() {
  let lang = prompt("Выбери язык: ru / en");
  if (lang === "en") {
    alert("Language switched to English");
  } else {
    alert("Язык: Русский");
  }
}

// ========================
// ИГРА
// ========================
function initGame() {
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");

  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  // Картинки
  const beaver = new Image();
  beaver.src = "beaver.png";

  const log = new Image();
  log.src = "log.png";

  // Игрок
  let player = {
    x: canvas.width / 2 - 30,
    y: canvas.height - 150,
    width: 60,
    height: 60,
    dy: 0,
    gravity: 0.8,
    jump: -15,
    grounded: true
  };

  // Полосы на дороге для трёх игроков
const lane1 = canvas.width * 0.35;
const lane2 = canvas.width * 0.5;
const lane3 = canvas.width * 0.65;

// Устанавливаем текущему игроку среднюю полосу
player.x = lane2;

  // Препятствия
  let obstacles1 = []; // препятствия для игрока 1
let obstacles2 = []; // препятствия для игрока 2
let obstacles3 = []; // препятствия для игрока 3
  let gameSpeed = 0.008;

  function spawnObstacle1() {
  obstacles1.push({ x: lane1, z: 1 });
}

function spawnObstacle2() {
  obstacles2.push({ x: lane2, z: 1 });
}

function spawnObstacle3() {
  obstacles3.push({ x: lane3, z: 1 });
}

  function jump() {
    if (player.grounded) {
      player.dy = player.jump;
      player.grounded = false;
    }
  }

  canvas.addEventListener("touchstart", (e) => { e.preventDefault(); jump(); });
  canvas.addEventListener("click", jump);
  document.addEventListener("keydown", (e) => { if (e.code === "Space") jump(); });

  function updatePlayer() {
    player.dy += player.gravity;
    player.y += player.dy;
    if (player.y >= canvas.height - 150) {
      player.y = canvas.height - 150;
      player.dy = 0;
      player.grounded = true;
    }
  }

  function updateObstacles1() {
  obstacles1.forEach(o => {
    o.z -= gameSpeed + (1 - o.z) * 0.015;
  });
  obstacles1 = obstacles1.filter(o => o.z > 0);
}

function updateObstacles2() {
  obstacles2.forEach(o => {
    o.z -= gameSpeed + (1 - o.z) * 0.015;
  });
  obstacles2 = obstacles2.filter(o => o.z > 0);
}

function updateObstacles3() {
  obstacles3.forEach(o => {
    o.z -= gameSpeed + (1 - o.z) * 0.015;
  });
  obstacles3 = obstacles3.filter(o => o.z > 0);
}

  function drawRoad() {
    ctx.fillStyle = "#555";
    ctx.beginPath();
ctx.moveTo(canvas.width * 0.15, canvas.height); // левый нижний угол — смещаем влево
ctx.lineTo(canvas.width * 0.85, canvas.height); // правый нижний угол — смещаем вправо
ctx.lineTo(canvas.width * 0.55, 0);             // правый верхний угол — немного сдвигаем влево
ctx.lineTo(canvas.width * 0.45, 0);             // левый верхний угол — немного сдвигаем вправо
    ctx.closePath();
    ctx.fill();
  }

  function drawObstacles1() {
  obstacles1.forEach(o => {
    let scale = 1 - o.z;
    let size = 60 * scale;
    let x = canvas.width / 2 + (lane1 - canvas.width / 2) * scale - size/2;
    let y = 100 + (canvas.height - 200) * scale;

    ctx.drawImage(log, x, y, size, size);
  });
}

function drawObstacles2() {
  obstacles2.forEach(o => {
    let scale = 1 - o.z;
    let size = 60 * scale;
    let x = canvas.width / 2 + (lane2 - canvas.width / 2) * scale - size/2;
    let y = 100 + (canvas.height - 200) * scale;

    ctx.drawImage(log, x, y, size, size);
  });
}

function drawObstacles3() {
  obstacles3.forEach(o => {
    let scale = 1 - o.z;
    let size = 60 * scale;
    let x = canvas.width / 2 + (lane3 - canvas.width / 2) * scale - size/2;
    let y = 100 + (canvas.height - 200) * scale;

    ctx.drawImage(log, x, y, size, size);
  });
}

  function drawPlayer() {
    ctx.drawImage(beaver, player.x, player.y, player.width, player.height);
  }

  function loop() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    drawRoad();
    updatePlayer();
    updateObstacles1();
updateObstacles2();
updateObstacles3();

drawObstacles1();
drawObstacles2();
drawObstacles3();
    drawPlayer();
    gameSpeed += 0.00001;
    requestAnimationFrame(loop);
  }

  setInterval(spawnObstacle1, 1200);
setInterval(spawnObstacle2, 1500);
setInterval(spawnObstacle3, 1800);
  loop();
}
</script>

</body>
</html>
