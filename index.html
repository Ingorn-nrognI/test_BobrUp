<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Beaver Run</title>
<style>
body {
    margin: 0;
    text-align: center;
    background: #87CEEB;
}
#menu {
    position: absolute;
    width: 100%;
    top: 30%;
}
button {
    padding: 15px 30px;
    font-size: 18px;
    margin: 10px;
}
canvas {
    display: none;
    margin: auto;
    background: lightgreen;
}
</style>
</head>
<body>

<div id="menu">
    <h1>🦫 Beaver Run</h1>
    <button onclick="startGame()">Играть</button>
</div>

<canvas id="game" width="400" height="600"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const menu = document.getElementById("menu");

let beaver = { x: 100, y: 500, vy: 0 };
let gravity = 0.6;
let gameOver = false;

let obstacles = [];
let speed = 5;

let score = 0;
let bestScore = localStorage.getItem("bestScore") || 0;

// картинки
let bg = new Image();
let beaverImg = new Image();
let logImg = new Image();

bg.src = "bg.png";
beaverImg.src = "beaver.png";
logImg.src = "log.png";

// запуск
function startGame() {
    menu.style.display = "none";
    canvas.style.display = "block";

    score = 0;
    speed = 5;
    gameOver = false;
    obstacles = [];
    beaver.y = 500;

    document.addEventListener("click", jump);
    spawnObstacle();
    update();
}

// прыжок
function jump() {
    if (beaver.y >= 500 && !gameOver) {
        beaver.vy = -12;
    }

    if (gameOver) {
        location.reload();
    }
}

// препятствия
function spawnObstacle() {
    if (gameOver) return;

    obstacles.push({
        x: canvas.width,
        y: 520,
        w: 50,
        h: 50,
        passed: false
    });

    setTimeout(spawnObstacle, 1400);
}

// столкновение
function collision(a, b) {
    return a.x < b.x + b.w &&
           a.x + 40 > b.x &&
           a.y < b.y + b.h &&
           a.y + 40 > b.y;
}

// игра
function update() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // фон
    if (bg.complete) {
        ctx.drawImage(bg, 0, 0, canvas.width, canvas.height);
    }

    // физика
    beaver.vy += gravity;
    beaver.y += beaver.vy;

    if (beaver.y > 500) {
        beaver.y = 500;
        beaver.vy = 0;
    }

    // бобёр
    if (beaverImg.complete) {
        ctx.drawImage(beaverImg, beaver.x, beaver.y, 50, 50);
    } else {
        ctx.fillStyle = "brown";
        ctx.fillRect(beaver.x, beaver.y, 40, 40);
    }

    // препятствия
    obstacles.forEach((o, i) => {
        o.x -= speed;

        // считаем очки
        if (!o.passed && o.x + o.w < beaver.x) {
            score++;
            o.passed = true;
        }

        // рисуем бревно
        if (logImg.complete) {
            ctx.drawImage(logImg, o.x, o.y, o.w, o.h);
        } else {
            ctx.fillStyle = "green";
            ctx.fillRect(o.x, o.y, o.w, o.h);
        }

        // столкновение
        if (collision(beaver, o)) {
            gameOver = true;

            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem("bestScore", bestScore);
            }
        }

        if (o.x < -50) obstacles.splice(i, 1);
    });

    // ускорение
    speed += 0.002;

    // текст
    ctx.fillStyle = "black";
    ctx.font = "20px Arial";
    ctx.fillText("Счёт: " + score, 10, 30);
    ctx.fillText("Рекорд: " + bestScore, 10, 60);

    // проигрыш
    if (gameOver) {
        ctx.fillStyle = "red";
        ctx.font = "30px Arial";
        ctx.fillText("Ты проиграл", 100, 250);
        ctx.font = "16px Arial";
        ctx.fillText("Нажми чтобы начать заново", 70, 300);
        return;
    }

    requestAnimationFrame(update);
}
</script>

</body>
</html>
