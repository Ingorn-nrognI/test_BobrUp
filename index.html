  async function checkWinner() {
    if (!currentRoomId || winnerProcessing) return;

    const roomRef = db.collection("rooms").doc(currentRoomId);

    try {
      const roomDoc = await roomRef.get();
      if (!roomDoc.exists) return;

      const roomData = roomDoc.data();
      if (!roomData?.gameState?.playersData) return;
      if (roomData.gameState.finished) return;

      const playersData = roomData.gameState.playersData;
      const pendingFinish = roomData.gameState.pendingFinish || null;

      const alivePlayers = Object.entries(playersData).filter(([_, p]) => {
        return p && p.alive === true && p.leftRoom !== true;
      });

      const allLosersSorted = Object.entries(playersData)
        .filter(([_, p]) => p && p.lost === true && p.leftRoom !== true)
        .sort((a, b) => Number(b[1].lostAt || 0) - Number(a[1].lostAt || 0));

      if (alivePlayers.length === 1) {
        const winnerId = alivePlayers[0][0];
        const winnerData = playersData[winnerId] || {};
        const winnerName = winnerData.name || roomData.playerNames?.[winnerId] || "Игрок";

        const loserEntries = allLosersSorted.filter(([pid]) => pid !== winnerId);

        if (
          pendingFinish &&
          pendingFinish.active === true &&
          pendingFinish.winnerId === winnerId
        ) {
          if (pendingFinish.resolved !== true) {
            return;
          }
        }

        winnerProcessing = true;

        const winnerScore =
          pendingFinish?.finalWinnerScore != null
            ? Number(pendingFinish.finalWinnerScore)
            : (winnerId === playerId ? score : Number(winnerData.score || 0));

        if (winnerId === playerId) {
          await saveBestScore(winnerScore);
        }

        const finalResults = [
          {
            place: 1,
            name: winnerName,
            score: winnerScore
          }
        ];

        if (loserEntries[0]) {
          finalResults.push({
            place: 2,
            name: loserEntries[0][1].name || roomData.playerNames?.[loserEntries[0][0]] || "Игрок",
            score: Number(loserEntries[0][1].score || 0)
          });
        }

        if (loserEntries[1]) {
          finalResults.push({
            place: 3,
            name: loserEntries[1][1].name || roomData.playerNames?.[loserEntries[1][0]] || "Игрок",
            score: Number(loserEntries[1][1].score || 0)
          });
        }

        const wrote = await safeFinishRoom(roomRef, {
          status: "finished",
          updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
          "gameState.finished": true,
          "gameState.started": false,
          "gameState.winner": winnerName,
          "gameState.results": finalResults,
          "gameState.pendingFinish": firebase.firestore.FieldValue.delete(),
          "gameState.exitRequested": firebase.firestore.FieldValue.delete(),
          "gameState.exitRequestedAt": firebase.firestore.FieldValue.delete(),
          [`gameState.playersData.${winnerId}.score`]: winnerScore
        }, "checkWinner.winner1alive");

        if (wrote === false) {
          const freshDoc = await roomRef.get();
          if (freshDoc.exists) {
            const freshRoom = freshDoc.data();
            if (freshRoom?.gameState?.finished && freshRoom?.gameState?.winner) {
              showEndGameModal({
                winner: freshRoom.gameState.winner,
                results: freshRoom.gameState.results
              });
            }
          }
          return;
        }

        await ensureCurrentMatchHistorySaved(currentRoomId, {
          ...roomData,
          status: "finished",
          gameState: {
            ...(roomData.gameState || {}),
            finished: true,
            winner: winnerName,
            results: finalResults
          }
        });

        showEndGameModal({
          winner: winnerName,
          results: finalResults
        });

        return;
      }

      if (alivePlayers.length === 0 && allLosersSorted.length > 0) {
        winnerProcessing = true;

        const drawResult = buildDrawResultIfNeeded(allLosersSorted, roomData, pendingFinish);

        if (drawResult) {
          for (const item of drawResult.results) {
            if (item.name === name) {
              await saveBestScore(item.score);
            }
          }

          const wrote = await safeFinishRoom(roomRef, {
            status: "finished",
            updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
            "gameState.finished": true,
            "gameState.started": false,
            "gameState.winner": drawResult.winnerLabel,
            "gameState.results": drawResult.results,
            "gameState.pendingFinish": firebase.firestore.FieldValue.delete(),
            "gameState.exitRequested": firebase.firestore.FieldValue.delete(),
            "gameState.exitRequestedAt": firebase.firestore.FieldValue.delete()
          }, "checkWinner.draw");

          if (wrote === false) {
            const freshDoc = await roomRef.get();
            if (freshDoc.exists) {
              const freshRoom = freshDoc.data();
              if (freshRoom?.gameState?.finished && freshRoom?.gameState?.winner) {
                showEndGameModal({
                  winner: freshRoom.gameState.winner,
                  results: freshRoom.gameState.results
                });
              }
            }
            return;
          }

          await ensureCurrentMatchHistorySaved(currentRoomId, {
            ...roomData,
            status: "finished",
            gameState: {
              ...(roomData.gameState || {}),
              finished: true,
              winner: drawResult.winnerLabel,
              results: drawResult.results
            }
          });

          showEndGameModal({
            winner: drawResult.winnerLabel,
            results: drawResult.results
          });

          return;
        }

        const winnerId = allLosersSorted[0][0];
        const winnerData = allLosersSorted[0][1] || {};
        const winnerName = winnerData.name || roomData.playerNames?.[winnerId] || "Игрок";

        const otherLosers = allLosersSorted.slice(1);
        const winnerScore = Number(winnerData.score || 0);

        if (winnerId === playerId) {
          await saveBestScore(winnerScore);
        }

        const finalResults = [
          {
            place: 1,
            name: winnerName,
            score: winnerScore
          }
        ];

        if (otherLosers[0]) {
          finalResults.push({
            place: 2,
            name: otherLosers[0][1].name || roomData.playerNames?.[otherLosers[0][0]] || "Игрок",
            score: Number(otherLosers[0][1].score || 0)
          });
        }

        if (otherLosers[1]) {
          finalResults.push({
            place: 3,
            name: otherLosers[1][1].name || roomData.playerNames?.[otherLosers[1][0]] || "Игрок",
            score: Number(otherLosers[1][1].score || 0)
          });
        }

        const wrote = await safeFinishRoom(roomRef, {
          status: "finished",
          updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
          "gameState.finished": true,
          "gameState.started": false,
          "gameState.winner": winnerName,
          "gameState.results": finalResults,
          "gameState.pendingFinish": firebase.firestore.FieldValue.delete(),
          "gameState.exitRequested": firebase.firestore.FieldValue.delete(),
          "gameState.exitRequestedAt": firebase.firestore.FieldValue.delete(),
          [`gameState.playersData.${winnerId}.score`]: winnerScore
        }, "checkWinner.allLost");

        if (wrote === false) {
          const freshDoc = await roomRef.get();
          if (freshDoc.exists) {
            const freshRoom = freshDoc.data();
            if (freshRoom?.gameState?.finished && freshRoom?.gameState?.winner) {
              showEndGameModal({
                winner: freshRoom.gameState.winner,
                results: freshRoom.gameState.results
              });
            }
          }
          return;
        }

        await ensureCurrentMatchHistorySaved(currentRoomId, {
          ...roomData,
          status: "finished",
          gameState: {
            ...(roomData.gameState || {}),
            finished: true,
            winner: winnerName,
            results: finalResults
          }
        });

        showEndGameModal({
          winner: winnerName,
          results: finalResults
        });
      }
    } catch (e) {
      console.error("Ошибка checkWinner:", e);
      winnerProcessing = false;
    }
  }

  function stepSimulation() {
    deltaTime = FIXED_STEP_MS / 16.67;

    updatePlayer();
    updateObstacles1();
    updateObstacles2();
    updateObstacles3();

    if (gameStarted) {
      gameSpeed += Number(sharedRace.speedGainPerTick || DEFAULT_SHARED_RACE.speedGainPerTick);

      spawnAccumulator1 += FIXED_STEP_MS;
      while (spawnAccumulator1 >= Number(sharedRace.leftSpawnIntervalMs || DEFAULT_SHARED_RACE.leftSpawnIntervalMs)) {
        spawnAccumulator1 -= Number(sharedRace.leftSpawnIntervalMs || DEFAULT_SHARED_RACE.leftSpawnIntervalMs);
        spawnObstacle1();
      }

      spawnAccumulator2 += FIXED_STEP_MS;
      while (spawnAccumulator2 >= Number(sharedRace.centerSpawnIntervalMs || DEFAULT_SHARED_RACE.centerSpawnIntervalMs)) {
        spawnAccumulator2 -= Number(sharedRace.centerSpawnIntervalMs || DEFAULT_SHARED_RACE.centerSpawnIntervalMs);
        spawnObstacle2();
      }

      spawnAccumulator3 += FIXED_STEP_MS;
      while (spawnAccumulator3 >= Number(sharedRace.rightSpawnIntervalMs || DEFAULT_SHARED_RACE.rightSpawnIntervalMs)) {
        spawnAccumulator3 -= Number(sharedRace.rightSpawnIntervalMs || DEFAULT_SHARED_RACE.rightSpawnIntervalMs);
        spawnObstacle3();
      }
    }
  }

  async function startGameFlow() {
    syncedCountdownStartedAtMs = null;

    if (currentRoomId) {
      startRoomPresence(currentRoomId);
      await touchRoomPresence(currentRoomId, { markAction: true });
    }
    startTimer = 3;
    showStartText = true;
    gameStarted = false;
    simulationTick = 0;
    lastTargetTick = 0;
    lastCountdownSecond = null;
    resetSpawnState();

    lastTime = performance.now();
    requestAnimationFrame(loop);

    try {
      await prepareGameAssets();
    } catch (e) {
      console.error("Ошибка загрузки ассетов:", e);
    }

    sharedRace = await ensureSharedRaceConfig(currentRoomId);
    gameSpeed = Number(sharedRace.speedBase || DEFAULT_SHARED_RACE.speedBase);
    lastSentSyncState = {
      positionRatio: null,
      velocityRatio: null,
      grounded: null,
      alive: null,
      lost: null,
      score: null,
      firstObstacleResolved: null,
      sentAt: 0
    };

    await markPlayerReadyForGame(currentRoomId);
    await touchRoomPresence(currentRoomId, { markAction: true });

    stopRoomReadyPoll();
    stopGameCountdownStartListener();

    const roomRef = db.collection("rooms").doc(currentRoomId);

    liveRoomStateListener = roomRef.onSnapshot(async (doc) => {
      if (!doc.exists || !currentRoomId) return;

      try {
        const room = doc.data();
        if (!room) return;

        latestGameRoomState = room;
        syncServerClockFromRoom(room);

        const sharedFromRoom = room.gameState?.sharedRace;
        if (sharedFromRoom?.centerSpawnIntervalMs) {
          sharedRace = {
            leftSpawnIntervalMs: Number(sharedFromRoom.leftSpawnIntervalMs || DEFAULT_SHARED_RACE.leftSpawnIntervalMs),
            centerSpawnIntervalMs: Number(sharedFromRoom.centerSpawnIntervalMs || DEFAULT_SHARED_RACE.centerSpawnIntervalMs),
            rightSpawnIntervalMs: Number(sharedFromRoom.rightSpawnIntervalMs || DEFAULT_SHARED_RACE.rightSpawnIntervalMs),
            speedBase: Number(sharedFromRoom.speedBase || DEFAULT_SHARED_RACE.speedBase),
            speedGainPerTick: Number(sharedFromRoom.speedGainPerTick || DEFAULT_SHARED_RACE.speedGainPerTick)
          };
        }

        const countdownStartedAt = getRoomTimeMs(room.gameState?.countdownStartedAt);

        if (!countdownStartedAt) {
          if (isCurrentClientRoomWriteDriver(room)) {
            await tryStartSyncedCountdown(currentRoomId);
          }
          return;
        }

        syncedCountdownStartedAtMs = countdownStartedAt;
        multiplayerStartInProgress = false;
      } catch (e) {
        console.error("Ошибка liveRoomStateListener:", e);
      }
    });

    roomReadyPollInterval = setInterval(async () => {
      if (!currentRoomId || syncedCountdownStartedAtMs) return;

      try {
        const doc = await roomRef.get();
        if (!doc.exists) return;

        const room = doc.data();
        if (!room) return;

        latestGameRoomState = room;
        syncServerClockFromRoom(room);

        const countdownStartedAt = getRoomTimeMs(room.gameState?.countdownStartedAt);

        if (!countdownStartedAt) {
          if (isCurrentClientRoomWriteDriver(room)) {
            await tryStartSyncedCountdown(currentRoomId);
          }
          return;
        }

        syncedCountdownStartedAtMs = countdownStartedAt;
      } catch (e) {
        console.error("Ошибка roomReadyPoll:", e);
      }
    }, 600);
  }

  function loop(currentTime) {
    const frameDeltaMs = Math.min(32, Math.max(0, currentTime - lastTime));
    lastTime = currentTime;
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (syncedCountdownStartedAtMs) {
      const nowMs = getSyncedServerNowMs();
      const countdownElapsedMs = nowMs - (syncedCountdownStartedAtMs + GAME_READY_BUFFER_MS);

      if (countdownElapsedMs < 0) {
        startTimer = 3;
        showStartText = true;
        gameStarted = false;
      } else if (countdownElapsedMs < 3000) {
        const currentSecond = Math.max(0, 3 - Math.floor(countdownElapsedMs / 1000));
        if (lastCountdownSecond !== currentSecond) {
          lastCountdownSecond = currentSecond;
        }

        startTimer = currentSecond;
        showStartText = true;
        gameStarted = false;
      } else {
        if (!gameStarted) {
          frozenObstacle = playerLost ? frozenObstacle : null;
          obstacles1 = [];
          obstacles2 = [];
          obstacles3 = [];
          gameSpeed = Number(sharedRace.speedBase || DEFAULT_SHARED_RACE.speedBase);
          gameStarted = true;
          showStartText = false;
          simulationTick = 0;
          lastTargetTick = 0;
          resetSpawnState();
          startSpawnIfNeeded();
        }

        const gameElapsedMs = nowMs - (syncedCountdownStartedAtMs + GAME_READY_BUFFER_MS + 3000);
        const targetTick = Math.max(0, Math.floor(gameElapsedMs / FIXED_STEP_MS));
        let ticksToSimulate = Math.max(0, targetTick - lastTargetTick);

        if (ticksToSimulate > 0) {
          const hardCap = Math.max(1, Math.ceil(frameDeltaMs / FIXED_STEP_MS) + 8);
          ticksToSimulate = Math.min(ticksToSimulate, hardCap);
        }

        for (let i = 0; i < ticksToSimulate; i++) {
          simulationTick++;
          stepSimulation();
        }

        lastTargetTick += ticksToSimulate;
      }
    }

    drawRoad();
    drawObstacles1();
    drawObstacles2();
    drawObstacles3();
    drawRemotePlayers();
    drawPlayer();

    if (!gameStarted) {
      drawStartTimer();
    }

    ctx.fillStyle = "#fff";
    ctx.font = "20px Arial";
    ctx.textAlign = "left";
    ctx.fillText("Score: " + score, 20, 40);

    if (player.gameOver && !endGameShown) {
      drawGameOver();
    }

    if (!endGameShown) {
      drawExitButton();
    }

    requestAnimationFrame(loop);
  }

  startGameFlow();
}
