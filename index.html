<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #87CEEB;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* Верхняя панель */
.top-bar {
  display: flex;
  justify-content: space-between;
  padding: 15px;
  color: white;
  font-size: 18px;
}

.settings {
  cursor: pointer;
}

/* Центр */
.main {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 24px;
  color: white;
}

/* Нижнее меню */
.bottom-bar {
  display: flex;
  background: #222;
}

.bottom-btn {
  flex: 1;
  padding: 15px;
  text-align: center;
  color: white;
  cursor: pointer;
  border-right: 1px solid #444;
}

.bottom-btn:last-child {
  border-right: none;
}

.play {
  background: #28a745;
  font-weight: bold;
}
</style>
</head>

<body>

<!-- Верх -->
<div class="top-bar">
  <div id="nickname">Игрок</div>
  <div class="settings" onclick="openSettings()">⚙️</div>
</div>

<!-- Центр -->
<div class="main">
  Beaver Runner 🦫
</div>

<!-- Низ -->
<div class="bottom-bar">
  <div class="bottom-btn" onclick="openLeaderboard()">📊 Таблица</div>
  <div class="bottom-btn play" onclick="startGame()">▶ Играть</div>
  <div class="bottom-btn" onclick="openSkins()">🎨 Скины</div>
</div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<script>
// Получаем ник из Telegram
if (window.Telegram && Telegram.WebApp) {
  const user = Telegram.WebApp.initDataUnsafe.user;

  if (user) {
    document.getElementById("nickname").innerText =
      user.username || user.first_name;
  }
}

// КНОПКИ

function startGame() {
  window.location.href = "game_bobrup.html";
}

function openLeaderboard() {
  alert("Таблица лидеров");
}

function openSkins() {
  alert("Скины");
}

function openSettings() {
  let lang = prompt("Выбери язык: ru / en");

  if (lang === "en") {
    alert("Language switched to English");
  } else {
    alert("Язык: Русский");
  }
}
</script>

</body>
</html>
