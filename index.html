<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Beaver Runner</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #87CEEB;
    }

    canvas {
      display: block;
      margin: 0 auto;
      background: #a3d977;
    }
  </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

canvas.width = 400;
canvas.height = 600;

// Загрузка картинок
const beaverImg = new Image();
beaverImg.src = "beaver.png";

const logImg = new Image();
logImg.src = "log.png";

// Игрок (бобёр)
let player = {
  x: 180,
  y: 450,
  width: 60,
  height: 60,
  dy: 0,
  gravity: 0.8,
  jumpPower: -15,
  grounded: true
};

// Брёвна
let logs = [];

// Генерация брёвен
function spawnLog() {
  logs.push({
    x: Math.random() * 300 + 50,
    y: -60,
    width: 50,
    height: 50,
    speed: 5
  });
}

// Прыжок
document.addEventListener("keydown", (e) => {
  if (e.code === "Space" && player.grounded) {
    player.dy = player.jumpPower;
    player.grounded = false;
  }
});

// Обновление игрока
function updatePlayer() {
  player.dy += player.gravity;
  player.y += player.dy;

  if (player.y >= 450) {
    player.y = 450;
    player.dy = 0;
    player.grounded = true;
  }
}

// Обновление брёвен
function updateLogs() {
  logs.forEach(log => {
    log.y += log.speed;
  });

  logs = logs.filter(log => log.y < canvas.height);
}

// Проверка столкновений
function checkCollision() {
  for (let log of logs) {
    if (
      player.x < log.x + log.width &&
      player.x + player.width > log.x &&
      player.y < log.y + log.height &&
      player.y + player.height > log.y
    ) {
      alert("Ты врезался!");
      location.reload();
    }
  }
}

// Рисование
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Бобёр (вид сзади)
  ctx.drawImage(beaverImg, player.x, player.y, player.width, player.height);

  // Брёвна
  logs.forEach(log => {
    ctx.drawImage(logImg, log.x, log.y, log.width, log.height);
  });
}

// Игровой цикл
function gameLoop() {
  updatePlayer();
  updateLogs();
  checkCollision();
  draw();
  requestAnimationFrame(gameLoop);
}

// Спавн каждые 1.5 секунды
setInterval(spawnLog, 1500);

gameLoop();
</script>

</body>
</html>
