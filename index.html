  function buildEndGamePlaces(results) {
  if (!Array.isArray(results)) return [];

  return results
    .slice()
    .sort((a, b) => Number(a.place) - Number(b.place))
    .map(item => ({
      place: item.place,
      name: item.name || "Игрок",
      score: Number(item.score || 0)
    }));
}

function showEndGameModal(resultData) {
  if (!resultData || endGameShown) return;

  const modal = document.getElementById("endGameModal");

  if (!modal || !winnerNameEl || !placesBody) return;

  winnerNameEl.textContent = resultData.winner || "—";
  placesBody.innerHTML = "";

  const places = buildEndGamePlaces(resultData.results);

  places.forEach(item => {

function startRoomFinishWatcher(roomId) {
  stopEndGameWatcher();

  const roomRef = db.collection("rooms").doc(roomId);

      };

      }
    }
  });
}

async function cleanupRooms() {
  try {
    const snapshot = await db.collection("rooms").get();
    const now = Date.now();

    const maxWaitingRoomAge = 10 * 60 * 1000;   // waiting: 10 минут
    const maxFinishedRoomAge = 2 * 60 * 1000;   // finished: 2 минуты
    const maxPlayingRoomAge = 3 * 60 * 1000;    // playing без активности: 3 минуты

    const promises = [];

    snapshot.forEach(doc => {
      const room = doc.data();

      if (!room) {
        promises.push(doc.ref.delete());
        return;
      }

      const players = Array.isArray(room.players) ? room.players.filter(Boolean) : [];
      const created = getRoomTimeMs(room.created) || 0;
const updatedAt = getRoomTimeMs(room.updatedAt) || getRoomTimeMs(room.created) || 0;

      const isFinished = room.status === "finished" || room.gameState?.finished === true;
      const isStarted = room.status === "playing" || room.gameState?.started === true;

      const waitingTooOld =
        !isStarted &&
        !isFinished &&
        created &&
        (now - created > maxWaitingRoomAge);

      const finishedTooOld =
        isFinished &&
        updatedAt &&
        (now - updatedAt > maxFinishedRoomAge);

      const playingTooOld =
        isStarted &&
        !isFinished &&
        updatedAt &&
        (now - updatedAt > maxPlayingRoomAge);

      if (players.length === 0 || waitingTooOld || finishedTooOld || playingTooOld) {
        promises.push(doc.ref.delete());
      }
    });

    await Promise.all(promises);
  } catch (e) {
    console.error("Ошибка cleanupRooms:", e);
  }
}

 async function createRoom() {

  async function joinRoom(roomId) {
  const name = document.getElementById("nickname").innerText;
  const roomRef = db.collection("rooms").doc(roomId);

  try {
    await db.runTransaction(async (transaction) => {
      const doc = await transaction.get(roomRef);

      if (!doc.exists) {
        throw new Error("ROOM_DELETED");
      }

      const room = doc.data();

      if (!room || !Array.isArray(room.players)) {
        throw new Error("ROOM_DATA_ERROR");
      }

      const now = Date.now();
      const lastActivity = getRoomTimeMs(room.updatedAt) || getRoomTimeMs(room.created) || 0;
      const maxRoomIdleAge = 3 * 60 * 1000;

      if (lastActivity && (now - lastActivity > maxRoomIdleAge)) {
        transaction.delete(roomRef);
        throw new Error("ROOM_EXPIRED");
      }

      if (room.status === "finished") {
        throw new Error("ROOM_FINISHED");
      }

      if (room.players.length >= 3 && !room.players.includes(name)) {
        throw new Error("ROOM_FULL");
      }

      const players = Array.isArray(room.players) ? [...room.players] : [];

      if (!players.includes(name)) {
        players.push(name);
      }

      const updateData = {
        players,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
        [`gameState.playersData.${name}`]: {
          alive: true,
          lost: false,
          leftRoom: false,
          position: 0
        }
      };

      // Ровно в момент, когда стало 2 игрока, запускаем таймер
      if (players.length >= 2 && !room.startAt && !room.gameState?.started) {
  updateData.startAt = firebase.firestore.FieldValue.serverTimestamp();
  updateData.countdownLeft = 120;
}

      transaction.update(roomRef, updateData);
    });

    currentRoomId = roomId;
    multiplayerGameStarted = false;
    openRoomScreen(roomId);

  } catch (e) {
    if (e.message === "ROOM_DELETED") {
      alert("Комната уже удалена");
    } else if (e.message === "ROOM_DATA_ERROR") {
      alert("Ошибка данных комнаты");
    } else if (e.message === "ROOM_EXPIRED") {
      alert("Комната устарела и была удалена");
    } else if (e.message === "ROOM_FINISHED") {
      alert("Игра в комнате уже закончена");
    } else if (e.message === "ROOM_FULL") {
      alert("Комната заполнена");
    } else {
      console.error("Ошибка joinRoom:", e);
      alert("Ошибка входа в комнату");
    }

    loadRooms();
  }
}

async function tryStartRoom(roomId) {
  const roomRef = db.collection("rooms").doc(roomId);

  try {
    await db.runTransaction(async (transaction) => {
      const doc = await transaction.get(roomRef);
      if (!doc.exists) return;

      const room = doc.data();
      if (!room || !Array.isArray(room.players)) return;
      if (room.gameState?.started || room.status === "finished") return;

      const playersCount = room.players.length;
      const countdownLeft = typeof room.countdownLeft === "number" ? room.countdownLeft : null;

      // 3 игрока — старт сразу
      if (playersCount >= 3) {
        transaction.update(roomRef, {
          status: "playing",
          updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
          "gameState.started": true
        });
        return;
      }

      // меньше 2 игроков — сбрасываем таймер
      if (playersCount < 2) {
        const updateData = {
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        };

        if (room.startAt) updateData.startAt = null;
        if (room.countdownLeft !== null) updateData.countdownLeft = null;

        transaction.update(roomRef, updateData);
        return;
      }

      // 2+ игрока, но таймер ещё не создан
      if (playersCount >= 2 && room.countdownLeft == null) {
        transaction.update(roomRef, {
          startAt: firebase.firestore.FieldValue.serverTimestamp(),
          countdownLeft: 120,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        return;
      }

      // если таймер дошёл до 0 — стартуем
      if (playersCount >= 2 && countdownLeft !== null && countdownLeft <= 0) {
        transaction.update(roomRef, {
          status: "playing",
          updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
          "gameState.started": true
        });
      }
    });
  } catch (e) {
    console.error("Ошибка tryStartRoom:", e);
  }
}

function startSharedRoomCountdown(roomId) {
  const roomRef = db.collection("rooms").doc(roomId);
  const myName = document.getElementById("nickname").innerText;

  if (roomHostCountdownInterval) {
    clearInterval(roomHostCountdownInterval);
    roomHostCountdownInterval = null;
  }

  roomHostCountdownInterval = setInterval(async () => {
    try {
      const doc = await roomRef.get();
      if (!doc.exists) {
        stopRoomCountdown();
        return;
      }

      const room = doc.data();
      if (!room || !Array.isArray(room.players)) return;
      if (room.gameState?.started || room.status === "playing" || room.status === "finished") {
        stopRoomCountdown();
        return;
      }

      // Таймер уменьшает только первый игрок в списке
      const hostName = room.players[0];
      if (hostName !== myName) return;

      if (room.players.length >= 3) {
        await tryStartRoom(roomId);
        return;
      }

      if (room.players.length < 2) return;

      const currentLeft = typeof room.countdownLeft === "number" ? room.countdownLeft : 120;
      const nextLeft = Math.max(0, currentLeft - 1);

      await roomRef.update({
        countdownLeft: nextLeft,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      });

      if (nextLeft <= 0) {
        await tryStartRoom(roomId);
      }
    } catch (e) {
      console.error("Ошибка общего таймера комнаты:", e);
    }
  }, 1000);
}

  async function leaveRoom(roomId) {
  const name = document.getElementById("nickname").innerText;
  const roomRef = db.collection("rooms").doc(roomId);

  try {
    const doc = await roomRef.get();

    if (!doc.exists) {
      currentRoomId = null;
      if (currentRoomListener) {
        currentRoomListener();
        currentRoomListener = null;
      }
      
      stopRoomCountdown();
multiplayerGameStarted = false;
      
      document.getElementById("createRoomBtn").style.display = "block";
      loadRooms();
      return;
    }

    const room = doc.data();

    if (!room || !Array.isArray(room.players)) {
      currentRoomId = null;
      if (currentRoomListener) {
        currentRoomListener();
        currentRoomListener = null;
      }
      
      stopRoomCountdown();
multiplayerGameStarted = false;
      
      document.getElementById("createRoomBtn").style.display = "block";
      loadRooms();
      return;
    }

    // Эта функция только для выхода ДО старта игры
    if (room.gameState?.started) {
      console.log("leaveRoom: игра уже началась, используй leaveAfterLoss");
      return;
    }

    const newPlayers = room.players.filter(p => p !== name);

    if (newPlayers.length === 0) {
      await roomRef.delete();
    } else {
      const updateData = {
  players: newPlayers,
  updatedAt: firebase.firestore.FieldValue.serverTimestamp()
};

      // если после выхода осталось меньше 2 игроков — сбрасываем таймер
      if (newPlayers.length < 2) {
  updateData.startAt = null;
  updateData.countdownLeft = null;
}

      // удаляем данные вышедшего игрока из playersData
      if (room.gameState?.playersData?.[name]) {
        updateData[`gameState.playersData.${name}`] = firebase.firestore.FieldValue.delete();
      }

      await roomRef.update(updateData);
    }

    currentRoomId = null;

    if (currentRoomListener) {
      currentRoomListener();
      currentRoomListener = null;
    }

    stopRoomCountdown();
multiplayerGameStarted = false;

    document.getElementById("createRoomBtn").style.display = "block";
    loadRooms();

  } catch (e) {
    console.error("Ошибка выхода из комнаты:", e);
  }
}

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
    ctx.fill();
  }

  // Сначала функция drawExitButton (отдельно)
  function drawExitButton() {
    if (!showExitButton) return;
    
    const btnWidth = 100;
    const btnHeight = 45;
    const padding = 20;
    
    const btnX = canvas.width - btnWidth - padding;
    const btnY = canvas.height - btnHeight - padding;
    
    exitToMenuBtn = { x: btnX, y: btnY, w: btnWidth, h: btnHeight };
    
    ctx.fillStyle = "#dc3545";
    ctx.beginPath();
    ctx.moveTo(btnX + 10, btnY);
    ctx.lineTo(btnX + btnWidth - 10, btnY);
    ctx.quadraticCurveTo(btnX + btnWidth, btnY, btnX + btnWidth, btnY + 10);
    ctx.lineTo(btnX + btnWidth, btnY + btnHeight - 10);
    ctx.quadraticCurveTo(btnX + btnWidth, btnY + btnHeight, btnX + btnWidth - 10, btnY + btnHeight);
    ctx.lineTo(btnX + 10, btnY + btnHeight);
    ctx.quadraticCurveTo(btnX, btnY + btnHeight, btnX, btnY + btnHeight - 10);
    ctx.lineTo(btnX, btnY + 10);
    ctx.quadraticCurveTo(btnX, btnY, btnX + 10, btnY);
    ctx.closePath();
    ctx.fill();
    
    ctx.fillStyle = "#fff";
    ctx.font = "bold 16px Arial";
    ctx.textAlign = "center";
    ctx.fillText("Выйти", btnX + btnWidth/2, btnY + btnHeight/2 + 5);
  }

  // Потом функция drawGameOver (отдельно)
  function drawGameOver() {
    // Фон (затемнение экрана)
    ctx.fillStyle = "rgba(0,0,0,0.5)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // ОВАЛЬНОЕ ОКНО
    const boxWidth = 300;
    const boxHeight = 180;
    const boxX = canvas.width / 2 - boxWidth / 2;
    const boxY = canvas.height / 2 - boxHeight / 2;

    // рисуем окно
    ctx.fillStyle = "rgba(0,0,0,0.7)";
    roundRect(ctx, boxX, boxY, boxWidth, boxHeight, 25);

    // ТЕКСТ
    ctx.fillStyle = "#fff";
    ctx.font = "22px Arial";
    ctx.textAlign = "center";
    ctx.fillText(player.gameOverText, canvas.width/2, boxY + 50);

    // КНОПКИ
    const btnWidth = 110;
    const btnHeight = 40;

    const watchX = boxX + 20;
    const watchY = boxY + 100;
    watchBtn = { x: watchX, y: watchY, w: btnWidth, h: btnHeight };

    ctx.fillStyle = "#28a745";
    roundRect(ctx, watchX, watchY, btnWidth, btnHeight, 15);
    ctx.fillStyle = "#fff";
    ctx.font = "16px Arial";
    ctx.fillText("Смотреть", watchX + btnWidth/2, watchY + 25);

    const exitX = boxX + boxWidth - btnWidth - 20;
    const exitY = watchY;
    exitBtn = { x: exitX, y: exitY, w: btnWidth, h: btnHeight };

    ctx.fillStyle = "#dc3545";
    roundRect(ctx, exitX, exitY, btnWidth, btnHeight, 15);
    ctx.fillStyle = "#fff";
    ctx.fillText("Выйти", exitX + btnWidth/2, exitY + 25);
  }

  function drawStartTimer() {
    ctx.fillStyle = "rgba(0,0,0,0.5)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#fff";
    ctx.textAlign = "center";

    if (startTimer > 0) {
      ctx.font = "bold 80px Arial";
      ctx.fillText(startTimer, canvas.width / 2, canvas.height / 2);
    } else if (showStartText) {
      ctx.font = "bold 60px Arial";
      ctx.fillText("START", canvas.width / 2, canvas.height / 2);
    }
  }

  async function markPlayerAsLost() {
  if (!currentRoomId) return;

  const roomRef = db.collection("rooms").doc(currentRoomId);

  try {
    await roomRef.update({
      updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
      [`gameState.playersData.${name}.alive`]: false,
      [`gameState.playersData.${name}.lost`]: true,
      [`gameState.playersData.${name}.score`]: score,
      [`gameState.playersData.${name}.lostAt`]: Date.now()
    });
  } catch (e) {
    console.error("Ошибка отметки поражения:", e);
  }
}

async function leaveAfterLoss() {
    hideEndGameModal();
  stopEndGameWatcher();
  endGameShown = false;
  
  if (!currentRoomId) {
    clearInterval(spawnInterval1);
    clearInterval(spawnInterval2);
    clearInterval(spawnInterval3);
    if (syncInterval) clearInterval(syncInterval);
    window.gameInitialized = false;
    fullResetMenu();
    loadRooms();
    return;
  }

  const roomRef = db.collection("rooms").doc(currentRoomId);

  try {
    const doc = await roomRef.get();

    if (doc.exists) {
  const room = doc.data();
  const newPlayers = Array.isArray(room.players)
    ? room.players.filter(p => p !== name)
    : [];

  if (newPlayers.length === 0) {
    await roomRef.delete();
  } else {
    const updateData = {
  players: newPlayers,
  updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
  [`gameState.playersData.${name}.leftRoom`]: true
};

    if (newPlayers.length < 2) {
  updateData.startAt = null;
  updateData.countdownLeft = null;
}

    await roomRef.update(updateData);
  }
}
  } catch (e) {
    console.error("Ошибка выхода после поражения:", e);
  }

  currentRoomId = null;

  if (currentRoomListener) {
    currentRoomListener();
    currentRoomListener = null;
  }

  stopRoomCountdown();
multiplayerGameStarted = false;
  
  clearInterval(spawnInterval1);
  clearInterval(spawnInterval2);
  clearInterval(spawnInterval3);
  if (syncInterval) clearInterval(syncInterval);

  window.gameInitialized = false;
showExitButton = false;
openEndGameForCurrentMatch = null;
fullResetMenu();
document.getElementById("createRoomBtn").style.display = "block";
loadRooms();
}

async function checkWinner() {
  if (!currentRoomId || winnerProcessing) return;

  const roomRef = db.collection("rooms").doc(currentRoomId);

  try {
    const roomDoc = await roomRef.get();
    if (!roomDoc.exists) return;

    const roomData = roomDoc.data();
    if (!roomData?.gameState?.playersData) return;
    if (roomData.gameState.finished) return;

    const playersData = roomData.gameState.playersData;

    const alivePlayers = Object.entries(playersData).filter(([_, p]) => {
      return p && p.alive === true;
    });

    if (alivePlayers.length === 1) {
      winnerProcessing = true;

      const winnerName = alivePlayers[0][0];
      const winnerData = playersData[winnerName] || {};

      if (winnerName === name) {
        await saveBestScore(score);
      }

      const loserEntries = Object.entries(playersData)
        .filter(([playerName, p]) => playerName !== winnerName && p && p.lost === true)
        .sort((a, b) => Number(b[1].lostAt || 0) - Number(a[1].lostAt || 0));

      const finalResults = [
        {
          place: 1,
          name: winnerName,
          score: winnerName === name ? score : Number(winnerData.score || 0)
        }
      ];

      if (loserEntries[0]) {
        finalResults.push({
          place: 2,
          name: loserEntries[0][0],
          score: Number(loserEntries[0][1].score || 0)
        });
      }

      if (loserEntries[1]) {
        finalResults.push({
          place: 3,
          name: loserEntries[1][0],
          score: Number(loserEntries[1][1].score || 0)
        });
      }

      await roomRef.update({
        status: "finished",
        updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
        "gameState.finished": true,
        "gameState.started": false,
        "gameState.winner": winnerName,
        "gameState.results": finalResults,
        [`gameState.playersData.${winnerName}.score`]: winnerName === name ? score : Number(winnerData.score || 0)
      });

      showEndGameModal({
        winner: winnerName,
        results: finalResults
      });
    }
  } catch (e) {
    console.error("Ошибка checkWinner:", e);
  }
}

  function loop(currentTime) {
    deltaTime = (currentTime - lastTime) / 16.67; // нормализация под 60 FPS

    // Защита от скачков FPS (и слишком маленьких, и слишком больших)
    deltaTime = Math.min(2, Math.max(0.5, deltaTime));

    lastTime = currentTime;
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    drawRoad();
    updatePlayer();
    updateObstacles1();
    updateObstacles2();
    updateObstacles3();
    drawObstacles1();
    drawObstacles2();
    drawObstacles3();
    drawPlayer();

    if (!gameStarted) {
      drawStartTimer();
    }

    ctx.fillStyle = "#fff";
    ctx.font = "20px Arial";
    ctx.textAlign = "left";   // 👈 ВАЖНО: фикс выравнивания
    ctx.fillText("Score: " + score, 20, 40);
    
    if (player.gameOver && !endGameShown) {
  drawGameOver();
}

if (!endGameShown) {
  drawExitButton();
}
    
    if (gameStarted) {
      gameSpeed += 0.00001 * deltaTime;
    }

    // === STEP 3: Проверка победителя ===
    if (gameStarted) {
      checkWinner(); // ✅ вызываем каждый кадр
    }

    requestAnimationFrame(loop);
  }

  // Запуск спавна препятствий
  let spawnInterval1 = setInterval(spawnObstacle1, 1200);
  let spawnInterval2 = setInterval(spawnObstacle2, 1500);
  let spawnInterval3 = setInterval(spawnObstacle3, 1800);

  // Таймер перед стартом
  let countdown = setInterval(() => {
    startTimer--;
    
    if (startTimer < 0) {
      clearInterval(countdown);
      
      // ОЧИЩАЕМ ВСЕ БРЕВНА
      obstacles1 = [];
      obstacles2 = [];
      obstacles3 = [];
      
      gameStarted = true;
      showStartText = false;
    }
  }, 1000);
  
  // Запуск игрового цикла
  requestAnimationFrame(loop);
}
</script>
