<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Beaver Runner</title>
<style>
  body { margin: 0; overflow: hidden; }
  canvas { display: block; margin: auto; background: #87CEEB; }
</style>
</head>
<body>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// Картинки
const beaver = new Image();
beaver.src = "beaver.png";

const log = new Image();
log.src = "log.png";

// Игрок
let player = {
  x: canvas.width / 2 - 30,
  y: canvas.height - 150,
  width: 60,
  height: 60,
  dy: 0,
  gravity: 0.8,
  jump: -15,
  grounded: true
};

// Препятствия
let obstacles = [];

// Создание препятствий
function spawnObstacle() {
  obstacles.push({
    x: Math.random() * 200 + (canvas.width/2 - 100),
    z: 1
  });
}

// ПРЫЖОК (универсально)
function jump() {
  if (player.grounded) {
    player.dy = player.jump;
    player.grounded = false;
  }
}

// 📱 ТАП (телефон)
canvas.addEventListener("touchstart", (e) => {
  e.preventDefault();
  jump();
});

// 🖱️ КЛИК (на всякий)
canvas.addEventListener("click", jump);

// ⌨️ ПК
document.addEventListener("keydown", (e) => {
  if (e.code === "Space") jump();
});

// Физика
function updatePlayer() {
  player.dy += player.gravity;
  player.y += player.dy;

  if (player.y >= canvas.height - 150) {
    player.y = canvas.height - 150;
    player.dy = 0;
    player.grounded = true;
  }
}

// Движение препятствий
function updateObstacles() {
  obstacles.forEach(o => {
    o.z -= 0.015 + (1 - o.z) * 0.02;
  });

  obstacles = obstacles.filter(o => o.z > 0);
}

// Дорога
function drawRoad() {
  ctx.fillStyle = "#555";
  ctx.beginPath();
  ctx.moveTo(canvas.width * 0.25, canvas.height);
  ctx.lineTo(canvas.width * 0.75, canvas.height);
  ctx.lineTo(canvas.width * 0.6, 0);
  ctx.lineTo(canvas.width * 0.4, 0);
  ctx.closePath();
  ctx.fill();
}

// Препятствия
function drawObstacles() {
  obstacles.forEach(o => {
    let scale = 1 - o.z;

    // размер
    let size = 60 * scale;

    // позиция X (центр + перспектива)
    let x = canvas.width / 2 + (o.x - canvas.width / 2) * scale;

    // ВОТ ГЛАВНОЕ — теперь сверху вниз
    let y = 100 + (canvas.height - 200) * scale;

    ctx.drawImage(log, x, y, size, size);

    // столкновение
    if (
      scale > 0.85 &&
      player.x < x + size &&
      player.x + player.width > x &&
      player.y < y + size &&
      player.y + player.height > y
    ) {
      alert("Ты врезался!");
      location.reload();
    }
  });
}

// Игрок
function drawPlayer() {
  ctx.drawImage(beaver, player.x, player.y, player.width, player.height);
}

// Цикл
function loop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  drawRoad();
  updatePlayer();
  updateObstacles();
  drawObstacles();
  drawPlayer();

  requestAnimationFrame(loop);
}

setInterval(spawnObstacle, 1200);

loop();
</script>

</body>
</html>
