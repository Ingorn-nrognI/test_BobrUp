<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script>
  
let roomsListener = null;
let currentRoomListener = null;
let currentRoomId = null;
let winnerProcessing = false;

let roomCountdownInterval = null;
let roomHostCountdownInterval = null;
let multiplayerGameStarted = false;
let multiplayerStartInProgress = false;

let endGameWatcher = null;
let endGameShown = false;
let isClosingEndGame = false;
let endGameExitHandled = false;
let suppressEndGameModal = false;
let openEndGameForCurrentMatch = null;
let exitEndGameForCurrentMatch = null;
let activeLeaveAfterLossHandler = null;
let blockEndGameModalUntilNextMatch = false;

let gameResizeHandler = null;
let gameBeforeUnloadHandler = null;
let gameCanvasClickHandler = null;
let gameCanvasTouchHandler = null;
let isCreatingRoom = false;
let isJoiningRoom = false;
let isLeavingRoom = false;

let roomPresenceInterval = null;
let roomPresenceClickHandler = null;
let roomPresenceTouchHandler = null;
let roomVisibilityHandler = null;
let roomPageHideHandler = null;
let roomReadyPollInterval = null;
let gameCountdownStartListener = null;
let roomsPollingInterval = null;
let currentRoomPollingInterval = null;
let historyLoading = false;
let expandedHistoryMatchId = null;

let roomMaintenanceLock = false;
let lastRoomMaintenanceAt = 0;
const ROOM_MAINTENANCE_THROTTLE_MS = 2500;

function isRetryableFirestoreContentionError(error) {
  const code = String(error?.code || "").toLowerCase();
  const message = String(error?.message || "").toLowerCase();

  return (
    code === "aborted" ||
    code === "failed-precondition" ||
    code === "cancelled" ||
    code === "resource-exhausted" ||
    code === "unavailable" ||
    code === "deadline-exceeded" ||
    message.includes("failed-precondition") ||
    message.includes("too much contention") ||
    message.includes("quota exceeded") ||
    message.includes("resource exhausted") ||
    message.includes("too many requests") ||
    (message.includes("transaction") && message.includes("retry")) ||
    (message.includes("current document") && message.includes("updatetime"))
  );
}

function reportFirestoreContention(context, error) {
  if (isRetryableFirestoreContentionError(error)) {
    console.warn(`${context}: пропущен конфликт одновременной записи`);
    return true;
  }

  return false;
}

async function runRoomTransaction(roomRef, callback, context = "Firestore transaction") {
  const MAX_RETRIES = 5;

  for (let attempt = 0; attempt < MAX_RETRIES; attempt++) {
    try {
      return await db.runTransaction(async (transaction) => {
        return await callback(transaction);
      });
    } catch (e) {
      if (isRetryableFirestoreContentionError(e)) {
        if (attempt < MAX_RETRIES - 1) {
          const baseDelay = e?.code === "resource-exhausted" ? 250 : 100;
          const delay = baseDelay * Math.pow(2, attempt);
          console.warn(`${context}: retry ${attempt + 1}/${MAX_RETRIES - 1} after ${delay}ms`);
          await new Promise(resolve => setTimeout(resolve, delay));
          continue;
        }

        console.warn(`${context}: все попытки исчерпаны, пропускаем`);
        return null;
      }

      throw e;
    }
  }

  return null;
}

async function safeRoomUpdate(roomRef, updateData, context = "Firestore update") {
  try {
    await roomRef.update(updateData);
    return true;
  } catch (e) {
    if (reportFirestoreContention(context, e)) {
      return false;
    }

    throw e;
  }
}

async function safeFinishRoom(roomRef, updateData, context = "safeFinishRoom") {
  return await runRoomTransaction(roomRef, async (transaction) => {
    const doc = await transaction.get(roomRef);
    if (!doc.exists) return false;

    const room = doc.data();
    if (room?.gameState?.finished === true || room?.status === "finished") {
      return false;
    }

    transaction.update(roomRef, updateData);
    return true;
  }, context);
}

function isCurrentPlayerRoomHost(room) {
  if (!room) return false;
  const { id } = getCurrentPlayer();
  return room.hostId === id;
}

async function maybeRunRoomMaintenance(roomId, room, { force = false } = {}) {
  if (!roomId || !room) return;
  if (!force && !isCurrentClientRoomWriteDriver(room)) return;
  if (roomMaintenanceLock) return;

  const now = Date.now();
  if (!force && now - lastRoomMaintenanceAt < ROOM_MAINTENANCE_THROTTLE_MS) {
    return;
  }

  roomMaintenanceLock = true;
  lastRoomMaintenanceAt = now;

  try {
    await cleanupInactivePlayers(roomId);
    await tryStartRoom(roomId);
  } finally {
    roomMaintenanceLock = false;
  }
}

const GAME_READY_BUFFER_MS = 350;
  
const ROOM_OFFLINE_GRACE_MS = 60 * 1000;
const ROOM_PRESENCE_PING_MS = 30000;
const ROOM_ACTION_PING_THROTTLE_MS = 10000;
const ROOM_MAX_WAITING_LIFETIME_MS = 10 * 60 * 1000;
const ROOM_LAUNCH_PROTECTION_MS = 3 * 60 * 1000;
const ROOM_LIST_CLEANUP_THROTTLE_MS = 15000;

let lastRoomPresenceWriteAt = 0;
let lastRoomsCleanupAt = 0;
let roomsCleanupPromise = null;

let syncedServerNowOffsetMs = 0;
let serverClockSyncedOnce = false;

function getSyncedServerNowMs() {
  return Date.now() + syncedServerNowOffsetMs;
}

function resetServerClockSync() {
  syncedServerNowOffsetMs = 0;
  serverClockSyncedOnce = false;
}

function syncServerClockFromRoom(room) {
  if (!room) return;

  const updatedAt = room.updatedAt;

  if (!updatedAt || typeof updatedAt.toMillis !== "function") {
    return;
  }

  const updatedAtMs = updatedAt.toMillis();
  if (!updatedAtMs) return;

  if (!serverClockSyncedOnce) {
    syncedServerNowOffsetMs = updatedAtMs - Date.now();
    serverClockSyncedOnce = true;
  }
}

function stopRoomCountdown() {
  if (roomCountdownInterval) {
    clearInterval(roomCountdownInterval);

function isRoomLaunchProtected(room) {
  if (!room) return false;

  const isStarted = room.status === "playing" || room.gameState?.started === true;
  if (isStarted) return true;

  const playersCount = Array.isArray(room.playerIds) ? room.playerIds.filter(Boolean).length : 0;
  if (playersCount < 2) return false;

  const startAtMs = getRoomTimeMs(room.startAt);
  const countdownStartedAtMs = getRoomTimeMs(room.gameState?.countdownStartedAt);

  if (countdownStartedAtMs) return true;

  if (startAtMs) {
    const elapsed = getSyncedServerNowMs() - startAtMs;
    if (elapsed >= 0 && elapsed <= ROOM_LAUNCH_PROTECTION_MS) {
      return true;
    }
  }

  return false;
}

async function cleanupInactivePlayers(roomId) {
  if (!roomId) return;

  const roomRef = db.collection("rooms").doc(roomId);

  try {
    await runRoomTransaction(roomRef, async (transaction) => {
      const doc = await transaction.get(roomRef);
      if (!doc.exists) return;

      const room = doc.data();
      if (!room || !Array.isArray(room.playerIds)) return;

      const now = Date.now();
      const playerIds = [...room.playerIds];
      const playerNames = { ...(room.playerNames || {}) };
      const playersData = room.gameState?.playersData || {};

      const createdAt = getRoomTimeMs(room.created) || 0;
      const updatedAt = getRoomTimeMs(room.updatedAt) || createdAt || 0;

      const isStarted =
        room.status === "playing" ||
        room.gameState?.started === true;

      const isFinished =
        room.status === "finished" ||
        room.gameState?.finished === true;

      const launchProtected = isRoomLaunchProtected(room);

      const shouldDeleteForMaxWaitingLifetime =
        !isStarted &&
        !isFinished &&
        !launchProtected &&
        createdAt > 0 &&
        (now - createdAt > ROOM_MAX_WAITING_LIFETIME_MS);

      if (shouldDeleteForMaxWaitingLifetime) {
        transaction.delete(roomRef);
        return;
      }

      const stalePlayerIds = (!isStarted && !isFinished && !launchProtected)
        ? playerIds.filter((pid) => {
            const p = playersData[pid] || {};
            const lastSeen = Number(p.lastSeen || 0) || updatedAt || createdAt || 0;
            const closedAt = Number(p.closedAt || 0) || 0;
            const online = p.online === true;

            const definitelyOffline =
              closedAt > 0 && (now - closedAt > ROOM_OFFLINE_GRACE_MS);

            const silentlyMissing =
              !online &&
              lastSeen > 0 &&
              (now - lastSeen > ROOM_OFFLINE_GRACE_MS);

            const fallbackMissing =
              lastSeen > 0 &&
              (now - lastSeen > ROOM_OFFLINE_GRACE_MS);

            return definitelyOffline || silentlyMissing || fallbackMissing;
          })
        : [];

      if (stalePlayerIds.length === 0) {
        return;
      }

      const newPlayerIds = playerIds.filter(pid => !stalePlayerIds.includes(pid));

      if (newPlayerIds.length === 0) {
        transaction.delete(roomRef);
        return;
      }

      stalePlayerIds.forEach((pid) => {
        delete playerNames[pid];
      });

      const updateData = {
        playerIds: newPlayerIds,
        playerNames,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
        hostId: newPlayerIds.includes(room.hostId) ? room.hostId : newPlayerIds[0]
      };

      if (!isStarted && newPlayerIds.length < 2) {
        updateData.startAt = null;
      }

      stalePlayerIds.forEach((pid) => {
        updateData[`gameState.playersData.${pid}`] = firebase.firestore.FieldValue.delete();
        updateData[`gameState.playersReady.${pid}`] = firebase.firestore.FieldValue.delete();
      });

      transaction.update(roomRef, updateData);
    }, "cleanupInactivePlayers");
  } catch (e) {
    console.error("Ошибка cleanupInactivePlayers:", e);
  }
}

function shouldIgnoreExternalConsoleError(message) {
  const text = String(message || "").toLowerCase();
  return (
    text.includes("device-orientation") ||
    text.includes("cache storage") ||
    text.includes("cachedfiles") ||
    text.includes("operation too large") ||
    text.includes("unsupported feature") ||
    text.includes("postevent")
  );
}

function reportAppError(prefix, error) {
  const message = error?.message || error?.reason?.message || error?.reason || error || "Неизвестная ошибка";

  if (shouldIgnoreExternalConsoleError(message)) {
    console.warn(prefix, message);
    return;
  }

  console.error(prefix, error);
}

window.addEventListener("error", (event) => {
  const message = event?.message || "";
  if (shouldIgnoreExternalConsoleError(message)) {
    event.preventDefault();
    console.warn("Стороннее сообщение браузера/Telegram:", message);
  }
});

window.addEventListener("unhandledrejection", (event) => {
  const reason = event?.reason;
  const message = reason?.message || String(reason || "");

  if (shouldIgnoreExternalConsoleError(message)) {
    event.preventDefault();
    console.warn("Поймано внешнее promise-сообщение:", message);
    return;
  }

  console.error("Необработанная ошибка Promise:", reason);
  event.preventDefault();
});

async function tryStartSyncedCountdown(roomId) {
  if (!roomId || currentRoomId !== roomId) return;

  const roomRef = db.collection("rooms").doc(roomId);

  try {
    await runRoomTransaction(roomRef, async (transaction) => {
      const doc = await transaction.get(roomRef);
      if (!doc.exists) return;

      const room = doc.data();
      if (!room || !Array.isArray(room.playerIds)) return;
      if (!isCurrentClientRoomWriteDriver(room)) return;
      if (room.status !== "playing" && room.gameState?.started !== true) return;

      const countdownStartedAt = getRoomTimeMs(room.gameState?.countdownStartedAt);
      if (countdownStartedAt) return;

      const playerIds = room.playerIds.filter(Boolean);
      if (playerIds.length === 0) return;

      const playersReady = room.gameState?.playersReady || {};
      const readyCount = playerIds.filter(pid => playersReady[pid] === true).length;
      const allReady = readyCount === playerIds.length;

      const playingStartedAtMs =
        getRoomTimeMs(room.gameState?.playingStartedAt) ||
        getRoomTimeMs(room.updatedAt) ||
        Date.now();

      const waitedMs = Date.now() - playingStartedAtMs;

      if (!allReady && waitedMs < 1200) return;

      transaction.update(roomRef, {
        updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
        "gameState.countdownStartedAt": firebase.firestore.FieldValue.serverTimestamp()
      });
    }, "tryStartSyncedCountdown");
  } catch (e) {
    console.error("Ошибка tryStartSyncedCountdown:", e);
  }
}

async function waitForRoomMembership(roomRef, playerId, attempts = 8, delayMs = 250) {
  for (let i = 0; i < attempts; i++) {
    try {
      const doc = await roomRef.get();
      if (doc.exists) {
        const room = doc.data() || {};
        const ids = Array.isArray(room.playerIds) ? room.playerIds.filter(Boolean) : [];
        if (ids.includes(playerId)) {
          return room;
        }
      }
    } catch (e) {
      console.warn("waitForRoomMembership:", e?.message || e);
    }

    if (i < attempts - 1) {
      await new Promise(resolve => setTimeout(resolve, delayMs));
    }
  }

  return null;
}

function getRoomFreshnessMs(room) {
  return getRoomTimeMs(room?.updatedAt) || getRoomTimeMs(room?.created) || 0;
}

function getRoomPlayerLastSeenMs(room, playerId) {
  const data = room?.gameState?.playersData?.[playerId] || {};
  return Number(data.lastSeen || 0) || getRoomFreshnessMs(room) || 0;
}

function isRoomWaitingJoinable(room) {
  if (!room) return false;
  if (room.status !== "waiting") return false;
  if (room.gameState?.started === true || room.gameState?.finished === true) return false;
  const activePlayerIds = getRenderableRoomPlayerIds(room);
  if (activePlayerIds.length === 0 || activePlayerIds.length >= 3) return false;
  return true;
}

function isRoomProbablyStale(room) {
  if (!room) return true;

  const now = Date.now();
  const freshMs = getRoomFreshnessMs(room);
  const activePlayerIds = getRenderableRoomPlayerIds(room);

  if (activePlayerIds.length === 0) return true;

  const hasFreshPlayer = activePlayerIds.some((pid) => {
    const playerData = room?.gameState?.playersData?.[pid] || {};
    const closedAt = Number(playerData.closedAt || 0) || 0;
    const lastSeen = getRoomPlayerLastSeenMs(room, pid);

    if (closedAt > 0 && now - closedAt > ROOM_OFFLINE_GRACE_MS) {
      return false;
    }

    return lastSeen > 0 && now - lastSeen <= ROOM_OFFLINE_GRACE_MS;
  });

  if (hasFreshPlayer) {
    return false;
  }

  if (freshMs > 0 && now - freshMs > ROOM_MAX_WAITING_LIFETIME_MS) {
    return true;
  }

  return activePlayerIds.every((pid) => {
    const lastSeen = getRoomPlayerLastSeenMs(room, pid);
    return !lastSeen || now - lastSeen > ROOM_OFFLINE_GRACE_MS;
  });
}

function buildOptimisticJoinedRoom(baseRoom, playerId, playerName) {
  const room = JSON.parse(JSON.stringify(baseRoom || {}));
  const playerIds = Array.isArray(room.playerIds) ? room.playerIds.filter(Boolean) : [];
  const alreadyInRoom = playerIds.includes(playerId);

  room.playerIds = alreadyInRoom ? playerIds : [...playerIds, playerId];
  room.playerNames = { ...(room.playerNames || {}), [playerId]: playerName };
  room.status = room.status || "waiting";
  room.gameState = room.gameState || {};
  room.gameState.playersReady = {
    ...(room.gameState.playersReady || {}),
    [playerId]: false
  };
  room.gameState.playersData = {
    ...(room.gameState.playersData || {}),
    [playerId]: {
      ...(room.gameState.playersData?.[playerId] || {}),
      name: playerName,
      alive: true,
      lost: false,
      leftRoom: false,
      position: 0,
      score: 0,
      firstObstacleResolved: false,
      online: true,
      lastSeen: Date.now(),
      lastActionAt: Date.now(),
      closedAt: null,
      gameLoaded: false,
      gameLoadedAt: null
    }
  };

  return room;
}

async function cleanupRooms({ force = false } = {}) {
  const now = Date.now();

  if (!force && now - lastRoomsCleanupAt < ROOM_LIST_CLEANUP_THROTTLE_MS) {
    return;
  }

  if (roomsCleanupPromise) {
    return roomsCleanupPromise;
  }

  lastRoomsCleanupAt = now;

  roomsCleanupPromise = (async () => {
    try {
      const snapshot = await db.collection("rooms").get();

      for (const doc of snapshot.docs) {
        const room = doc.data();

        if (!room || room.status !== "waiting") continue;
        if (room.gameState?.started === true || room.gameState?.finished === true) continue;

        if (isRoomProbablyStale(room)) {
          await cleanupInactivePlayers(doc.id);
        }
      }
    } catch (e) {
      console.error("Ошибка cleanupRooms:", e);
    } finally {
      roomsCleanupPromise = null;
    }
  })();

  return roomsCleanupPromise;
}

async function findExistingWaitingRoomForPlayer(playerId) {
  try {
    const snapshot = await db.collection("rooms")
      .where("playerIds", "array-contains", playerId)
      .get();

    const candidates = [];

    for (const doc of snapshot.docs) {
      const room = doc.data();
      if (!isRoomWaitingJoinable(room)) continue;

      const selfData = room?.gameState?.playersData?.[playerId] || {};
      const activeIds = getRenderableRoomPlayerIds(room);
      if (selfData.leftRoom === true || !activeIds.includes(playerId)) continue;

      if (isRoomProbablyStale(room)) {
        await cleanupInactivePlayers(doc.id);
        continue;
      }

      candidates.push({ id: doc.id, room });
    }

    candidates.sort((a, b) => getRoomFreshnessMs(b.room) - getRoomFreshnessMs(a.room));

    return candidates[0] || null;
  } catch (e) {
    console.error("Ошибка findExistingWaitingRoomForPlayer:", e);
    return null;
  }
}

async function attemptSimpleRoomJoin(roomRef, roomId, playerId, playerName) {
  try {

    if (!room || !isRoomWaitingJoinable(room)) return null;

    const activePlayerIds = getRenderableRoomPlayerIds(room);
    const alreadyInRoom = activePlayerIds.includes(playerId);

    if (activePlayerIds.length >= 3 && !alreadyInRoom) {
      return null;
    }

    const now = Date.now();
    const updateData = {
      updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
      [`playerNames.${playerId}`]: playerName,
      [`gameState.playersReady.${playerId}`]: false,
      [`gameState.playersData.${playerId}.name`]: playerName,
      [`gameState.playersData.${playerId}.alive`]: true,
      [`gameState.playersData.${playerId}.lost`]: false,
      [`gameState.playersData.${playerId}.leftRoom`]: false,
      [`gameState.playersData.${playerId}.position`]: 0,
      [`gameState.playersData.${playerId}.score`]: 0,
      [`gameState.playersData.${playerId}.firstObstacleResolved`]: false,
      [`gameState.playersData.${playerId}.online`]: true,
      [`gameState.playersData.${playerId}.lastSeen`]: now,
      [`gameState.playersData.${playerId}.lastActionAt`]: now,
      [`gameState.playersData.${playerId}.closedAt`]: null,
      [`gameState.playersData.${playerId}.gameLoaded`]: false,
      [`gameState.playersData.${playerId}.gameLoadedAt`]: null
    };

    if (!alreadyInRoom) {
      updateData.playerIds = firebase.firestore.FieldValue.arrayUnion(playerId);
    }

    if ((alreadyInRoom ? activePlayerIds.length : activePlayerIds.length + 1) >= 2 && !room.startAt && !room.gameState?.started) {
      updateData.startAt = firebase.firestore.FieldValue.serverTimestamp();
    }

    const ok = await safeRoomUpdate(roomRef, updateData, "attemptSimpleRoomJoin");
    if (ok === false) return null;

    return buildOptimisticJoinedRoom(room, playerId, playerName);

  return date.toLocaleString("ru-RU", {
    day: "2-digit",
    month: "2-digit",
    year: "numeric",
    hour: "2-digit",
    minute: "2-digit"
  });
}

function getHistoryCollectionRef(playerId) {
  return db.collection("users").doc(String(playerId)).collection("history");
}

function getHistoryResultMeta(item) {
  const winnerValue = String(item?.winner || "").trim().toLowerCase();
  if (winnerValue === "ничья") {
    return { label: "ничья", className: "draw" };
  }

  if (item?.youWon) {
    return { label: "выиграл", className: "win" };
  }

  return { label: "проиграл", className: "lose" };
}

function toggleHistoryMatchDetails(matchId, event) {
  if (event) {
    event.preventDefault();
    event.stopPropagation();
  }

  expandedHistoryMatchId = expandedHistoryMatchId === matchId ? null : matchId;
  loadGameHistory();
}

function renderHistoryEntries(entries) {
  const panel = document.getElementById("historyPanel");
  if (!panel) return;

  const title = `<div class="history-panel-title">История игр</div>`;

  if (!Array.isArray(entries) || entries.length === 0) {
    panel.innerHTML = `${title}<div class="history-scroll-area"><div class="history-panel-text">Пока нет сыгранных матчей.</div></div>`;
    return;
  }

  const items = entries.map((item, index) => {
    const matchId = String(item.roomId || item.savedAt || index);
    const isExpanded = expandedHistoryMatchId === matchId;
    const resultMeta = getHistoryResultMeta(item);
    const playedAtText = formatHistoryDate(item.playedAt);
    const modeLabel = item.mode || "Bobr Run";

    const resultsRows = Array.isArray(item.results)
      ? item.results
          .slice()
          .sort((a, b) => Number(a.place || 0) - Number(b.place || 0))
          .map((row) => `
            <tr>
              <td>${Number(row.place || 0)}</td>
              <td>${row.name || "Игрок"}</td>
              <td>${Number(row.score || 0)}</td>
            </tr>
          `)
          .join("")
      : "";

    const detailsHtml = isExpanded ? `
      <div class="history-match-details">
        <table class="history-match-table">
          <thead>
            <tr>
              <th>Место</th>
              <th>Игрок</th>
              <th>Счёт</th>
            </tr>
          </thead>
          <tbody>${resultsRows}</tbody>
        </table>
      </div>
    ` : "";

    return `
      <div class="history-match-card" onclick="toggleHistoryMatchDetails('${matchId.replace("'", "&#39;")}', event)">
        <div class="history-match-mode">Режим: ${modeLabel}</div>
        <div class="history-match-result ${resultMeta.className}">${resultMeta.label}</div>
        <div class="history-match-date">${playedAtText}</div>
        ${detailsHtml}
      </div>
    `;
  }).join("");

  panel.innerHTML = `${title}<div class="history-scroll-area"><div class="history-panel-text">${items}</div></div>`;
}

async function loadGameHistory() {
  const panel = document.getElementById("historyPanel");
  if (!panel || historyLoading) return;

  historyLoading = true;
  panel.innerHTML = `
    <div class="history-panel-title">История игр</div>
    <div class="history-scroll-area"><div class="history-panel-text">Загрузка...</div></div>
  `;

  try {
    const { id } = getCurrentPlayer();
    const snapshot = await getHistoryCollectionRef(id)
      .orderBy("playedAt", "desc")
      .limit(20)
      .get();

    const entries = [];
    snapshot.forEach((doc) => {
      entries.push(doc.data() || {});
    });

    renderHistoryEntries(entries);
  } catch (e) {
    console.error("Ошибка загрузки истории игр:", e);
    panel.innerHTML = `
      <div class="history-panel-title">История игр</div>
      <div class="history-scroll-area"><div class="history-panel-text">Не удалось загрузить историю игр.</div></div>
    `;
  } finally {
    historyLoading = false;
  }
}

async function saveMatchHistoryForAllPlayers(roomId, roomData) {
  if (!roomId || !roomData?.gameState?.finished || !Array.isArray(roomData?.gameState?.results)) {
    return;
  }

  const results = roomData.gameState.results
    .slice()
    .sort((a, b) => Number(a.place || 0) - Number(b.place || 0))
    .map(item => ({
      place: Number(item.place || 0),
      name: item.name || "Игрок",
      score: Number(item.score || 0)
    }));

  const playerIds = Array.isArray(roomData.playerIds) ? roomData.playerIds.filter(Boolean) : [];
  if (playerIds.length === 0) return;

  const playedAt =
    getRoomTimeMs(roomData.gameState?.historySavedAt) ||
    getRoomTimeMs(roomData.updatedAt) ||
    Date.now();

  const batch = db.batch();

  playerIds.forEach((pid) => {
    const playerName =
      roomData.playerNames?.[pid] ||
      roomData.gameState?.playersData?.[pid]?.name ||
      "Игрок";

    const yourResult = results.find(r => r.name === playerName) || null;

    const historyRef = getHistoryCollectionRef(pid).doc(roomId);
    batch.set(historyRef, {
      roomId,
      playedAt,
      mode: "Bobr Run",
      winner: roomData.gameState.winner || "—",
      results,
      yourName: playerName,
      yourPlace: yourResult?.place || null,
      yourScore: Number(yourResult?.score || 0),
      youWon: yourResult?.place === 1 && String(roomData.gameState.winner || "").toLowerCase() !== "ничья",
      savedAt: Date.now()
    }, { merge: true });
  });

  await batch.commit();

  try {
    const roomRef = db.collection("rooms").doc(roomId);
    const roomDoc = await roomRef.get();

    if (roomDoc.exists) {
      await safeRoomUpdate(roomRef, {
        updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
        "gameState.historySaved": true,
        "gameState.historySavedAt": firebase.firestore.FieldValue.serverTimestamp()
      }, "saveMatchHistoryForAllPlayers.historySaved");
    }
  } catch (e) {
    console.error("Ошибка отметки сохранённой истории:", e);
  }
}

async function ensureCurrentMatchHistorySaved(roomId, roomData) {
  if (!roomId || !roomData?.gameState?.finished || !Array.isArray(roomData?.gameState?.results)) {
    return;
  }

  try {
    await saveMatchHistoryForAllPlayers(roomId, roomData);
  } catch (e) {
    console.error("Ошибка сохранения истории матча:", e);
  }
}

function buildEndGamePlaces(results) {
  if (!Array.isArray(results)) return [];

  return results
    .slice()
    .sort((a, b) => Number(a.place) - Number(b.place))
    .map(item => ({
      place: item.place,
      name: item.name || "Игрок",
      score: Number(item.score || 0)
    }));
}

function showEndGameModal(resultData) {
  if (!resultData || endGameShown || isClosingEndGame || endGameExitHandled || suppressEndGameModal || blockEndGameModalUntilNextMatch) {
    return;
  }

  const modal = document.getElementById("endGameModal");
  const titleEl = document.getElementById("endGameTitle");
  const winnerNameEl = document.getElementById("endGameWinnerName");
  const placesBody = document.getElementById("endGamePlacesBody");

  if (!modal || !titleEl || !winnerNameEl || !placesBody) return;

  const winnerLabel = String(resultData.winner || "").trim();
  const isDraw = winnerLabel.toLowerCase() === "ничья";

  titleEl.textContent = isDraw ? "Ничья" : "Победитель";
  winnerNameEl.textContent = isDraw ? "" : (winnerLabel || "—");
  winnerNameEl.style.display = isDraw ? "none" : "block";

  placesBody.innerHTML = "";

  const places = buildEndGamePlaces(resultData.results);

  places.forEach(item => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${item.place}</td>
      <td>${item.name}</td>
      <td>${item.score}</td>
    `;
    placesBody.appendChild(tr);
  });

  resetEndGameUIState();
  suppressEndGameModal = false;
  isClosingEndGame = false;
  modal.style.display = "flex";
  endGameShown = true;
}

function hideEndGameModal() {
  const modal = document.getElementById("endGameModal");
  if (modal) {
    modal.style.display = "none";
    modal.style.visibility = "hidden";
    modal.style.pointerEvents = "none";
    modal.setAttribute("aria-hidden", "true");
  }
  endGameShown = false;
}

function forceCloseEndGameUI() {

  modal.style.display = "none";
  modal.style.visibility = "hidden";
  modal.style.pointerEvents = "none";
  modal.setAttribute("aria-hidden", "true");

}

function hardCloseEndGameModal() {
  forceCloseEndGameUI();
  setTimeout(forceCloseEndGameUI, 0);
  setTimeout(forceCloseEndGameUI, 120);
  setTimeout(forceCloseEndGameUI, 300);
}

function resetEndGameUIState() {
  const modal = document.getElementById("endGameModal");

  modal.style.visibility = "";
  modal.style.pointerEvents = "";

function stopEndGameWatcher() {

async function runActiveLeaveAfterLoss() {
  blockEndGameModalUntilNextMatch = true;
  suppressEndGameModal = true;
  endGameExitHandled = true;
  isClosingEndGame = true;
  hardCloseEndGameModal();

  if (typeof activeLeaveAfterLossHandler === "function") {
    await activeLeaveAfterLossHandler();
    return;
  }

  hardCloseEndGameModal();
  stopEndGameWatcher();
  currentRoomId = null;
  resetServerClockSync();
  stopRoomCountdown();
  stopRoomPresence();
  stopRoomReadyPoll();
  stopGameCountdownStartListener();
  multiplayerGameStarted = false;
  endGameShown = false;
  isClosingEndGame = false;
  endGameExitHandled = false;
  openEndGameForCurrentMatch = null;
  exitEndGameForCurrentMatch = null;
  activeLeaveAfterLossHandler = null;

  const menu = document.getElementById("menu");
  const game = document.getElementById("game");
  const createRoomBtn = document.getElementById("createRoomBtn");

  if (menu) menu.style.display = "flex";
  if (game) game.style.display = "none";
  if (createRoomBtn) createRoomBtn.style.display = "block";

  closeRooms();
  setMenuView("mode");
  restoreRoomsLobby({ message: "Загрузка комнат...", keepModalOpen: false, reloadRooms: true });
}

function startRoomFinishWatcher(roomId) {
  stopEndGameWatcher();
  endGameExitHandled = false;

  const roomRef = db.collection("rooms").doc(roomId);

  endGameWatcher = roomRef.onSnapshot(async (doc) => {
    if (!doc.exists) {
      if (!endGameExitHandled && currentRoomId === roomId) {
        endGameExitHandled = true;
        await runActiveLeaveAfterLoss();
      }
      return;
    }

    const room = doc.data();
    if (!room || !room.gameState) return;

    if (suppressEndGameModal || isClosingEndGame || endGameExitHandled) {
      return;
    }

    if (room.gameState.finished === true && room.gameState.winner && room.gameState.results) {
      await ensureCurrentMatchHistorySaved(roomId, room);

      const resultData = {
        winner: room.gameState.winner,
        results: room.gameState.results
      };

      if (blockEndGameModalUntilNextMatch) return;

  if (typeof openEndGameForCurrentMatch === "function") {
        openEndGameForCurrentMatch(resultData);
      } else {
        showEndGameModal(resultData);
      }
    }
  });
}

async function closeEndGameAndExit() {
  if (isClosingEndGame) return;

  blockEndGameModalUntilNextMatch = true;
  isClosingEndGame = true;
  suppressEndGameModal = true;
  endGameExitHandled = true;

  hardCloseEndGameModal();
  stopEndGameWatcher();

  const savedExitHandler = exitEndGameForCurrentMatch;
  openEndGameForCurrentMatch = null;
  exitEndGameForCurrentMatch = null;

  try {
    if (typeof savedExitHandler === "function") {
      await savedExitHandler();
    } else {
      await runActiveLeaveAfterLoss();
    }
  } finally {
    hardCloseEndGameModal();
    setTimeout(() => {
      isClosingEndGame = false;
    }, 200);
  }
}

function sortVisibleRooms(items) {
  return items.sort((a, b) => {
    const aUpdated = getRoomTimeMs(a.room?.updatedAt) || getRoomTimeMs(a.room?.created) || 0;
    const bUpdated = getRoomTimeMs(b.room?.updatedAt) || getRoomTimeMs(b.room?.created) || 0;

    if (b.playersCount !== a.playersCount) {
      return b.playersCount - a.playersCount;
    }

    return bUpdated - aUpdated;
  });
}

async function cleanupRooms({ force = false } = {}) {
  const now = Date.now();

  if (!force && now - lastRoomsCleanupAt < ROOM_LIST_CLEANUP_THROTTLE_MS) {
    return;
  }

  if (roomsCleanupPromise) {
    return roomsCleanupPromise;
  }

  lastRoomsCleanupAt = now;

  roomsCleanupPromise = (async () => {
    try {
      const snapshot = await db.collection("rooms").get();

      for (const doc of snapshot.docs) {
        const room = doc.data();

        if (!room || room.status !== "waiting") continue;
        if (room.gameState?.started === true || room.gameState?.finished === true) continue;

        if (isRoomProbablyStale(room)) {
          await cleanupInactivePlayers(doc.id);
        }
      }
    } catch (e) {
      console.error("Ошибка cleanupRooms:", e);
    } finally {
      roomsCleanupPromise = null;
    }
  })();

  return roomsCleanupPromise;
}

function buildVisibleRoomItems(snapshot) {
  const roomItems = [];

  if (!snapshot) return roomItems;

  snapshot.forEach((doc) => {
    const room = doc.data();
    if (!room) return;

    const activePlayerIds = getRenderableRoomPlayerIds(room);
    const isStarted = room.status === "playing" || room.gameState?.started === true;
    const isFinished = room.status === "finished" || room.gameState?.finished === true;

    if (room.status !== "waiting") return;
    if (isStarted || isFinished) return;
    if (activePlayerIds.length === 0 || activePlayerIds.length >= 3) return;
    if (isRoomProbablyStale(room)) return;

    roomItems.push({
      id: doc.id,
      room,
      playersCount: activePlayerIds.length,
      playersNames: getRenderableRoomPlayerNames(room)
    });
  });

  return sortVisibleRooms(roomItems);
}

function renderRoomsItems(roomItems) {
  const list = document.getElementById("roomsList");
  if (!list) return;

  list.innerHTML = "";

  if (!Array.isArray(roomItems) || roomItems.length === 0) {
    list.innerHTML = "Нет доступных комнат";
    setCreateRoomButtonVisible(true);
    return;
  }

  roomItems.forEach((item) => {
    const div = document.createElement("div");
    div.className = "roomItem";

    const title = item.playersNames.length > 0
      ? item.playersNames.join(", ")
      : "Игрок";

    div.innerHTML = `
      <div>Комната (${item.playersCount}/3)</div>
      <div style="margin-top:6px;font-size:14px;opacity:0.85;">${title}</div>
    `;

    div.onclick = () => {
      if (isJoiningRoom || isCreatingRoom || isLeavingRoom || currentRoomId) return;
      joinRoom(item.id);
    };

    list.appendChild(div);
  });

  setCreateRoomButtonVisible(true);
}

async function renderRoomsListOnce(snapshot = null) {
  const list = document.getElementById("roomsList");
  if (!list) return;

  if (currentRoomId && !isLeavingRoom) {
    return;
  }

  try {
    const effectiveSnapshot = snapshot || await getRoomsSnapshotDirect();

    if (currentRoomId && !isLeavingRoom) {
      return;
    }

    const roomItems = buildVisibleRoomItems(effectiveSnapshot);
    renderRoomsItems(roomItems);
  } catch (error) {
    console.error("Ошибка загрузки списка комнат:", error);
    list.innerHTML = "Не удалось загрузить комнаты";
    setCreateRoomButtonVisible(true);
  }
}

async function loadRooms() {
  const list = document.getElementById("roomsList");
  if (!list) return;

  if (currentRoomId && !isLeavingRoom) {
    return;
  }

  stopRoomsListListener();
  setCreateRoomButtonVisible(true);
  list.innerHTML = "Загрузка...";

  await cleanupRooms();
  await renderRoomsListOnce();

  roomsListener = db.collection("rooms").onSnapshot((snapshot) => {
    if (currentRoomId && !isLeavingRoom) return;
    renderRoomsListOnce(snapshot);
  }, async (error) => {
    console.error("Ошибка realtime списка комнат:", error);

    if (currentRoomId && !isLeavingRoom) return;

    try {
      await renderRoomsListOnce();
    } catch (e) {
      console.error("Ошибка fallback загрузки комнат:", e);
      setRoomsListMessage("Не удалось загрузить комнаты");
      setCreateRoomButtonVisible(true);
    }
  });
}



async function createRoom() {
  if (isCreatingRoom || isJoiningRoom || isLeavingRoom || currentRoomId) return;

  const { id, name } = getCurrentPlayer();
  const list = document.getElementById("roomsList");
  const now = Date.now();

  await cleanupRooms();

  const existingRoom = await findExistingWaitingRoomForPlayer(id);
  if (existingRoom) {
    currentRoomId = existingRoom.id;
    openRoomScreen(existingRoom.id, existingRoom.room);
    return;
  }

  const roomRef = db.collection("rooms").doc();

  const room = {
    hostId: id,
    playerIds: [id],
    playerNames: {
      [id]: name
    },
    status: "waiting",
    created: firebase.firestore.FieldValue.serverTimestamp(),
    updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
    startAt: null,
    countdownLeft: null,
    gameState: {
      started: false,
      finished: false,
      winner: null,
      countdownStartedAt: null,
      playersReady: {
        [id]: false
      },
      playersData: {
        [id]: {
          name,
          alive: true,
          lost: false,
          leftRoom: false,
          position: 0,
          score: 0,
          firstObstacleResolved: false,
          online: true,
          lastSeen: now,
          lastActionAt: now,
          closedAt: null,
          gameLoaded: false,
          gameLoadedAt: null
        }
      }
    }
  };

  try {
    isCreatingRoom = true;
    stopRoomsListListener();
    setCreateRoomButtonVisible(false);

    if (list) {
      list.innerHTML = `
        Игроки: 1/3 <br><br>
        ${name}
        <br><br>
        <div onclick="leaveRoom('${roomRef.id}')" style="background:#dc3545;padding:10px;border-radius:10px;text-align:center;">
          Выйти из комнаты
        </div>
      `;
    }

    await roomRef.set(room);

    let confirmedRoom = null;

    try {
      const doc = await getRoomDocumentDirect(roomRef.id);
      if (doc.exists) {
        confirmedRoom = doc.data();
      }
    } catch (e) {
      console.warn("createRoom confirmation skipped:", e?.message || e);
    }

    currentRoomId = roomRef.id;
    multiplayerGameStarted = false;
    multiplayerStartInProgress = false;

    openRoomScreen(roomRef.id, confirmedRoom || {
      ...room,
      created: now,
      updatedAt: now
    });
  } catch (e) {
    console.error("Ошибка createRoom:", e);

    restoreRoomsLobby({
      message: "Не удалось создать комнату",
      keepModalOpen: true,
      reloadRooms: true
    });

    if (e.code === "resource-exhausted") {
      alert("Firebase перегружен или превышен лимит. Попробуй позже.");
    } else {
      alert("Ошибка создания комнаты");
    }
  } finally {
    isCreatingRoom = false;
    if (!currentRoomId) {
      setCreateRoomButtonVisible(true);
    }
  }
}

async function joinRoom(roomId) {
  if (isJoiningRoom || isCreatingRoom || isLeavingRoom || currentRoomId) return;

  isJoiningRoom = true;

  const { id, name } = getCurrentPlayer();
  const roomRef = db.collection("rooms").doc(roomId);
  const list = document.getElementById("roomsList");

  setCreateRoomButtonVisible(false);

  if (list) {
    list.innerHTML = `
      Подключение к комнате...<br><br>
      Игрок: ${name}
    `;
  }

  let baseRoomForOptimisticJoin = null;

  try {
    const initialDoc = await getRoomDocumentDirect(roomId);
    if (!initialDoc.exists) {
      throw new Error("ROOM_DELETED");
    }

    baseRoomForOptimisticJoin = initialDoc.data() || {};

    if (!isRoomWaitingJoinable(baseRoomForOptimisticJoin)) {
      throw new Error("ROOM_UNAVAILABLE");
    }

    const activeBeforeJoin = getRenderableRoomPlayerIds(baseRoomForOptimisticJoin);
    if (activeBeforeJoin.length >= 3 && !activeBeforeJoin.includes(id)) {
      throw new Error("ROOM_FULL");
    }

    const result = await runRoomTransaction(roomRef, async (transaction) => {
      const doc = await transaction.get(roomRef);

      if (!doc.exists) {
        throw new Error("ROOM_DELETED");
      }

      const room = doc.data();
      if (!room || !Array.isArray(room.playerIds)) {
        throw new Error("ROOM_DATA_ERROR");
      }

      const activePlayerIds = getRenderableRoomPlayerIds(room);
      const alreadyInRoom = activePlayerIds.includes(id);
      const isStarted = room.status === "playing" || room.gameState?.started === true;
      const isFinished = room.status === "finished" || room.gameState?.finished === true;

      if (isStarted || isFinished) {
        throw new Error("ROOM_UNAVAILABLE");
      }

      if (activePlayerIds.length >= 3 && !alreadyInRoom) {
        throw new Error("ROOM_FULL");
      }

      const nextPlayerIds = alreadyInRoom ? [...activePlayerIds] : [...activePlayerIds, id];
      const now = Date.now();

      transaction.update(roomRef, {
        playerIds: nextPlayerIds,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
        hostId: room.hostId && nextPlayerIds.includes(room.hostId) ? room.hostId : nextPlayerIds[0],
        ...(nextPlayerIds.length >= 2 && !room.startAt && !room.gameState?.started
          ? { startAt: firebase.firestore.FieldValue.serverTimestamp() }
          : {}),
        [`playerNames.${id}`]: name,
        [`gameState.playersReady.${id}`]: false,
        [`gameState.playersData.${id}.name`]: name,
        [`gameState.playersData.${id}.alive`]: true,
        [`gameState.playersData.${id}.lost`]: false,
        [`gameState.playersData.${id}.leftRoom`]: false,
        [`gameState.playersData.${id}.position`]: 0,
        [`gameState.playersData.${id}.score`]: 0,
        [`gameState.playersData.${id}.firstObstacleResolved`]: false,
        [`gameState.playersData.${id}.online`]: true,
        [`gameState.playersData.${id}.lastSeen`]: now,
        [`gameState.playersData.${id}.lastActionAt`]: now,
        [`gameState.playersData.${id}.closedAt`]: null,
        [`gameState.playersData.${id}.gameLoaded`]: false,
        [`gameState.playersData.${id}.gameLoadedAt`]: null
      });

      return buildOptimisticJoinedRoom(room, id, name);
    }, "joinRoom");

    let joinedRoom = result;

    if (joinedRoom === null) {
      joinedRoom = await attemptSimpleRoomJoin(roomRef, roomId, id, name);
    }

    let confirmedRoom = null;

    try {
      confirmedRoom = await waitForRoomMembership(roomRef, id, 5, 250);
    } catch (e) {
      console.warn("joinRoom membership check skipped:", e?.message || e);
    }

    if (!confirmedRoom) {
      try {
        const latestDoc = await getRoomDocumentDirect(roomId);
        if (latestDoc.exists) {
          const latestRoom = latestDoc.data() || {};
          const activeIds = getRenderableRoomPlayerIds(latestRoom);
          if (activeIds.includes(id)) {
            confirmedRoom = latestRoom;
          }
        }
      } catch (e) {
        console.warn("joinRoom latest room fetch skipped:", e?.message || e);
      }
    }

    const optimisticRoom = confirmedRoom || joinedRoom || buildOptimisticJoinedRoom(baseRoomForOptimisticJoin, id, name);
    const optimisticIds = getRenderableRoomPlayerIds(optimisticRoom);

    if (!optimisticIds.includes(id)) {
      throw new Error("JOIN_NOT_CONFIRMED");
    }

    currentRoomId = roomId;
    multiplayerGameStarted = false;
    multiplayerStartInProgress = false;
    openRoomScreen(roomId, optimisticRoom);
  } catch (e) {
    console.error("Ошибка joinRoom:", e);

    if (e.message === "ROOM_DELETED") {
      alert("Комната уже удалена");
    } else if (e.message === "ROOM_DATA_ERROR") {
      alert("Ошибка данных комнаты");
    } else if (e.message === "ROOM_UNAVAILABLE") {
      alert("Эта комната уже недоступна");
    } else if (e.message === "ROOM_FULL") {
      alert("Комната заполнена");
    } else if (e.message === "JOIN_RETRY" || e?.code === "resource-exhausted") {
      alert("Сервер комнаты был перегружен. Попробуй ещё раз через пару секунд.");
    } else {
      alert("Не удалось войти в комнату. Попробуй ещё раз.");
    }

    restoreRoomsLobby({
      message: "Загрузка комнат...",
      keepModalOpen: true,
      reloadRooms: true
    });
  } finally {
    isJoiningRoom = false;
    if (!currentRoomId) {
      setCreateRoomButtonVisible(true);
    }
  }
}

async function tryStartRoom(roomId) {
  const roomRef = db.collection("rooms").doc(roomId);

  try {
    await runRoomTransaction(roomRef, async (transaction) => {
      const doc = await transaction.get(roomRef);
      if (!doc.exists) return;

      const room = doc.data();
      if (!room || !Array.isArray(room.playerIds)) return;
      if (!isCurrentClientRoomWriteDriver(room)) return;
      if (room.gameState?.started || room.status === "finished") return;

      const playersCount = getRenderableRoomPlayerIds(room).length;
      const startAtMs = getRoomTimeMs(room.startAt);
      const countdownSeconds = 120;
      const countdownLeft = startAtMs
        ? Math.max(0, countdownSeconds - Math.floor((getSyncedServerNowMs() - startAtMs) / 1000))
        : null;

      if (playersCount >= 3) {
        transaction.update(roomRef, {
          status: "playing",
          updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
          "gameState.started": true,
          "gameState.playingStartedAt": firebase.firestore.FieldValue.serverTimestamp()
        });
        return;
      }

      if (playersCount < 2) {
        if (room.startAt) {
          transaction.update(roomRef, {
            startAt: null,
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
          });
        }
        return;
      }

      if (!room.startAt) {
        transaction.update(roomRef, {
          startAt: firebase.firestore.FieldValue.serverTimestamp(),
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        return;
      }

      if (countdownLeft !== null && countdownLeft <= 0) {
        transaction.update(roomRef, {
          status: "playing",
          updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
          "gameState.started": true,
          "gameState.playingStartedAt": firebase.firestore.FieldValue.serverTimestamp()
        });
      }
    }, "tryStartRoom");
  } catch (e) {
    console.error("Ошибка tryStartRoom:", e);
  }
}

function openRoomScreen(roomId, optimisticRoom = null) {
  const screenRoomId = roomId;
  const list = document.getElementById("roomsList");
  const roomRef = db.collection("rooms").doc(roomId);

  stopRoomsListListener();
  stopCurrentRoomRealtime();

  currentRoomId = roomId;
  isLeavingRoom = false;
  multiplayerGameStarted = false;
  multiplayerStartInProgress = false;
  resetServerClockSync();
  setCreateRoomButtonVisible(false);
  startRoomPresence(roomId);

  let latestRoom = optimisticRoom;

  function renderRoom(room) {
    if (!list) return;
    if (currentRoomId !== screenRoomId || isLeavingRoom) return;

    if (!room || !Array.isArray(room.playerIds)) {
      list.innerHTML = "Подключение к комнате...";
      return;
    }

    const activePlayerIds = getRenderableRoomPlayerIds(room);
    const playersNames = getRenderableRoomPlayerNames(room);
    const { id: selfId } = getCurrentPlayer();

    if (!activePlayerIds.includes(selfId)) {
      restoreRoomsLobby({
        message: "Ты вышел из комнаты",
        keepModalOpen: true,
        reloadRooms: true
      });
      return;
    }

    let timerText = "";
    if (!room.gameState?.started && activePlayerIds.length >= 2) {
      const startAtMs = getRoomTimeMs(room.startAt);
      const leftSec = startAtMs
        ? Math.max(0, 120 - Math.floor((getSyncedServerNowMs() - startAtMs) / 1000))
        : 120;

      timerText = `<br>Старт через: ${leftSec} сек`;
    }

    list.innerHTML = `
      Игроки: ${activePlayerIds.length}/3 <br><br>
      ${playersNames.join("<br>")}
      ${timerText}
      <br><br>
      <div onclick="leaveRoom('${roomId}')" style="background:#dc3545;padding:10px;border-radius:10px;text-align:center;">
        Выйти из комнаты
      </div>
    `;
  }

  async function processRoomState(room) {
    if (!room) return;

    latestRoom = room;
    syncServerClockFromRoom(room);
    renderRoom(room);

    const isStarted = room?.gameState?.started === true || room?.status === "playing";
    if (isStarted) {
      stopRoomCountdown();

      if (!multiplayerGameStarted) {
        multiplayerGameStarted = true;
        startMultiplayerGame(roomId);
      }
      return;
    }

    const playersCount = getRenderableRoomPlayerIds(room).length;
    const shouldMaintainRoomStartState = playersCount >= 2 || !!room.startAt || isRoomProbablyStale(room);

    if (shouldMaintainRoomStartState && isCurrentClientRoomWriteDriver(room)) {
      await maybeRunRoomMaintenance(roomId, room);
    }
  }

  if (list) {
    if (optimisticRoom) {
      renderRoom(optimisticRoom);
    } else {
      list.innerHTML = "Подключение к комнате...";
    }
  }

  currentRoomListener = roomRef.onSnapshot(async (doc) => {
    if (currentRoomId !== screenRoomId || isLeavingRoom) return;

    if (!doc.exists) {
      restoreRoomsLobby({
        message: "Комната была удалена",
        keepModalOpen: true,
        reloadRooms: true
      });
      return;
    }

    try {
      await processRoomState(doc.data());
    } catch (e) {
      console.error("Ошибка обработки комнаты:", e);
    }
  }, async (error) => {
    console.error("Ошибка realtime комнаты:", error);

    if (currentRoomId !== screenRoomId || isLeavingRoom) return;

    try {
      const doc = await getRoomDocumentDirect(roomId);

      if (!doc.exists) {
        restoreRoomsLobby({
          message: "Комната была удалена",
          keepModalOpen: true,
          reloadRooms: true
        });
        return;
      }

      await processRoomState(doc.data());
    } catch (e) {
      console.error("Ошибка fallback комнаты:", e);
    }
  });

  roomCountdownInterval = setInterval(() => {
    if (currentRoomId !== screenRoomId || isLeavingRoom) return;
    if (!latestRoom) return;

    renderRoom(latestRoom);

    const isStarted = latestRoom?.gameState?.started === true || latestRoom?.status === "playing";
    if (isStarted) {
      stopRoomCountdown();

      if (!multiplayerGameStarted) {
        multiplayerGameStarted = true;
        startMultiplayerGame(roomId);
      }
    }
  }, 1000);
}

function startMultiplayerGame(roomId) {
  if (!roomId || multiplayerStartInProgress) return;

async function leaveRoom(roomId) {
  if (!roomId || isLeavingRoom) return;

  isLeavingRoom = true;

  const { id } = getCurrentPlayer();
  const roomRef = db.collection("rooms").doc(roomId);

  stopCurrentRoomRealtime();
  currentRoomId = null;
  resetServerClockSync();
  multiplayerGameStarted = false;
  multiplayerStartInProgress = false;
  setCreateRoomButtonVisible(false);
  setRoomsListMessage("Выход из комнаты...");

  try {
    await runRoomTransaction(roomRef, async (transaction) => {
      const doc = await transaction.get(roomRef);
      if (!doc.exists) return;

      const room = doc.data();
      if (!room || !Array.isArray(room.playerIds)) return;

      const isStarted = room.gameState?.started === true || room.status === "playing";
      if (isStarted) {
        throw new Error("ROOM_ALREADY_STARTED");
      }

      const activePlayerIds = getRenderableRoomPlayerIds(room);
      const newPlayerIds = activePlayerIds.filter((pid) => pid !== id);

      if (newPlayerIds.length === 0) {
        transaction.delete(roomRef);
        return;
      }

      const newPlayerNames = { ...(room.playerNames || {}) };
      delete newPlayerNames[id];

      const updateData = {
        playerIds: newPlayerIds,
        playerNames: newPlayerNames,
        hostId: room.hostId && newPlayerIds.includes(room.hostId) ? room.hostId : newPlayerIds[0],
        updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
        [`gameState.playersData.${id}`]: firebase.firestore.FieldValue.delete(),
        [`gameState.playersReady.${id}`]: firebase.firestore.FieldValue.delete()
      };

      if (newPlayerIds.length < 2) {
        updateData.startAt = null;
      }

      transaction.update(roomRef, updateData);
    }, "leaveRoom");
  } catch (e) {
    if (e.message === "ROOM_ALREADY_STARTED") {
      isLeavingRoom = false;
      currentRoomId = roomId;
      openRoomScreen(roomId);
      return;
    }

    console.error("Ошибка выхода из комнаты:", e);
  } finally {
    restoreRoomsLobby({
      message: "Загрузка комнат...",
      keepModalOpen: true,
      reloadRooms: true
    });
  }
}

        console.log("Ошибка загрузки " + src);
        resolve(false);
      };
      image.src = src;
    });
  }

  function getRoadCenter() {
    return (roadLeft + roadRight) / 2;
  }

  function getLaneCenter(slot) {
    const roadCenter = getRoadCenter();
    if (slot === "left") return canvas.width * (roadCenter - laneOffset);
    if (slot === "right") return canvas.width * (roadCenter + laneOffset);
    return canvas.width * roadCenter;
  }

  function getGroundY() {

    return text.length > 10 ? text.slice(0, 10) + "…" : text;

  }

  function getYFromPositionRatio(ratio) {
    if (typeof ratio !== "number" || Number.isNaN(ratio)) {
      return getGroundY();
    }
    return clamp(ratio * canvas.height, 0, getGroundY());
  }

  function quantizeRatio(value, step = REMOTE_SYNC_POSITION_STEP) {
    const safeStep = Number(step) > 0 ? Number(step) : 0.006;
    return Number((Math.round((Number(value || 0) / safeStep)) * safeStep).toFixed(4));
  }

  function getVelocityRatio() {

            centerSpawnIntervalMs: Number(existing.centerSpawnIntervalMs || DEFAULT_SHARED_RACE.centerSpawnIntervalMs),
            rightSpawnIntervalMs: Number(existing.rightSpawnIntervalMs || DEFAULT_SHARED_RACE.rightSpawnIntervalMs),
            speedBase: Number(existing.speedBase || DEFAULT_SHARED_RACE.speedBase),
            speedGainPerTick: Number(existing.speedGainPerTick || DEFAULT_SHARED_RACE.speedGainPerTick)
          };
        }

        const config = { ...DEFAULT_SHARED_RACE };

        transaction.update(roomRef, {
          updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
          "gameState.sharedRace": config
        });

        return config;
      }, "ensureSharedRaceConfig");

      if (result && result.centerSpawnIntervalMs) {
        return result;
      }
    } catch (e) {
      console.error("Ошибка ensureSharedRaceConfig:", e);
    }

    return { ...DEFAULT_SHARED_RACE };
  }

  function getOrderedActivePlayerIds(room) {
    if (!room || !Array.isArray(room.playerIds)) return [];
    return room.playerIds.filter((pid) => {
      if (!pid) return false;
      const p = room.gameState?.playersData?.[pid] || {};
      return p.leftRoom !== true;
    });
  }

  function getRemoteSlotForPlayer(targetPlayerId) {
    const orderedIds = getOrderedActivePlayerIds(latestGameRoomState);
    const otherIds = orderedIds.filter((pid) => pid !== playerId);

    if (otherIds.length <= 0) return null;
    if (otherIds.length === 1) {
      return targetPlayerId === otherIds[0] ? "left" : null;
    }

    if (otherIds[0] === targetPlayerId) return "left";
    if (otherIds[1] === targetPlayerId) return "right";
    return null;
  }

  function getRemotePlayersForRender() {
    const room = latestGameRoomState;
    if (!room?.gameState?.playersData) return [];

    const activeRemoteIds = getOrderedActivePlayerIds(room)
      .filter((pid) => pid !== playerId)
      .slice(0, 2);

    Object.keys(remoteVisualState).forEach((pid) => {
      if (!activeRemoteIds.includes(pid)) {
        delete remoteVisualState[pid];
      }
    });

    const gravityRatioPerFrame = player.gravity / Math.max(canvas.height || 1, 1);
    const maxRatio = getPositionRatioFromY(getGroundY());

    return activeRemoteIds
      .map((pid) => {
        const data = room.gameState.playersData[pid] || {};
        const targetRatio = typeof data.positionRatio === "number" ? data.positionRatio : 0;
        const velocityRatio = typeof data.velocityRatio === "number" ? data.velocityRatio : 0;
        const sourceRevision = `${data.clientUpdatedAt || 0}:${targetRatio}:${velocityRatio}:${data.grounded === true ? 1 : 0}:${data.lost === true ? 1 : 0}`;

        if (!remoteVisualState[pid]) {
          remoteVisualState[pid] = {
            visualRatio: targetRatio,
            sourceRevision,
            syncedRatio: targetRatio,
            velocityRatio,
            grounded: data.grounded === true,
            lastLocalSyncAt: performance.now()
          };
        }

        const visualState = remoteVisualState[pid];

        if (visualState.sourceRevision !== sourceRevision) {
          visualState.sourceRevision = sourceRevision;
          visualState.syncedRatio = targetRatio;
          visualState.velocityRatio = velocityRatio;
          visualState.grounded = data.grounded === true;
          visualState.lastLocalSyncAt = performance.now();
        }

        let predictedRatio = targetRatio;

        if (data.alive !== false && data.lost !== true && visualState.grounded !== true) {
          const ageMs = Math.min(REMOTE_EXTRAPOLATION_LIMIT_MS, Math.max(0, performance.now() - visualState.lastLocalSyncAt));
          const framesSinceSync = ageMs / 16.67;
          predictedRatio = visualState.syncedRatio + (visualState.velocityRatio * framesSinceSync) + (0.5 * gravityRatioPerFrame * framesSinceSync * framesSinceSync);
        }

        predictedRatio = clamp(predictedRatio, 0, maxRatio);
        const lerpFactor = Math.max(0.28, Math.min(0.72, 0.24 + Math.abs(predictedRatio - visualState.visualRatio) * 8));
        visualState.visualRatio += (predictedRatio - visualState.visualRatio) * lerpFactor;

        return {
          id: pid,
          slot: getRemoteSlotForPlayer(pid),
          name: data.name || room.playerNames?.[pid] || "Игрок",
          positionRatio: visualState.visualRatio,
          alive: data.alive !== false,
          lost: data.lost === true,
          score: Number(data.score || 0),
          crashObstacleZ: typeof data.crashObstacleZ === "number" ? data.crashObstacleZ : null,
          crashPositionRatio: typeof data.crashPositionRatio === "number" ? data.crashPositionRatio : null
        };
      })
      .filter(item => item.slot);
  }

  function buildObstacleDrawData(slot, obstacle) {
    const scale = 1 - obstacle.z;
    const size = 60 * scale;
    const laneCenter = getLaneCenter(slot);
    const x = canvas.width / 2 + (laneCenter - canvas.width / 2) * scale - size / 2;
    const y = 100 + (canvas.height - 200) * scale;
    return { x, y, size, scale };
  }

  function createObstacle(slot, z = 1, passed = false) {
    return { slot, z, passed };
  }

  function resetSpawnState() {
    spawnStarted = false;
    spawnAccumulator1 = 0;
    spawnAccumulator2 = 0;
    spawnAccumulator3 = 0;
  }

  function spawnObstacle1() {
    if (!gameStarted) return;
    obstacles1.push(createObstacle("left"));
  }

  function spawnObstacle2() {
    if (!gameStarted) return;
    obstacles2.push(createObstacle("center", 1, false));
  }

  function spawnObstacle3() {
    if (!gameStarted) return;
    obstacles3.push(createObstacle("right"));
  }

  function startSpawnIfNeeded() {
    if (spawnStarted) return;
    spawnStarted = true;

    spawnAccumulator1 = 0;
    spawnAccumulator2 = 0;
    spawnAccumulator3 = 0;

    spawnObstacle1();
    spawnObstacle2();
    spawnObstacle3();

  async function prepareGameAssets() {
    await Promise.all([
      loadImage("beaver.png", beaver),
      loadImage("log.png", log)
    ]);
  }

  function jump() {
    if (player.grounded && !player.gameOver && gameStarted) {
      player.dy = player.jump;
      player.grounded = false;
    }
  }

  let lastSentSyncState = {
    positionRatio: null,
    velocityRatio: null,
    grounded: null,
    alive: null,
    lost: null,
    score: null,
    firstObstacleResolved: null,
    sentAt: 0
  };

  async function syncLocalPlayerState(force = false) {
    if (!currentRoomId) return;

    const roomRef = db.collection("rooms").doc(currentRoomId);
    const positionRatioRaw = getPositionRatioFromY(player.y);
    const positionRatio = quantizeRatio(positionRatioRaw);
    const velocityRatio = getVelocityRatio();
    const now = Date.now();

    playerState.positionRatio = positionRatio;
    playerState.velocityRatio = velocityRatio;
    playerState.alive = !playerLost;
    playerState.grounded = player.grounded;
    playerState.lost = playerLost;
    playerState.score = score;
    playerState.firstObstacleResolved = firstObstacleResolved;

    const positionChanged =
      lastSentSyncState.positionRatio === null ||
      Math.abs(lastSentSyncState.positionRatio - positionRatio) >= REMOTE_SYNC_POSITION_STEP;

    const velocityChanged =
      lastSentSyncState.velocityRatio === null ||
      Math.abs(lastSentSyncState.velocityRatio - velocityRatio) >= 0.0025;

    const stateChanged =
      lastSentSyncState.grounded !== player.grounded ||
      lastSentSyncState.alive !== !playerLost ||
      lastSentSyncState.lost !== playerLost ||
      lastSentSyncState.score !== score ||
      lastSentSyncState.firstObstacleResolved !== firstObstacleResolved ||
      velocityChanged;

    const enoughTimePassed = now - lastSentSyncState.sentAt >= SYNC_INTERVAL_MS;

    if (!force && !stateChanged && !(positionChanged && enoughTimePassed)) {
      return;
    }

    const updateData = {
      [`gameState.playersData.${playerId}.name`]: name,
      [`gameState.playersData.${playerId}.position`]: Math.round(player.y),
      [`gameState.playersData.${playerId}.positionRatio`]: positionRatio,
      [`gameState.playersData.${playerId}.velocityRatio`]: velocityRatio,
      [`gameState.playersData.${playerId}.alive`]: !playerLost,
      [`gameState.playersData.${playerId}.grounded`]: player.grounded,
      [`gameState.playersData.${playerId}.lost`]: playerLost,
      [`gameState.playersData.${playerId}.score`]: score,
      [`gameState.playersData.${playerId}.firstObstacleResolved`]: firstObstacleResolved,
      [`gameState.playersData.${playerId}.clientUpdatedAt`]: now
    };

    if (playerLost) {
      updateData[`gameState.playersData.${playerId}.crashObstacleZ`] = typeof playerState.crashObstacleZ === "number" ? playerState.crashObstacleZ : null;
      updateData[`gameState.playersData.${playerId}.crashPositionRatio`] = typeof playerState.crashPositionRatio === "number" ? playerState.crashPositionRatio : null;
    } else if (force) {
      updateData[`gameState.playersData.${playerId}.crashObstacleZ`] = null;
      updateData[`gameState.playersData.${playerId}.crashPositionRatio`] = null;
    }

    try {
      const ok = await safeRoomUpdate(roomRef, updateData, "syncLocalPlayerState");
      if (ok !== false) {
        lastSentSyncState = {
          positionRatio,
          velocityRatio,
          grounded: player.grounded,
          alive: !playerLost,
          lost: playerLost,
          score,
          firstObstacleResolved,
          sentAt: now
        };
      }
    } catch (err) {
      console.error("Ошибка синхронизации игрока:", err);
    }
  }

  if (currentRoomId) {
    syncLocalPlayerState(true);

    syncInterval = setInterval(() => {
      if (!currentRoomId) return;
      syncLocalPlayerState(false);
    }, SYNC_INTERVAL_MS);

    winnerCheckInterval = setInterval(() => {
      if (!gameStarted || !currentRoomId || winnerProcessing) return;
      if (!latestGameRoomState) return;
      if (!isCurrentClientRoomWriteDriver(latestGameRoomState)) return;
      checkWinner();
    }, 2200);
  }

  if (gameBeforeUnloadHandler) {

  if (gameCanvasClickHandler) {
    canvas.removeEventListener("click", gameCanvasClickHandler);

  gameCanvasClickHandler = (e) => {
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    if (
      showExitButton &&
      x > exitToMenuBtn.x && x < exitToMenuBtn.x + exitToMenuBtn.w &&
      y > exitToMenuBtn.y && y < exitToMenuBtn.y + exitToMenuBtn.h
    ) {
      leaveAfterLoss();
      return;
    }

    if (player.gameOver) {
      if (
        x > watchBtn.x && x < watchBtn.x + watchBtn.w &&
        y > watchBtn.y && y < watchBtn.y + watchBtn.h
      ) {
        player.gameOver = false;
        player.dy = 0;
        player.grounded = true;

        if (player.frozenX !== undefined && player.frozenX !== null) {
          player.x = player.frozenX;
          player.y = player.frozenY;
        }

        showExitButton = true;
        return;
      }

      if (
        x > exitBtn.x && x < exitBtn.x + exitBtn.w &&
        y > exitBtn.y && y < exitBtn.y + exitBtn.h
      ) {
        leaveAfterLoss();
        return;
      }

      return;
    }

    jump();
  };

  canvas.addEventListener("click", gameCanvasClickHandler);

  if (gameCanvasTouchHandler) {
    canvas.removeEventListener("touchstart", gameCanvasTouchHandler);
  }

  gameCanvasTouchHandler = (e) => {
    e.preventDefault();

    const touch = e.touches[0];
    const rect = canvas.getBoundingClientRect();
    const x = touch.clientX - rect.left;
    const y = touch.clientY - rect.top;

    if (
      showExitButton &&
      x > exitToMenuBtn.x && x < exitToMenuBtn.x + exitToMenuBtn.w &&
      y > exitToMenuBtn.y && y < exitToMenuBtn.y + exitToMenuBtn.h
    ) {
      leaveAfterLoss();
      return;
    }

    if (player.gameOver) {
      if (
        x > watchBtn.x && x < watchBtn.x + watchBtn.w &&
        y > watchBtn.y && y < watchBtn.y + watchBtn.h
      ) {
        player.gameOver = false;
        player.dy = 0;
        player.grounded = true;

        if (player.frozenX !== undefined && player.frozenX !== null) {
          player.x = player.frozenX;
          player.y = player.frozenY;
        }

        showExitButton = true;
        return;
      }

      if (
        x > exitBtn.x && x < exitBtn.x + exitBtn.w &&
        y > exitBtn.y && y < exitBtn.y + exitBtn.h
      ) {
        leaveAfterLoss();
        return;
      }

      return;
    }

    jump();
  };

  canvas.addEventListener("touchstart", gameCanvasTouchHandler);

  function updatePlayer() {
    if (!player.gameOver && gameStarted) {
      player.dy += player.gravity * deltaTime;
      player.y += player.dy * deltaTime;
    }

    const groundY = getGroundY();

    if (player.y >= groundY) {
      player.y = groundY;
      player.dy = 0;
      player.grounded = true;
    }

    player.x = getLaneCenter("center") - player.width / 2;
    playerState.positionRatio = getPositionRatioFromY(player.y);
    playerState.velocityRatio = getVelocityRatio();
    playerState.alive = !playerLost;
    playerState.grounded = player.grounded;
  }

  function updateObstacleArray(arr) {
    arr.forEach(o => {
      o.z -= (gameSpeed + (1 - o.z) * 0.015) * deltaTime;
    });
    return arr.filter(o => o.z > 0);
  }

  function updateObstacles1() {
    if (gameStarted) {
      obstacles1 = updateObstacleArray(obstacles1);
    }
  }

  function updateObstacles2() {
    if (gameStarted) {
      obstacles2 = updateObstacleArray(obstacles2);
    }
  }

  function updateObstacles3() {
    if (gameStarted) {
      obstacles3 = updateObstacleArray(obstacles3);
    }
  }

  function drawRoad() {
    ctx.fillStyle = "#555";
    ctx.beginPath();
    ctx.moveTo(canvas.width * roadLeft, canvas.height);
    ctx.lineTo(canvas.width * roadRight, canvas.height);
    ctx.lineTo(canvas.width * (roadRight - 0.2), 0);
    ctx.lineTo(canvas.width * (roadLeft + 0.2), 0);
    ctx.closePath();
    ctx.fill();
  }

  function drawObstacleSet(arr) {
    arr.forEach(o => {
      const drawData = buildObstacleDrawData(o.slot, o);
      ctx.drawImage(log, drawData.x, drawData.y, drawData.size, drawData.size);
    });
  }

  function drawObstacles1() {
    drawObstacleSet(obstacles1);
  }

  async function handleLocalCrash(o, drawData) {
    frozenObstacle = { x: drawData.x, y: drawData.y, size: drawData.size };
    player.frozenX = player.x;
    player.frozenY = player.y;
    obstacles2 = [];
    player.gameOverText = "Ты врезался! Счёт: " + score;

    saveBestScore(score);

    player.gameOver = true;
    playerLost = true;
    playerState.alive = false;
    playerState.lost = true;
    playerState.velocityRatio = 0;
    playerState.firstObstacleResolved = true;
    playerState.crashObstacleZ = Number(o.z.toFixed(5));
    playerState.crashPositionRatio = getPositionRatioFromY(player.y);
    firstObstacleResolved = true;

    await syncLocalPlayerState(true);

    (async () => {
      await markPlayerAsLost();
      await markPendingDuelFinish();
    })();
  }

  function drawObstacles2() {
    if (frozenObstacle) {
      ctx.drawImage(log, frozenObstacle.x, frozenObstacle.y, frozenObstacle.size, frozenObstacle.size);
    }

    if (!player.gameOver) {
      for (let i = 0; i < obstacles2.length; i++) {
        const o = obstacles2[i];
        const drawData = buildObstacleDrawData("center", o);

        ctx.drawImage(log, drawData.x, drawData.y, drawData.size, drawData.size);

        if (
          drawData.scale > 0.85 &&
          player.x < drawData.x + drawData.size &&
          player.x + player.width > drawData.x &&
          player.y < drawData.y + drawData.size &&
          player.y + player.height > drawData.y
        ) {
          handleLocalCrash(o, drawData);
          return;
        }

        if (!o.passed && o.z < 0.05 && !player.gameOver) {
          o.passed = true;

          if (!firstObstacleResolved) {
            firstObstacleResolved = true;
            playerState.firstObstacleResolved = true;
          }

          if (!player.grounded) {
            score++;
            playerState.score = score;

            if (currentRoomId) {
              const roomRef = db.collection("rooms").doc(currentRoomId);
              const finalScore = score;

              (async () => {
                const duelLikelyPending =
                  latestGameRoomState?.gameState?.pendingFinish?.active === true &&
                  latestGameRoomState?.gameState?.pendingFinish?.winnerId === playerId &&
                  latestGameRoomState?.gameState?.pendingFinish?.resolved !== true;

                if (duelLikelyPending) {
                  const duelResolved = await resolvePendingDuelFinishIfNeeded(roomRef, finalScore);
                  if (duelResolved) {
                    return;
                  }
                }

                await safeRoomUpdate(roomRef, {
                  [`gameState.playersData.${playerId}.score`]: finalScore,
                  [`gameState.playersData.${playerId}.firstObstacleResolved`]: true
                }, "drawObstacles2.scoreUpdate");
              })().catch(err => console.error("Ошибка обновления счёта:", err));
            }
          }
        }
      }
    } else {
      obstacles2.forEach((o) => {
        const drawData = buildObstacleDrawData("center", o);
        ctx.drawImage(log, drawData.x, drawData.y, drawData.size, drawData.size);
      });
    }
  }

  function drawNicknameLabel(centerX, y, text, alpha = 1) {
    const label = truncateName(text);
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.font = REMOTE_LABEL_FONT;
    ctx.textAlign = "center";
    const metrics = ctx.measureText(label);
    const paddingX = 8;
    const width = metrics.width + paddingX * 2;
    const height = 20;
    const boxX = centerX - width / 2;
    const boxY = y + 58;

    ctx.fillStyle = "rgba(0,0,0,0.5)";
    roundRect(ctx, boxX, boxY, width, height, 10);
    ctx.fillStyle = "#fff";
    ctx.fillText(label, centerX, boxY + 14);
    ctx.restore();
  }

  function drawRemotePlayers() {
    const remotes = getRemotePlayersForRender();

    remotes.forEach((remote) => {
      const centerX = getLaneCenter(remote.slot);
      const y = getYFromPositionRatio(remote.positionRatio);
      const x = centerX - REMOTE_PLAYER_SIZE / 2;
      const alpha = remote.lost ? 0.45 : 0.95;

      if (remote.lost && typeof remote.crashObstacleZ === "number") {
        const frozenDraw = buildObstacleDrawData(remote.slot, { z: remote.crashObstacleZ });
        ctx.save();
        ctx.globalAlpha = 0.95;
        ctx.drawImage(log, frozenDraw.x, frozenDraw.y, frozenDraw.size, frozenDraw.size);
        ctx.restore();
      }

      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.drawImage(beaver, x, y, REMOTE_PLAYER_SIZE, REMOTE_PLAYER_SIZE);
      ctx.restore();

      drawNicknameLabel(centerX, y, remote.name, alpha);
    });
  }

  function drawPlayer() {
    const drawX = (frozenObstacle && !player.gameOver && player.frozenX != null) ? player.frozenX : player.x;
    const drawY = (frozenObstacle && !player.gameOver && player.frozenY != null) ? player.frozenY : player.y;

    if (playerLost) {

      ctx.globalAlpha = 0.45;

      ctx.drawImage(beaver, drawX, drawY, player.width, player.height);

    drawNicknameLabel(getLaneCenter("center"), drawY, name, playerLost ? 0.6 : 1);

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
    ctx.fill();
  }

  function drawExitButton() {
    if (!showExitButton) return;

  function drawStartTimer() {
    ctx.fillStyle = "rgba(0,0,0,0.5)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#fff";
    ctx.textAlign = "center";

    if (!syncedCountdownStartedAtMs) {
      const playerIds = Array.isArray(latestGameRoomState?.playerIds)
        ? latestGameRoomState.playerIds.filter(Boolean)
        : [];
      const playersReady = latestGameRoomState?.gameState?.playersReady || {};
      const readyCount = playerIds.filter(pid => playersReady[pid] === true).length;
      const totalCount = playerIds.length || 1;

      ctx.font = "bold 34px Arial";
      ctx.fillText("Загрузка игры...", canvas.width / 2, canvas.height / 2 - 16);

      ctx.font = "24px Arial";
      ctx.fillText(`Готово игроков: ${readyCount}/${totalCount}`, canvas.width / 2, canvas.height / 2 + 26);
      return;
    }

    if (startTimer > 0) {
      ctx.font = "bold 80px Arial";
      ctx.fillText(startTimer, canvas.width / 2, canvas.height / 2);
    } else if (showStartText) {
      ctx.font = "bold 60px Arial";
      ctx.fillText("START", canvas.width / 2, canvas.height / 2);
    }
  }

  async function resolvePendingDuelFinishIfNeeded(roomRef, fallbackFinalScore) {
    if (!roomRef || !currentRoomId) return false;

    let resolved = false;
    let resolvedResultData = null;
    let resolvedScore = Number(fallbackFinalScore || 0);

    try {
      await runRoomTransaction(roomRef, async (transaction) => {
        const roomDoc = await transaction.get(roomRef);
        if (!roomDoc.exists) return;

        const room = roomDoc.data();
        if (!room?.gameState?.playersData) return;
        if (room.gameState.finished === true || room.status === "finished") return;

        const playersData = room.gameState.playersData || {};
        const pendingFinish = room.gameState.pendingFinish || null;

        const alivePlayers = Object.entries(playersData).filter(([_, p]) => {
          return p && p.alive === true && p.leftRoom !== true;
        });

        const loserPlayers = Object.entries(playersData).filter(([_, p]) => {
          return p && p.lost === true && p.leftRoom !== true;
        });

        const canResolveExistingPending =
          pendingFinish?.active === true &&
          pendingFinish.winnerId === playerId &&
          pendingFinish.resolved !== true;

        const isFallbackDuelState =
          alivePlayers.length === 1 &&
          loserPlayers.length === 1 &&
          alivePlayers[0][0] === playerId;

        if (!canResolveExistingPending && !isFallbackDuelState) {
          return;
        }

        const loserEntry = canResolveExistingPending
          ? loserPlayers.find(([pid]) => pid === pendingFinish.loserId) || loserPlayers[0]
          : loserPlayers[0];

        const loserId = loserEntry?.[0] || (canResolveExistingPending ? pendingFinish.loserId : null);
        const loserData = loserEntry?.[1] || {};
        const loserScore = canResolveExistingPending
          ? Number(pendingFinish.loserScore || loserData.score || 0)
          : Number(loserData.score || 0);

        const winnerData = playersData[playerId] || {};
        const winnerName = winnerData.name || room.playerNames?.[playerId] || name;
        const loserName = loserData.name || room.playerNames?.[loserId] || "Игрок";

        const finalScore = Math.max(Number(fallbackFinalScore || 0), loserScore + 1);
        resolvedScore = finalScore;
        score = finalScore;

        const finalResults = [
          {
            place: 1,
            name: winnerName,
            score: finalScore
          },
          {
            place: 2,
            name: loserName,
            score: loserScore
          }
        ];

        transaction.update(roomRef, {
          status: "finished",
          updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
          "gameState.finished": true,
          "gameState.started": false,
          "gameState.winner": winnerName,
          "gameState.results": finalResults,
          [`gameState.playersData.${playerId}.score`]: finalScore,
          [`gameState.playersData.${playerId}.firstObstacleResolved`]: true,
          "gameState.pendingFinish": {
            active: true,
            winnerId: playerId,
            loserId,
            loserScore,
            resolved: true,
            resolvedAt: Date.now(),
            finalWinnerScore: finalScore
          }
        });

        resolved = true;
        resolvedResultData = {
          winner: winnerName,
          results: finalResults
        };
      }, "resolvePendingDuelFinishIfNeeded");
    } catch (e) {
      console.error("Ошибка resolvePendingDuelFinishIfNeeded:", e);
      return false;
    }

    if (!resolved) {
      return false;
    }

    winnerProcessing = true;
    await saveBestScore(resolvedScore);

    if (resolvedResultData && !endGameShown) {
      try {
        const finishedDoc = await roomRef.get();
        if (finishedDoc.exists) {
          await ensureCurrentMatchHistorySaved(currentRoomId, finishedDoc.data());
        }
      } catch (e) {
        console.error("Ошибка финального сохранения истории:", e);
      }

      showEndGameModal(resolvedResultData);
    }

    return true;
  }

  function buildDrawResultIfNeeded(allLosersSorted, roomData, pendingFinish) {
    if (!Array.isArray(allLosersSorted) || allLosersSorted.length < 2) {
      return null;
    }

    const first = allLosersSorted[0];
    const second = allLosersSorted[1];

    if (!first || !second) return null;

    const firstScore = Number(first[1]?.score || 0);
    const secondScore = Number(second[1]?.score || 0);
    const firstLostAt = Number(first[1]?.lostAt || 0);
    const secondLostAt = Number(second[1]?.lostAt || 0);
    const lostAtDiffMs = Math.abs(firstLostAt - secondLostAt);
    const isSimultaneousCrash = firstLostAt > 0 && secondLostAt > 0 && lostAtDiffMs <= 1200;

    if (firstScore !== secondScore) {
      return null;
    }

    if (pendingFinish?.finalWinnerScore != null && !isSimultaneousCrash) {
      return null;
    }

    const results = [
      {
        place: 1,
        name: first[1]?.name || roomData.playerNames?.[first[0]] || "Игрок",
        score: firstScore
      },
      {
        place: 1,
        name: second[1]?.name || roomData.playerNames?.[second[0]] || "Игрок",
        score: secondScore
      }
    ];

    if (allLosersSorted[2]) {
      results.push({
        place: 3,
        name: allLosersSorted[2][1]?.name || roomData.playerNames?.[allLosersSorted[2][0]] || "Игрок",
        score: Number(allLosersSorted[2][1]?.score || 0)
      });
    }

    return {
      winnerLabel: "Ничья",
      results
    };
  }

        delete newPlayerNames[exitingPlayerId];
