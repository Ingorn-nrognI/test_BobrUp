<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu + Game</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #87CEEB;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* Верхняя панель */
.top-bar {
  display: flex;
  justify-content: space-between;
  padding: 15px;
  color: white;
  font-size: 18px;
}

.settings {
  cursor: pointer;
}

/* Центр */
.main {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 64px;                       /* увеличиваем размер */
  font-weight: bold;
  font-family: 'Arial Black', sans-serif; /* красивый жирный шрифт */
  color: #FFD700;                         /* золотой цвет */
  text-shadow: 3px 3px 8px rgba(0,0,0,0.6); /* красивое свечение */
  letter-spacing: 2px;                     /* расстояние между буквами */
}

/* Нижнее меню */
.bottom-bar {
  position: fixed;
  bottom: 20px;           /* чуть выше края экрана */
  left: 50%;              /* центрируем по горизонтали */
  transform: translateX(-50%); /* сдвигаем в центр */
  width: 90%;             /* чуть меньше полной ширины */
  max-width: 600px;       /* ограничиваем для больших экранов */
  display: flex;
  justify-content: space-around; /* равномерно распределяем кнопки */
  background: rgba(0, 0, 0, 0.6); /* полупрозрачный черный */
  padding: 15px 20px;
  border-radius: 50px;     /* делает панель овальной */
  box-sizing: border-box;
  box-shadow: 0 4px 10px rgba(0,0,0,0.3); /* небольшая тень */
}

.bottom-btn {
  flex: 1;
  margin: 0 10px;          /* отступ между кнопками */
  padding: 12px 0;
  text-align: center;
  color: white;
  cursor: pointer;
  border-radius: 25px;      /* овальные кнопки */
  background: #444;         /* базовый цвет */
  font-weight: bold;
  transition: 0.2s;
}

.bottom-btn.play {
  background: #28a745;      /* зеленая кнопка Играть */
}

.bottom-btn:hover {
  background: #555;
}

.bottom-btn:last-child {
  border-right: none;
}

.play {
  background: #28a745;
  font-weight: bold;
}

/* Canvas для игры */
#game {
  display: none; /* скрыт пока не играем */
  background: #87CEEB;
}
/* ========================
   Стили модалки таблицы
======================== */
#leaderboardModal {
  display: none;               /* изначально скрыта */
  position: fixed;
  top: 60px;                   /* под верхней панелью с ником */
  left: 20px;
  right: 20px;
  bottom: 100px;               /* над нижней панелью кнопок */
  background: rgba(0,0,0,0.9);
  color: white;
  padding: 20px;
  border-radius: 15px;
  z-index: 9999;
  overflow-y: auto;
  box-sizing: border-box;
}

.leaderboardHeader {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 15px;
}

.leaderboardHeader h2 {
  margin: 0;
  font-size: 22px;
}

.closeBtn {
  cursor: pointer;
  font-size: 22px;
}

#leaderboardContent {
  font-size: 18px;
  line-height: 1.5;
}
</style>
</head>

<body>

<!-- МЕНЮ -->
<div id="menu">
  <div class="top-bar">
    <div id="nickname">Игрок</div>
    <div class="settings" onclick="openSettings()">⚙️</div>
  </div>

  <div class="main">BobrUp</div>

  <div class="bottom-bar">
    <div class="bottom-btn" onclick="openLeaderboard()">📊 Таблица</div>
    <div class="bottom-btn play" onclick="startGame()">▶ Играть</div>
    <div class="bottom-btn" onclick="openSkins()">🎨 Скины</div>
  </div>
</div>

<!-- Canvas для игры -->
<canvas id="game" style="display: none;"></canvas>

<!-- Таблица лидеров (модалка) -->
<div id="leaderboardModal">
  <div class="leaderboardHeader">
    <h2>🏆 Таблица лидеров</h2>
    <span class="closeBtn" onclick="closeLeaderboard()">✖️</span>
  </div>
  <div id="leaderboardContent"></div>
</div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
// Получаем ник из Telegram
if (window.Telegram && Telegram.WebApp) {
  const user = Telegram.WebApp.initDataUnsafe.user;
  if (user) {
    document.getElementById("nickname").innerText =
      user.username || user.first_name;
  }
}

// ========================
// КНОПКИ МЕНЮ
// ========================

function startGame() {
  document.getElementById("menu").style.display = "none";
  document.getElementById("game").style.display = "block";
  
  // Запуск игры
  initGame();
}

function openLeaderboard() {
  let leaderboard = JSON.parse(localStorage.getItem("leaderboard")) || [];

  const contentDiv = document.getElementById("leaderboardContent");
  contentDiv.innerHTML = ""; // очищаем перед заполнением

  if (leaderboard.length === 0) {
    contentDiv.innerHTML = "<p>Пока нет рекордов</p>";
  } else {
    leaderboard.slice(0, 10).forEach((p, index) => {
      const row = document.createElement("div");
      row.textContent = `${index + 1}. ${p.name} — ${p.score}`;
      contentDiv.appendChild(row);
    });
  }

  document.getElementById("leaderboardModal").style.display = "block";
}

function closeLeaderboard() {
  document.getElementById("leaderboardModal").style.display = "none";
}

function saveBestScore(score) {
  const name = document.getElementById("nickname").innerText;

  let leaderboard = JSON.parse(localStorage.getItem("leaderboard")) || [];

  let player = leaderboard.find(p => p.name === name);

  if (player) {
    if (score > player.score) {
      player.score = score;
    }
  } else {
    leaderboard.push({ name: name, score: score });
  }

  leaderboard.sort((a, b) => b.score - a.score);

  localStorage.setItem("leaderboard", JSON.stringify(leaderboard));

  // Если таблица открыта — обновляем её автоматически
  if (document.getElementById("leaderboardModal").style.display === "block") {
    openLeaderboard();
  }
}
  
function openSkins() {
  alert("Скины");
}

function openSettings() {
  let lang = prompt("Выбери язык: ru / en");
  if (lang === "en") {
    alert("Language switched to English");
  } else {
    alert("Язык: Русский");
  }
}

// ========================
// ИГРА
// ========================
function initGame() {
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");

  // === НАСТРОЙКИ ДОРОГИ ===
  const roadLeft = 0.15;   // левый край дороги
  const roadRight = 0.85;  // правый край дороги
  const laneOffset = 0.2;  // расстояние от центра до боковых полос

  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  // Картинки
  const beaver = new Image();
  beaver.src = "beaver.png";
  beaver.onerror = () => console.log("Ошибка загрузки beaver.png");

  const log = new Image();
  log.src = "log.png";
  log.onerror = () => console.log("Ошибка загрузки log.png");

  // Игрок
  let player = {
    x: canvas.width / 2 - 30,
    y: canvas.height - 150,
    width: 60,
    height: 60,
    dy: 0,
    gravity: 0.8,
    jump: -15,
    grounded: true,
    gameOver: false,
    gameOverText: "Ты врезался!"
  };

  // Полосы на дороге
  const roadCenter = (roadLeft + roadRight) / 2;
  const lane1 = canvas.width * (roadCenter - laneOffset);
  const lane2 = canvas.width * roadCenter;
  const lane3 = canvas.width * (roadCenter + laneOffset);

  // Устанавливаем текущему игроку среднюю полосу
  player.x = lane2 - player.width / 2;

  // Препятствия
let obstacles1 = [];
let obstacles2 = [];
let obstacles3 = [];
let gameSpeed = 0.008;
let lastTime = performance.now();
let deltaTime = 1; // 👈 ДОБАВИТЬ ЭТО
let score = 0;
let gameStarted = false;   // игра ещё не началась
let startTimer = 3;        // таймер
let showStartText = true;  // показывать ли START
// Флаги для каждой полосы (кто в режиме наблюдателя)
let isWatching1 = false;  // левая полоса
let isWatching2 = false;  // средняя полоса (игрок)
let isWatching3 = false;  // правая полоса
  
  // Для хранения бревна, в которое врезался игрок
let frozenObstacle = null;
  
  // Кнопки для Game Over
  let exitBtn = {x: 0, y: 0, w: 0, h: 0};
  let watchBtn = {x: 0, y: 0, w: 0, h: 0};

    // Кнопка выхода в правом нижнем углу (для наблюдателя)
  let exitToMenuBtn = {x: 0, y: 0, w: 0, h: 0};
  let showExitButton = false;

  function spawnObstacle1() {
  if (!isWatching1) obstacles1.push({ x: lane1, z: 1 });
}

function spawnObstacle2() {
  if (!isWatching2) obstacles2.push({ x: lane2, z: 1, passed: false });
}

function spawnObstacle3() {
  if (!isWatching3) obstacles3.push({ x: lane3, z: 1 });
}

  function jump() {
    if (player.grounded && !player.gameOver) {
      player.dy = player.jump;
      player.grounded = false;
    }
  }

  // Обработчики событий
  canvas.addEventListener("click", (e) => {
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    if (showExitButton && 
      x > exitToMenuBtn.x && x < exitToMenuBtn.x + exitToMenuBtn.w &&
      y > exitToMenuBtn.y && y < exitToMenuBtn.y + exitToMenuBtn.h) {
    document.getElementById("menu").style.display = "flex";
    document.getElementById("game").style.display = "none";
    return;
  }
    if (player.gameOver) {
      // кнопка СМОТРЕТЬ
      if (x > watchBtn.x && x < watchBtn.x + watchBtn.w &&
    y > watchBtn.y && y < watchBtn.y + watchBtn.h) {
  isWatching2 = true;  // Останавливаем ТОЛЬКО среднюю полосу
  player.gameOver = false;
  player.dy = 0;
  player.grounded = true;
        
        if (player.frozenX !== undefined) {
    player.x = player.frozenX;
    player.y = player.frozenY;
  }
        showExitButton = true;
}
      // кнопка ВЫЙТИ
      if (x > exitBtn.x && x < exitBtn.x + exitBtn.w &&
          y > exitBtn.y && y < exitBtn.y + exitBtn.h) {
        location.reload();
      }
      return;
    }
    jump();
  });
  
  canvas.addEventListener("touchstart", (e) => {
  e.preventDefault();
  const touch = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  const x = touch.clientX - rect.left;
  const y = touch.clientY - rect.top;
    
    if (showExitButton && 
      x > exitToMenuBtn.x && x < exitToMenuBtn.x + exitToMenuBtn.w &&
      y > exitToMenuBtn.y && y < exitToMenuBtn.y + exitToMenuBtn.h) {
    document.getElementById("menu").style.display = "flex";
    document.getElementById("game").style.display = "none";
    return;
  }

  if (player.gameOver) {
    // кнопка СМОТРЕТЬ
    if (x > watchBtn.x && x < watchBtn.x + watchBtn.w &&
        y > watchBtn.y && y < watchBtn.y + watchBtn.h) {
      isWatching2 = true;  // Останавливаем ТОЛЬКО среднюю полосу
      player.gameOver = false;
      player.dy = 0;
      player.grounded = true;
      showExitButton = true
      // obstacles2 уже очищен при столкновении, так что ничего не делаем
    }
    // кнопка ВЫЙТИ
    if (x > exitBtn.x && x < exitBtn.x + exitBtn.w &&
        y > exitBtn.y && y < exitBtn.y + exitBtn.h) {
      location.reload();
    }
    return;
  }
  jump();
});

  function updatePlayer() {
  // ЕСЛИ ИГРОК НАБЛЮДАЕТ - НЕ ОБНОВЛЯЕМ ЕГО ФИЗИКУ
  if (!player.gameOver && gameStarted) {
    player.dy += player.gravity;
    player.y += player.dy;
  }
  
  if (player.y >= canvas.height - 150) {
    player.y = canvas.height - 150;
    player.dy = 0;
    player.grounded = true;
  }
}

  function updateObstacles1() {
  if (!isWatching1 && gameStarted) {
    obstacles1.forEach(o => {
      o.z -= (gameSpeed + (1 - o.z) * 0.015) * deltaTime;
    });
    obstacles1 = obstacles1.filter(o => o.z > 0);
  }
}

function updateObstacles2() {
  if (!isWatching2 && gameStarted) {
    obstacles2.forEach(o => {
      o.z -= (gameSpeed + (1 - o.z) * 0.015) * deltaTime;
    });
    obstacles2 = obstacles2.filter(o => o.z > 0);
  }
}

function updateObstacles3() {
  if (!isWatching3 && gameStarted) {
    obstacles3.forEach(o => {
      o.z -= (gameSpeed + (1 - o.z) * 0.015) * deltaTime;
    });
    obstacles3 = obstacles3.filter(o => o.z > 0);
  }
}

  function drawRoad() {
    ctx.fillStyle = "#555";
    ctx.beginPath();
    ctx.moveTo(canvas.width * roadLeft, canvas.height);
    ctx.lineTo(canvas.width * roadRight, canvas.height);
    ctx.lineTo(canvas.width * (roadRight - 0.2), 0);
    ctx.lineTo(canvas.width * (roadLeft + 0.2), 0);
    ctx.closePath();
    ctx.fill();
  }

  function drawObstacles1() {
    obstacles1.forEach(o => {
      let scale = 1 - o.z;
      let size = 60 * scale;
      let x = canvas.width / 2 + (lane1 - canvas.width / 2) * scale - size/2;
      let y = 100 + (canvas.height - 200) * scale;

      ctx.drawImage(log, x, y, size, size);
      
      if (!player.gameOver && scale > 0.85 &&
          player.x < x + size && player.x + player.width > x &&
          player.y < y + size && player.y + player.height > y) {
        player.gameOver = true;
      }
    });
  }

  function drawObstacles2() {
  // Рисуем замороженное бревно
  if (frozenObstacle) {
    ctx.drawImage(log, frozenObstacle.x, frozenObstacle.y, frozenObstacle.size, frozenObstacle.size);
  }
  
  if (!player.gameOver && !isWatching2) {
    obstacles2.forEach(o => {
      let scale = 1 - o.z;
      let size = 60 * scale;
      let x = canvas.width / 2 + (lane2 - canvas.width / 2) * scale - size/2;
      let y = 100 + (canvas.height - 200) * scale;

      ctx.drawImage(log, x, y, size, size);
      
      // ❗ 1. СНАЧАЛА проверка столкновения
      if (scale > 0.85 &&
          player.x < x + size && player.x + player.width > x &&
          player.y < y + size && player.y + player.height > y) {

        frozenObstacle = { x, y, size };

        player.frozenX = player.x;
        player.frozenY = player.y;

        obstacles2 = [];
        player.gameOverText = "Ты врезался! Счёт: " + score;
        saveBestScore(score);

        player.gameOver = true;
        return;
      }

      // ❗ 2. ОЧКИ ТОЛЬКО ЕСЛИ ПЕРЕПРЫГНУЛ
      if (!o.passed && o.z < 0.2) {
        o.passed = true;

        // 👇 ключевая логика
        if (!player.grounded && !player.gameOver) {
          score++;
        }
      }
    });
  }
}

  function drawObstacles3() {
    obstacles3.forEach(o => {
      let scale = 1 - o.z;
      let size = 60 * scale;
      let x = canvas.width / 2 + (lane3 - canvas.width / 2) * scale - size/2;
      let y = 100 + (canvas.height - 200) * scale;

      ctx.drawImage(log, x, y, size, size);
      
      if (!player.gameOver && scale > 0.85 &&
          player.x < x + size && player.x + player.width > x &&
          player.y < y + size && player.y + player.height > y) {
        player.gameOver = true;
      }
    });
  }

  function drawPlayer() {
  // Если есть замороженное бревно и игрок в режиме наблюдателя - рисуем на замороженной позиции
  if (frozenObstacle && isWatching2) {
    ctx.drawImage(beaver, player.frozenX || player.x, player.frozenY || player.y, player.width, player.height);
  } else {
    ctx.drawImage(beaver, player.x, player.y, player.width, player.height);
  }
}
// Сначала функция drawExitButton (отдельно)
function drawExitButton() {
  if (!showExitButton) return;
  
  const btnWidth = 100;
  const btnHeight = 45;
  const padding = 20;
  
  const btnX = canvas.width - btnWidth - padding;
  const btnY = canvas.height - btnHeight - padding;
  
  exitToMenuBtn = { x: btnX, y: btnY, w: btnWidth, h: btnHeight };
  
  ctx.fillStyle = "#dc3545";
  ctx.beginPath();
  ctx.roundRect(btnX, btnY, btnWidth, btnHeight, 10);
  ctx.fill();
  
  ctx.fillStyle = "#fff";
  ctx.font = "bold 16px Arial";
  ctx.textAlign = "center";
  ctx.fillText("Выйти", btnX + btnWidth/2, btnY + btnHeight/2 + 5);
}

// Потом функция drawGameOver (отдельно)
function drawGameOver() {
  // Фон (затемнение экрана)
  ctx.fillStyle = "rgba(0,0,0,0.5)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

    // ОВАЛЬНОЕ ОКНО
    const boxWidth = 300;
    const boxHeight = 180;
    const boxX = canvas.width / 2 - boxWidth / 2;
    const boxY = canvas.height / 2 - boxHeight / 2;

    // функция рисования закругленного прямоугольника
    function roundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
      ctx.fill();
    }

    // рисуем окно
    ctx.fillStyle = "rgba(0,0,0,0.7)";
    roundRect(boxX, boxY, boxWidth, boxHeight, 25);

    // ТЕКСТ
    ctx.fillStyle = "#fff";
    ctx.font = "22px Arial";
    ctx.textAlign = "center";
    ctx.fillText(player.gameOverText, canvas.width/2, boxY + 50);

    // КНОПКИ
    const btnWidth = 110;
    const btnHeight = 40;

    const watchX = boxX + 20;
    const watchY = boxY + 100;
    watchBtn = { x: watchX, y: watchY, w: btnWidth, h: btnHeight };

    ctx.fillStyle = "#28a745";
    roundRect(watchX, watchY, btnWidth, btnHeight, 15);
    ctx.fillStyle = "#fff";
    ctx.font = "16px Arial";
    ctx.fillText("Смотреть", watchX + btnWidth/2, watchY + 25);

    const exitX = boxX + boxWidth - btnWidth - 20;
    const exitY = watchY;
    exitBtn = { x: exitX, y: exitY, w: btnWidth, h: btnHeight };

    ctx.fillStyle = "#dc3545";
    roundRect(exitX, exitY, btnWidth, btnHeight, 15);
    ctx.fillStyle = "#fff";
    ctx.fillText("Выйти", exitX + btnWidth/2, exitY + 25);
  }

  function drawStartTimer() {
  ctx.fillStyle = "rgba(0,0,0,0.5)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "#fff";
  ctx.textAlign = "center";

  if (startTimer > 0) {
    ctx.font = "bold 80px Arial";
    ctx.fillText(startTimer, canvas.width / 2, canvas.height / 2);
  } else if (showStartText) {
    ctx.font = "bold 60px Arial";
    ctx.fillText("START", canvas.width / 2, canvas.height / 2);
  }
}
  function loop(currentTime) {
  deltaTime = (currentTime - lastTime) / 16.67; // нормализация под 60 FPS

// защита от скачков FPS
if (deltaTime > 3) deltaTime = 1;

  lastTime = currentTime;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawRoad();
    updatePlayer();
    updateObstacles1();
    updateObstacles2();
    updateObstacles3();
    drawObstacles1();
    drawObstacles2();
    drawObstacles3();
    drawPlayer();
    if (!gameStarted) {
  drawStartTimer();
}
    ctx.fillStyle = "#fff";
ctx.font = "20px Arial";
ctx.textAlign = "left";   // 👈 ВАЖНО: фикс выравнивания
ctx.fillText("Score: " + score, 20, 40);
    
    if (player.gameOver) {
      drawGameOver();
    }
    
    drawExitButton();
    
    if (gameStarted) {
  gameSpeed += 0.00001 * deltaTime;
}
    
    requestAnimationFrame(loop);
  }

  // Запуск спавна препятствий
  setInterval(spawnObstacle1, 1200);
  setInterval(spawnObstacle2, 1500);
  setInterval(spawnObstacle3, 1800);

  // Таймер перед стартом (ТОЛЬКО 1 РАЗ!)
let countdown = setInterval(() => {
  startTimer--;

  if (startTimer < 0) {
    showStartText = true;
  }

  if (startTimer < -1) {
  clearInterval(countdown);

  // 🔥 ОЧИЩАЕМ ВСЕ БРЕВНА
  obstacles1 = [];
  obstacles2 = [];
  obstacles3 = [];

  gameStarted = true;
  showStartText = false;
}
}, 1000);
  
  // Запуск игрового цикла
  requestAnimationFrame(loop);
}
</script>


</body>
</html>
