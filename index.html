<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu + Game</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow-x: hidden;
}

body {
  margin: 0;
  font-family: Arial;
  background: #87CEEB;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  width: 100%;
  position: relative;
  overflow: hidden;
}

/* Верхняя панель */
.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  padding: 20px;
  background: rgba(0,0,0,0.3);
  color: white;
  font-size: 20px;
  position: relative;
  z-index: 20;
}

.top-bar-left {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 10px;
}

.settings {
  cursor: pointer;
  font-size: 24px;
}

.mode-back-btn {
  display: none;
  padding: 8px 14px;
  border-radius: 18px;
  background: rgba(0,0,0,0.35);
  color: white;
  font-size: 15px;
  font-weight: bold;
  cursor: pointer;
  border: 1px solid rgba(255,255,255,0.12);
}

.mode-back-btn.visible {
  display: inline-flex;
  align-items: center;
  justify-content: center;
}

/* Экраны меню */
.menu-screen {
  display: none;
  flex: 1;
  position: relative;
}

.menu-screen.active {
  display: flex;
  flex-direction: column;
}

.main {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 64px;
  font-weight: bold;
  font-family: 'Arial Black', sans-serif;
  color: #FFD700;
  text-shadow: 3px 3px 8px rgba(0,0,0,0.6);
  letter-spacing: 2px;
  text-align: center;
  padding: 20px;
  box-sizing: border-box;
}

.mode-title {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 58px;
  font-weight: bold;
  font-family: 'Arial Black', sans-serif;
  color: #FFD700;
  text-shadow: 3px 3px 8px rgba(0,0,0,0.6);
  letter-spacing: 2px;
  text-align: center;
  padding: 20px;
  box-sizing: border-box;
}

.start-play-wrap {
  position: fixed;
  left: 50%;
  bottom: 26px;
  transform: translateX(-50%);
  width: min(45%, 260px);
  min-width: 170px;
  display: flex;
  flex-direction: column;
  align-items: center;
  z-index: 25;
}

.start-play-row {
  position: fixed;
  left: 50%;
  bottom: 26px;
  transform: translateX(calc(-50% + 150px));
  display: flex;
  align-items: center;
  z-index: 25;
}

.main-play-btn-wrap {
  width: 100%;
}

.main-play-btn {
  width: 100%;
  height: 54px;
  padding: 0 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  color: white;
  cursor: pointer;
  border-radius: 28px;
  background: #28a745;
  font-weight: bold;
  font-size: 22px;
  transition: 0.2s;
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);
  box-sizing: border-box;
}

.main-play-btn:hover {
  background: #23913d;
}

.main-book-btn {
  width: 56px;
  height: 56px;
  min-width: 56px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  cursor: pointer;
  border-radius: 50%;
  background: #444;
  font-size: 28px;
  transition: 0.2s;
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);
  user-select: none;
  box-sizing: border-box;
}

.main-book-btn:hover {
  background: #555;
}

.history-panel {
  display: none;
  position: fixed;
  top: 96px;
  left: 50%;
  width: min(88vw, 560px);
  transform: translateX(-50%);
  right: auto;
  bottom: 92px;
  padding: 22px 22px 22px 18px;
  border-radius: 24px;
  background: rgba(0, 0, 0, 0.82);
  color: white;
  box-shadow: 0 8px 24px rgba(0,0,0,0.35);
  box-sizing: border-box;
  z-index: 40;
  overflow: hidden;
}

.history-scroll-area {
  height: calc(100% - 54px);
  overflow-y: auto;
  overflow-x: hidden;
  padding-right: 16px;
  margin-right: 10px;
  scrollbar-width: thin;
  scrollbar-color: rgba(255, 215, 0, 0.82) transparent;
  scrollbar-gutter: stable;
}

.history-scroll-area::-webkit-scrollbar {
  width: 12px;
}

.history-scroll-area::-webkit-scrollbar-track {
  background: transparent;
  margin: 10px 0;
  border-radius: 999px;
}

.history-scroll-area::-webkit-scrollbar-thumb {
  background: linear-gradient(180deg, rgba(255, 226, 96, 0.98), rgba(212, 160, 0, 0.98));
  border-radius: 999px;
  border: 3px solid rgba(0, 0, 0, 0.62);
  box-shadow:
    inset 0 0 0 1px rgba(255, 244, 180, 0.22),
    0 0 0 1px rgba(255, 215, 0, 0.18);
}

.history-scroll-area::-webkit-scrollbar-thumb:hover {
  background: linear-gradient(180deg, rgba(255, 235, 128, 1), rgba(226, 173, 0, 1));
}

.history-scroll-area::-webkit-scrollbar-corner {
  background: transparent;
}

.history-panel.open {
  display: block;
}

.history-panel-title {
  font-size: 28px;
  font-weight: bold;
  margin-bottom: 14px;
}

.history-panel-text {
  font-size: 18px;
  line-height: 1.45;
  color: rgba(255,255,255,0.92);
}

.mode-popup {
  display: none;
  width: 100%;
  margin-bottom: 12px;
  padding: 10px;
  border-radius: 24px;
  background: rgba(0, 0, 0, 0.75);
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);

}

.mode-popup.open {

}

.mode-popup-btn {

  padding: 16px 14px;
  text-align: center;
  color: white;
  cursor: pointer;
  border-radius: 18px;
  background: #444;
  font-weight: bold;
  transition: 0.2s;
  box-sizing: border-box;
}

.mode-popup-btn:hover {

}

.mode-bottom-bar {

.bottom-btn {

}

.bottom-btn.play {

.bottom-btn:hover {

/* Canvas для игры */
#game {

/* Стили модалки таблицы */
#leaderboardModal {

.roomsHeader {

.history-match-card {

.history-match-mode {

.history-match-result {

</style>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script>
  
  let roomsListener = null;
let currentRoomListener = null;
let currentRoomId = null;
let winnerProcessing = false;

let roomCountdownInterval = null;
let roomHostCountdownInterval = null;
let multiplayerGameStarted = false;

let endGameWatcher = null;
let endGameShown = false;
let isClosingEndGame = false;
let endGameExitHandled = false;
let openEndGameForCurrentMatch = null;
let exitEndGameForCurrentMatch = null;
let activeLeaveAfterLossHandler = null;
let leaveAfterLossInProgress = false;
let lastRoomMaintenanceAt = 0;
let lastRoomStartAttemptAt = 0;

const ROOM_MAINTENANCE_THROTTLE_MS = 5000;
const ROOM_START_THROTTLE_MS = 1200;

function isCurrentPlayerHost(room) {
  if (!room) return false;
  const { id } = getCurrentPlayer();
  return String(room.hostId || "") === String(id);
}

async function scheduleRoomHostTasks(roomId, room, { force = false } = {}) {
  if (!roomId || currentRoomId !== roomId || !room) return;
  if (!isCurrentPlayerHost(room)) return;

  const now = Date.now();

  if (force || now - lastRoomMaintenanceAt >= ROOM_MAINTENANCE_THROTTLE_MS) {
    lastRoomMaintenanceAt = now;
    await cleanupInactivePlayers(roomId);
  }

  const roomStarted = room?.gameState?.started === true || room?.status === "playing";
  const roomFinished = room?.gameState?.finished === true || room?.status === "finished";

  if (roomStarted || roomFinished) return;

  if (force || now - lastRoomStartAttemptAt >= ROOM_START_THROTTLE_MS) {
    lastRoomStartAttemptAt = now;
    await tryStartRoom(roomId);
  }
}

let gameResizeHandler = null;
let gameBeforeUnloadHandler = null;
let gameCanvasClickHandler = null;
let gameCanvasTouchHandler = null;
let isCreatingRoom = false;
let isJoiningRoom = false;

let roomPresenceInterval = null;
let roomPresenceClickHandler = null;
let roomPresenceTouchHandler = null;
let roomVisibilityHandler = null;
let roomPageHideHandler = null;
let roomReadyPollInterval = null;
let gameCountdownStartListener = null;
let historyLoading = false;
let expandedHistoryMatchId = null;

const GAME_READY_BUFFER_MS = 350;
  
const ROOM_OFFLINE_GRACE_MS = 60 * 1000;              // 1 минута на возврат
const ROOM_PRESENCE_PING_MS = 15000;                  // heartbeat раз в 15 сек
const ROOM_ACTION_PING_THROTTLE_MS = 5000;            // не спамить записями
const ROOM_MAX_WAITING_LIFETIME_MS = 10 * 60 * 1000;  // максимум 10 минут на старт комнаты

let syncedServerNowOffsetMs = 0;
let serverClockSyncedOnce = false;

function getSyncedServerNowMs() {
  return Date.now() + syncedServerNowOffsetMs;
}

function resetServerClockSync() {
  syncedServerNowOffsetMs = 0;
  serverClockSyncedOnce = false;
}

function syncServerClockFromRoom(room) {
  if (!room) return;

  const updatedAt = room.updatedAt;

  // ВАЖНО:
  // синхронизируемся только по реальному serverTimestamp из Firestore.
  // При optimistic-рендере createRoom/joinRoom сюда может прилетать обычное число Date.now(),
  // из-за чего каждый клиент запоминает своё локальное время как серверное.
  // Именно это и даёт разный таймер перед START и несинхронный старт матча.
  if (!updatedAt || typeof updatedAt.toMillis !== "function") {
    return;
  }

  const updatedAtMs = updatedAt.toMillis();
  if (!updatedAtMs) return;

  // Синхронизируем часы только один раз при входе в комнату.
  // Если брать updatedAt на каждом snapshot, таймер будет прыгать
  // рывками на 5-10 секунд при очередных записях в Firestore.
  if (!serverClockSyncedOnce) {
    syncedServerNowOffsetMs = updatedAtMs - Date.now();
    serverClockSyncedOnce = true;
  }
}

function stopRoomCountdown() {
  if (roomCountdownInterval) {
    clearInterval(roomCountdownInterval);
    roomCountdownInterval = null;
  }

  if (roomHostCountdownInterval) {
    clearInterval(roomHostCountdownInterval);
    roomHostCountdownInterval = null;
  }
}

function getRoomTimeMs(value) {
  if (!value) return null;

  // Firestore Timestamp
  if (typeof value.toMillis === "function") {
    return value.toMillis();
  }

  // обычное число
  if (typeof value === "number") {
    return value;
  }

  return null;
}

function stopRoomPresence() {
  if (roomPresenceInterval) {
    clearInterval(roomPresenceInterval);
    roomPresenceInterval = null;
  }

  if (roomPresenceClickHandler) {
    document.removeEventListener("click", roomPresenceClickHandler, true);
    roomPresenceClickHandler = null;
  }

  if (roomPresenceTouchHandler) {
    document.removeEventListener("touchstart", roomPresenceTouchHandler, true);
    roomPresenceTouchHandler = null;
  }

  if (roomVisibilityHandler) {
    document.removeEventListener("visibilitychange", roomVisibilityHandler);
    roomVisibilityHandler = null;
  }

  if (roomPageHideHandler) {
    window.removeEventListener("pagehide", roomPageHideHandler);
    window.removeEventListener("beforeunload", roomPageHideHandler);
    roomPageHideHandler = null;
  }
}

function stopRoomReadyPoll() {
  if (roomReadyPollInterval) {
    clearInterval(roomReadyPollInterval);
    roomReadyPollInterval = null;
  }
}

function stopGameCountdownStartListener() {
  if (gameCountdownStartListener) {
    gameCountdownStartListener();
    gameCountdownStartListener = null;
  }
}
  
async function touchRoomPresence(roomId, { markAction = false } = {}) {
  if (!roomId || currentRoomId !== roomId) return;

  const { id, name } = getCurrentPlayer();
  const now = Date.now();
  const roomRef = db.collection("rooms").doc(roomId);

  const updateData = {
    updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
    [`gameState.playersData.${id}.name`]: name,
    [`gameState.playersData.${id}.online`]: true,
    [`gameState.playersData.${id}.leftRoom`]: false,
    [`gameState.playersData.${id}.lastSeen`]: now,
    [`gameState.playersData.${id}.closedAt`]: null
  };

  if (markAction) {
    updateData[`gameState.playersData.${id}.lastActionAt`] = now;
  }

  try {
    await roomRef.update(updateData);
  } catch (e) {
    // touchRoomPresence skipped
  }
}

async function markRoomOffline(roomId) {
  if (!roomId) return;

  const { id } = getCurrentPlayer();
  const now = Date.now();
  const roomRef = db.collection("rooms").doc(roomId);

  try {
    await roomRef.update({
      updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
      [`gameState.playersData.${id}.online`]: false,
      [`gameState.playersData.${id}.closedAt`]: now,

    });
  } catch (e) {
    // markRoomOffline skipped
  }
}

async function cleanupInactivePlayers(roomId) {
  if (!roomId) return;

  const roomRef = db.collection("rooms").doc(roomId);

  try {
    await db.runTransaction(async (transaction) => {
      const doc = await transaction.get(roomRef);
      if (!doc.exists) return;

      const room = doc.data();
      if (!room || !Array.isArray(room.playerIds)) return;

      const now = Date.now();
      const playerIds = [...room.playerIds];
      const playerNames = { ...(room.playerNames || {}) };
      const playersData = room.gameState?.playersData || {};

      const createdAt = getRoomTimeMs(room.created) || 0;
      const updatedAt = getRoomTimeMs(room.updatedAt) || createdAt || 0;

      const isStarted =
        room.status === "playing" ||
        room.gameState?.started === true;

      const isFinished =
        room.status === "finished" ||
        room.gameState?.finished === true;

      // 1) waiting-комната не стартовала за 10 минут -> удалить целиком
      const shouldDeleteForMaxWaitingLifetime =
        !isStarted &&
        !isFinished &&
        createdAt > 0 &&
        (now - createdAt > ROOM_MAX_WAITING_LIFETIME_MS);

      if (shouldDeleteForMaxWaitingLifetime) {
        transaction.delete(roomRef);
        return;
      }

            // 2) игрок закрыл приложение / пропал и не вернулся за 1 минуту
      // Удаляем его ТОЛЬКО ДО СТАРТА МАТЧА
      const stalePlayerIds = (!isStarted && !isFinished)
        ? playerIds.filter((pid) => {
            const p = playersData[pid] || {};
            const lastSeen = Number(p.lastSeen || 0) || updatedAt || createdAt || 0;
            const closedAt = Number(p.closedAt || 0) || 0;
            const online = p.online === true;

            // если клиент сам успел пометить offline/closedAt — считаем это сильным сигналом
            const definitelyOffline =
              closedAt > 0 && (now - closedAt > ROOM_OFFLINE_GRACE_MS);

            // если клиент просто пропал (инет, завис Telegram, сел телефон) —
            // даём ту же 1 минуту на возврат ДО старта матча
            const silentlyMissing =
              !online &&
              lastSeen > 0 &&
              (now - lastSeen > ROOM_OFFLINE_GRACE_MS);

            const fallbackMissing =
              lastSeen > 0 &&
              (now - lastSeen > ROOM_OFFLINE_GRACE_MS);

            return definitelyOffline || silentlyMissing || fallbackMissing;
          })
        : [];

      if (stalePlayerIds.length === 0) {
        return;
      }

      const newPlayerIds = playerIds.filter(pid => !stalePlayerIds.includes(pid));

      if (newPlayerIds.length === 0) {
        transaction.delete(roomRef);
        return;
      }

      stalePlayerIds.forEach((pid) => {
        delete playerNames[pid];
      });

      const updateData = {
        playerIds: newPlayerIds,
        playerNames,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
        hostId: newPlayerIds.includes(room.hostId) ? room.hostId : newPlayerIds[0]
      };

      if (!isStarted && newPlayerIds.length < 2) {
        updateData.startAt = null;
      }

        stalePlayerIds.forEach((pid) => {
        updateData[`gameState.playersData.${pid}`] = firebase.firestore.FieldValue.delete();
        updateData[`gameState.playersReady.${pid}`] = firebase.firestore.FieldValue.delete();
      });

      transaction.update(roomRef, updateData);
    });
  } catch (e) {
    console.error("Ошибка cleanupInactivePlayers:", e);
  }
}

function startRoomPresence(roomId) {
  stopRoomPresence();

  document.addEventListener("visibilitychange", roomVisibilityHandler);
  window.addEventListener("pagehide", roomPageHideHandler);
  window.addEventListener("beforeunload", roomPageHideHandler);
}

async function tryStartSyncedCountdown(roomId) {
  if (!roomId || currentRoomId !== roomId) return;

  const roomRef = db.collection("rooms").doc(roomId);

  try {
    await db.runTransaction(async (transaction) => {
      const doc = await transaction.get(roomRef);
      if (!doc.exists) return;

      const room = doc.data();
      if (!room || !Array.isArray(room.playerIds)) return;
      if (room.status !== "playing" && room.gameState?.started !== true) return;

      const countdownStartedAt = getRoomTimeMs(room.gameState?.countdownStartedAt);
      if (countdownStartedAt) return;

      const playerIds = room.playerIds.filter(Boolean);
      if (playerIds.length === 0) return;

      const playersReady = room.gameState?.playersReady || {};
      const allReady = playerIds.every(pid => playersReady[pid] === true);

      if (!allReady) return;

      transaction.update(roomRef, {
        updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
        "gameState.countdownStartedAt": firebase.firestore.FieldValue.serverTimestamp()
      });
    });
  } catch (e) {
    console.error("Ошибка tryStartSyncedCountdown:", e);
  }
}

async function waitForRoomMembership(roomRef, playerId, attempts = 12, delayMs = 200) {
  for (let i = 0; i < attempts; i++) {
    const doc = await roomRef.get();
    if (doc.exists) {
      const room = doc.data() || {};
      const ids = Array.isArray(room.playerIds) ? room.playerIds.filter(Boolean) : [];
      if (ids.includes(playerId)) {
        return room;
      }
    }

    if (i < attempts - 1) {
      await new Promise(resolve => setTimeout(resolve, delayMs));
    }
  }

  return null;
}

function formatHistoryDate(value) {
  if (!value) return "—";
  const date = new Date(value);
  if (Number.isNaN(date.getTime())) return "—";

  return date.toLocaleString("ru-RU", {
    day: "2-digit",
    month: "2-digit",
    year: "numeric",
    hour: "2-digit",
    minute: "2-digit"
  });
}

function renderHistoryEntries(entries) {
  const panel = document.getElementById("historyPanel");
  if (!panel) return;

  const title = `<div class="history-panel-title">История игр</div>`;

  if (!Array.isArray(entries) || entries.length === 0) {
    panel.innerHTML = `${title}<div class="history-scroll-area"><div class="history-panel-text">Пока нет сыгранных матчей.</div></div>`;
    return;
  }

  const items = entries.map((item, index) => {
    const matchId = String(item.roomId || item.savedAt || index);
    const isExpanded = expandedHistoryMatchId === matchId;
    const resultMeta = getHistoryResultMeta(item);
    const playedAtText = formatHistoryDate(item.playedAt);
    const modeLabel = item.mode || "Bobr Run";

    const resultsRows = Array.isArray(item.results)
      ? item.results
          .slice()
          .sort((a, b) => Number(a.place || 0) - Number(b.place || 0))
          .map((row) => `
            <tr>
              <td>${Number(row.place || 0)}</td>
              <td>${row.name || "Игрок"}</td>
              <td>${Number(row.score || 0)}</td>
            </tr>
          `)
          .join("")
      : "";

    const detailsHtml = isExpanded ? `
      <div class="history-match-details">
        <table class="history-match-table">
          <thead>
            <tr>
              <th>Место</th>
              <th>Игрок</th>
              <th>Счёт</th>
            </tr>
          </thead>
          <tbody>${resultsRows}</tbody>
        </table>
      </div>
    ` : "";

    return `
      <div class="history-match-card" onclick="toggleHistoryMatchDetails('${matchId.replace("'", "&#39;")}', event)">
        <div class="history-match-mode">Режим: ${modeLabel}</div>
        <div class="history-match-result ${resultMeta.className}">${resultMeta.label}</div>
        <div class="history-match-date">${playedAtText}</div>
        ${detailsHtml}
      </div>
    `;
  }).join("");

  panel.innerHTML = `${title}<div class="history-scroll-area"><div class="history-panel-text">${items}</div></div>`;
}

async function saveMatchHistoryForAllPlayers(roomId, roomData) {
  if (!roomId || !roomData?.gameState?.finished || !Array.isArray(roomData?.gameState?.results)) {
    return;
  }

  const results = roomData.gameState.results
    .slice()
    .sort((a, b) => Number(a.place || 0) - Number(b.place || 0))
    .map(item => ({
      place: Number(item.place || 0),
      name: item.name || "Игрок",
      score: Number(item.score || 0)
    }));

  const playerIds = Array.isArray(roomData.playerIds) ? roomData.playerIds.filter(Boolean) : [];
  if (playerIds.length === 0) return;

  const playedAt =
    getRoomTimeMs(roomData.gameState?.historySavedAt) ||
    getRoomTimeMs(roomData.updatedAt) ||
    Date.now();

  const batch = db.batch();

  playerIds.forEach((pid) => {
    const playerName =
      roomData.playerNames?.[pid] ||
      roomData.gameState?.playersData?.[pid]?.name ||
      "Игрок";

    const yourResult = results.find(r => r.name === playerName) || null;

    const historyRef = getHistoryCollectionRef(pid).doc(roomId);
    batch.set(historyRef, {
      roomId,
      playedAt,
      mode: "Bobr Run",
      winner: roomData.gameState.winner || "—",
      results,
      yourName: playerName,
      yourPlace: yourResult?.place || null,
      yourScore: Number(yourResult?.score || 0),
      youWon: yourResult?.place === 1 && String(roomData.gameState.winner || "").toLowerCase() !== "ничья",
      savedAt: Date.now()
    }, { merge: true });
  });

  await batch.commit();

  try {
    const roomRef = db.collection("rooms").doc(roomId);
    const roomDoc = await roomRef.get();

    if (roomDoc.exists) {
      await roomRef.update({
        updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
        "gameState.historySaved": true,
        "gameState.historySavedAt": firebase.firestore.FieldValue.serverTimestamp()
      });
    }
  } catch (e) {
    console.error("Ошибка отметки сохранённой истории:", e);
  }
}

function startRoomFinishWatcher(roomId) {
  stopEndGameWatcher();
  endGameExitHandled = false;

  const roomRef = db.collection("rooms").doc(roomId);

  endGameWatcher = roomRef.onSnapshot(async (doc) => {
    if (!doc.exists) {
      if (!endGameExitHandled && currentRoomId === roomId) {
        endGameExitHandled = true;
        await runActiveLeaveAfterLoss();
      }
      return;
    }

    const room = doc.data();
    if (!room || !room.gameState) return;

    if (room.gameState.exitRequested === true) {
      if (!endGameExitHandled && currentRoomId === roomId) {
        endGameExitHandled = true;
        await runActiveLeaveAfterLoss();
      }
      return;
    }

    if (room.gameState.finished === true && room.gameState.winner && room.gameState.results) {
      await ensureCurrentMatchHistorySaved(roomId, room);

      const resultData = {
        winner: room.gameState.winner,
        results: room.gameState.results
      };

      if (typeof openEndGameForCurrentMatch === "function") {
        openEndGameForCurrentMatch(resultData);
      } else {
        showEndGameModal(resultData);
      }
    }
  });
}

async function closeEndGameAndExit() {
  if (isClosingEndGame) return;
  isClosingEndGame = true;

  const roomId = currentRoomId;
  const roomRef = roomId ? db.collection("rooms").doc(roomId) : null;

  if (roomRef) {
    try {
      await roomRef.update({
        updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
        "gameState.exitRequested": true,
        "gameState.exitRequestedAt": firebase.firestore.FieldValue.serverTimestamp()
      });
    } catch (e) {
      console.log("Пропуск общего выхода из финального окна:", e?.message || e);
    }
  }

  forceCloseEndGameUI();
  stopEndGameWatcher();
  endGameExitHandled = true;

  const savedExitHandler = exitEndGameForCurrentMatch;
  openEndGameForCurrentMatch = null;
  exitEndGameForCurrentMatch = null;

  try {
    if (typeof savedExitHandler === "function") {
      await savedExitHandler();
    } else {
      await runActiveLeaveAfterLoss();
    }
  } finally {
    forceCloseEndGameUI();
    setTimeout(forceCloseEndGameUI, 0);
    setTimeout(forceCloseEndGameUI, 120);
    setTimeout(() => { isClosingEndGame = false; }, 200);
  }
}

  if (roomsListener) {
    roomsListener();
    roomsListener = null;
  }

  roomsListener = db.collection("rooms")
    .where("status", "==", "waiting")
    .onSnapshot(async snapshot => {
      if (currentRoomId || isCreatingRoom || isJoiningRoom) {
        return;
      }

      list.innerHTML = "";

      if (snapshot.empty) {
        list.innerHTML = "Нет комнат";
        return;
      }

      const now = Date.now();
      let visibleRooms = 0;

      for (const doc of snapshot.docs) {
        const room = doc.data();

        if (!room || !Array.isArray(room.playerIds)) continue;

        const players = room.playerIds.filter(Boolean);
        const createdAt = getRoomTimeMs(room.created) || 0;
        const updatedAt = getRoomTimeMs(room.updatedAt) || createdAt || 0;
        const isFinished = room.status === "finished" || room.gameState?.finished === true;
        const isStarted = room.status === "playing" || room.gameState?.started === true;
        const playersData = room.gameState?.playersData || {};

        const hasOfflineExpiredPlayer = players.some((pid) => {
          const p = playersData[pid] || {};
          const lastSeen = Number(p.lastSeen || 0) || updatedAt || createdAt || 0;
          return lastSeen > 0 && (now - lastSeen > ROOM_OFFLINE_GRACE_MS);
        });

        const roomWaitingTooLong =
          !isStarted &&
          !isFinished &&
          createdAt > 0 &&
          (now - createdAt > ROOM_MAX_WAITING_LIFETIME_MS);

        if (
          players.length === 0 ||
          hasOfflineExpiredPlayer ||
          roomWaitingTooLong
        ) {
          cleanupInactivePlayers(doc.id);
          continue;
        }

        if (isFinished) {
          continue;
        }

        const div = document.createElement("div");
        div.className = "roomItem";
        div.innerText = `Комната (${players.length}/3)`;
        div.onclick = () => joinRoom(doc.id);

        list.appendChild(div);
        visibleRooms++;
      }

      if (visibleRooms === 0) {
        list.innerHTML = "Нет доступных комнат";
      }
    });
}

async function joinRoom(roomId) {
  if (isJoiningRoom || isCreatingRoom) return;
  isJoiningRoom = true;

  const { id, name } = getCurrentPlayer();
  const roomRef = db.collection("rooms").doc(roomId);
  const list = document.getElementById("roomsList");
  const createBtn = document.getElementById("createRoomBtn");

  if (createBtn) {
    createBtn.style.display = "none";
  }

  if (list) {
    list.innerHTML = `
      Подключение к комнате...<br><br>
      Игрок: ${name}
    `;
  }

  try {
    await cleanupInactivePlayers(roomId);

    await db.runTransaction(async (transaction) => {
      const doc = await transaction.get(roomRef);

      if (!doc.exists) {
        throw new Error("ROOM_DELETED");
      }

      const room = doc.data();

      if (!room || !Array.isArray(room.playerIds)) {
        throw new Error("ROOM_DATA_ERROR");
      }

      if (room.status === "finished" || room.gameState?.finished === true) {
        throw new Error("ROOM_FINISHED");
      }

      const existingIds = Array.isArray(room.playerIds) ? room.playerIds.filter(Boolean) : [];
      const alreadyInRoom = existingIds.includes(id);

      if (existingIds.length >= 3 && !alreadyInRoom) {
        throw new Error("ROOM_FULL");
      }

      const nextPlayerIds = alreadyInRoom ? [...existingIds] : [...existingIds, id];
      const now = Date.now();

      const updateData = {
        playerIds: nextPlayerIds,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
        [`playerNames.${id}`]: name,
        [`gameState.playersReady.${id}`]: false,
        [`gameState.playersData.${id}.name`]: name,
        [`gameState.playersData.${id}.alive`]: true,
        [`gameState.playersData.${id}.lost`]: false,
        [`gameState.playersData.${id}.leftRoom`]: false,
        [`gameState.playersData.${id}.position`]: 0,
        [`gameState.playersData.${id}.score`]: 0,
        [`gameState.playersData.${id}.firstObstacleResolved`]: false,
        [`gameState.playersData.${id}.online`]: true,
        [`gameState.playersData.${id}.lastSeen`]: now,
        [`gameState.playersData.${id}.lastActionAt`]: now,
        [`gameState.playersData.${id}.closedAt`]: null,
        [`gameState.playersData.${id}.gameLoaded`]: false,
        [`gameState.playersData.${id}.gameLoadedAt`]: null
      };

      if (nextPlayerIds.length >= 2 && !room.startAt && !room.gameState?.started) {
        updateData.startAt = firebase.firestore.FieldValue.serverTimestamp();
      }

      transaction.update(roomRef, updateData);
    });

    let confirmedRoom = await waitForRoomMembership(roomRef, id, 20, 250);

    if (!confirmedRoom) {
      const fallbackDoc = await roomRef.get();
      if (!fallbackDoc.exists) {
        throw new Error("ROOM_DELETED");
      }

      const fallbackRoom = fallbackDoc.data() || {};
      const fallbackIds = Array.isArray(fallbackRoom.playerIds) ? fallbackRoom.playerIds.filter(Boolean) : [];

      if (!fallbackIds.includes(id)) {
        try {
          const now = Date.now();
          await roomRef.update({
            playerIds: [...fallbackIds, id],
            updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
            [`playerNames.${id}`]: name,
            [`gameState.playersReady.${id}`]: false,
            [`gameState.playersData.${id}.name`]: name,
            [`gameState.playersData.${id}.alive`]: true,
            [`gameState.playersData.${id}.lost`]: false,
            [`gameState.playersData.${id}.leftRoom`]: false,
            [`gameState.playersData.${id}.position`]: 0,
            [`gameState.playersData.${id}.score`]: 0,
            [`gameState.playersData.${id}.firstObstacleResolved`]: false,
            [`gameState.playersData.${id}.online`]: true,
            [`gameState.playersData.${id}.lastSeen`]: now,
            [`gameState.playersData.${id}.lastActionAt`]: now,
            [`gameState.playersData.${id}.closedAt`]: null,
            [`gameState.playersData.${id}.gameLoaded`]: false,
            [`gameState.playersData.${id}.gameLoadedAt`]: null
          });
        } catch (repairError) {
          console.error("Ошибка резервного входа в комнату:", repairError);
        }

        confirmedRoom = await waitForRoomMembership(roomRef, id, 10, 250);
      } else {
        confirmedRoom = fallbackRoom;
      }
    }

    if (!confirmedRoom) {
      throw new Error("JOIN_NOT_CONFIRMED");
    }

    currentRoomId = roomId;
    multiplayerGameStarted = false;
    openRoomScreen(roomId, confirmedRoom);

  } catch (e) {
    if (currentRoomListener) {
      currentRoomListener();
      currentRoomListener = null;
    }

    stopRoomCountdown();
    stopRoomPresence();

    if (document.getElementById("createRoomBtn")) {
      document.getElementById("createRoomBtn").style.display = "block";
    }

    if (e.message === "ROOM_DELETED") {
      alert("Комната уже удалена");
    } else if (e.message === "ROOM_DATA_ERROR") {
      alert("Ошибка данных комнаты");
    } else if (e.message === "ROOM_FINISHED") {
      alert("Игра в комнате уже закончена");
    } else if (e.message === "ROOM_FULL") {
      alert("Комната заполнена");
    } else if (e.message === "JOIN_NOT_CONFIRMED") {
      alert("Не удалось войти в комнату. Попробуй ещё раз.");
    } else if (e.code === "resource-exhausted") {
      alert("Firebase перегружен или превышен лимит. Попробуй позже.");
    } else {
      console.error("Ошибка joinRoom:", e);
      alert("Ошибка входа в комнату");
    }

    currentRoomId = null;
    loadRooms();
  } finally {
    isJoiningRoom = false;
  }
}

async function tryStartRoom(roomId) {
  const roomRef = db.collection("rooms").doc(roomId);

  try {
    await db.runTransaction(async (transaction) => {
      const doc = await transaction.get(roomRef);
      if (!doc.exists) return;

      const room = doc.data();
      if (!room || !Array.isArray(room.playerIds)) return;
      if (room.gameState?.started || room.status === "finished") return;

      const playersCount = room.playerIds.length;
      const startAtMs = getRoomTimeMs(room.startAt);
      const countdownSeconds = 120;
      const countdownLeft = startAtMs
        ? Math.max(0, countdownSeconds - Math.floor((getSyncedServerNowMs() - startAtMs) / 1000))
        : null;

      // 3 игрока — старт сразу
      if (playersCount >= 3) {
        transaction.update(roomRef, {
          status: "playing",
          updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
          "gameState.started": true
        });
        return;
      }

      // меньше 2 игроков — сбрасываем таймер
      if (playersCount < 2) {
        const updateData = {
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        };

        if (room.startAt) updateData.startAt = null;

        transaction.update(roomRef, updateData);
        return;
      }

      // 2+ игрока, но таймер ещё не создан
      if (playersCount >= 2 && !room.startAt) {
        transaction.update(roomRef, {
          startAt: firebase.firestore.FieldValue.serverTimestamp(),
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        return;
      }

      // если таймер дошёл до 0 — стартуем
      if (playersCount >= 2 && countdownLeft !== null && countdownLeft <= 0) {
        transaction.update(roomRef, {
          status: "playing",
          updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
          "gameState.started": true
        });
      }
    });
  } catch (e) {
    console.error("Ошибка tryStartRoom:", e);
  }
}

  function openRoomScreen(roomId, optimisticRoom = null) {
  const screenRoomId = roomId;

  const list = document.getElementById("roomsList");
  const createBtn = document.getElementById("createRoomBtn");
  const roomRef = db.collection("rooms").doc(roomId);

  createBtn.style.display = "none";
  multiplayerGameStarted = false;
  currentRoomId = roomId;
  resetServerClockSync();

  if (roomsListener) {
    roomsListener();
    roomsListener = null;
  }

  if (currentRoomListener) {
    currentRoomListener();
    currentRoomListener = null;
  }

  stopRoomCountdown();
  startRoomPresence(roomId);
  lastRoomMaintenanceAt = 0;
  lastRoomStartAttemptAt = 0;

  let latestRoom = optimisticRoom;

  function renderRoom(room) {
    if (currentRoomId !== screenRoomId) return;

    if (!room || !Array.isArray(room.playerIds)) {
      list.innerHTML = "Подключение к комнате...";
      return;
    }

    syncServerClockFromRoom(room);
    const now = getSyncedServerNowMs();
    const createdAt = getRoomTimeMs(room.created) || 0;
    const isStarted = room.status === "playing" || room.gameState?.started === true;
    const isFinished = room.status === "finished" || room.gameState?.finished === true;

    if (
      !isStarted &&
      !isFinished &&
      createdAt > 0 &&
      (now - createdAt > ROOM_MAX_WAITING_LIFETIME_MS)
    ) {
      list.innerHTML = "Комната устарела и была удалена";
      createBtn.style.display = "block";
      currentRoomId = null;
      stopRoomCountdown();
      stopRoomPresence();
      return;
    }

    let timerText = "";

    if (!room.gameState?.started && room.playerIds.length >= 2) {
      const startAtMs = getRoomTimeMs(room.startAt);
      const leftSec = startAtMs
        ? Math.max(0, 120 - Math.floor((getSyncedServerNowMs() - startAtMs) / 1000))
        : 120;

      timerText = `<br>Старт через: ${leftSec} сек`;
    }

    const playersNames = (room.playerIds || []).map(pid => {
      return room.playerNames?.[pid] || room.gameState?.playersData?.[pid]?.name || "Игрок";
    });

    list.innerHTML = `
      Игроки: ${room.playerIds.length}/3 <br><br>
      ${playersNames.join("<br>")}
      ${timerText}
      <br><br>
      <div onclick="leaveRoom('${roomId}')" style="background:#dc3545;padding:10px;border-radius:10px;text-align:center;">
        Выйти из комнаты
      </div>
    `;
  }

  if (optimisticRoom) {
    renderRoom(optimisticRoom);
  } else {
    list.innerHTML = "Подключение к комнате...";
  }

  roomRef.get().then((doc) => {
    if (currentRoomId !== screenRoomId) return;

    if (!doc.exists) {
      list.innerHTML = "Комната была удалена";
      createBtn.style.display = "block";
      currentRoomId = null;
      stopRoomCountdown();
      stopRoomPresence();
      return;
    }

    latestRoom = doc.data();
    renderRoom(latestRoom);
  }).catch((e) => {
    console.error("Ошибка загрузки комнаты:", e);
  });

  currentRoomListener = roomRef.onSnapshot(async (doc) => {
    if (currentRoomId !== screenRoomId) return;

    if (!doc.exists) {
      list.innerHTML = "Комната была удалена";
      createBtn.style.display = "block";
      currentRoomId = null;
      stopRoomCountdown();
      stopRoomPresence();
      return;
    }

    latestRoom = doc.data();
    syncServerClockFromRoom(latestRoom);
    renderRoom(latestRoom);

    const roomCreatedAt = getRoomTimeMs(latestRoom.created) || 0;
    const roomStarted =
      latestRoom?.gameState?.started === true ||
      latestRoom?.status === "playing";
    const roomFinished =
      latestRoom?.gameState?.finished === true ||
      latestRoom?.status === "finished";

    if (
      !roomStarted &&
      !roomFinished &&
      roomCreatedAt > 0 &&
      (getSyncedServerNowMs() - roomCreatedAt > ROOM_MAX_WAITING_LIFETIME_MS)
    ) {
      await cleanupInactivePlayers(roomId);
      return;
    }

    if (
      latestRoom &&
      Array.isArray(latestRoom.playerIds) &&
      latestRoom.playerIds.length >= 2 &&
      !latestRoom.gameState?.started &&
      latestRoom.status !== "playing"
    ) {
      startSharedRoomCountdown(roomId);
    }

    if (
      latestRoom?.gameState?.started === true ||
      latestRoom?.status === "playing"
    ) {
      stopRoomCountdown();

      if (!multiplayerGameStarted) {
        multiplayerGameStarted = true;
        startMultiplayerGame(roomId);
      }
      return;
    }

    await scheduleRoomHostTasks(roomId, latestRoom);
  });

  roomCountdownInterval = setInterval(async () => {
    if (currentRoomId !== screenRoomId) return;
    if (!latestRoom) return;

    const roomCreatedAt = getRoomTimeMs(latestRoom.created) || 0;
    const roomStarted =
      latestRoom?.gameState?.started === true ||
      latestRoom?.status === "playing";
    const roomFinished =
      latestRoom?.gameState?.finished === true ||
      latestRoom?.status === "finished";

    if (
      !roomStarted &&
      !roomFinished &&
      roomCreatedAt > 0 &&
      (getSyncedServerNowMs() - roomCreatedAt > ROOM_MAX_WAITING_LIFETIME_MS)
    ) {
      await scheduleRoomHostTasks(roomId, latestRoom, { force: true });
      return;
    }

    renderRoom(latestRoom);

    if (
      latestRoom?.gameState?.started === true ||
      latestRoom?.status === "playing"
    ) {
      stopRoomCountdown();

      if (!multiplayerGameStarted) {
        multiplayerGameStarted = true;
        startMultiplayerGame(roomId);
      }
      return;
    }

    await scheduleRoomHostTasks(roomId, latestRoom);

    const playersCount = Array.isArray(latestRoom.playerIds) ? latestRoom.playerIds.length : 0;
    const startAtMs = getRoomTimeMs(latestRoom.startAt);

    if (playersCount >= 3) {
      await scheduleRoomHostTasks(roomId, latestRoom, { force: true });
      return;
    }

    if (playersCount >= 2 && startAtMs) {
      const leftSec = Math.max(0, 120 - Math.floor((getSyncedServerNowMs() - startAtMs) / 1000));
      if (leftSec <= 0) {
        await scheduleRoomHostTasks(roomId, latestRoom, { force: true });
      }
    }
  }, 1000);
}
  
  async function leaveRoom(roomId) {
  const { id } = getCurrentPlayer();
  const roomRef = db.collection("rooms").doc(roomId);

  try {
    const doc = await roomRef.get();

    if (!doc.exists) {
      currentRoomId = null;
      if (currentRoomListener) {
        currentRoomListener();
        currentRoomListener = null;
      }

      stopRoomCountdown();
      stopRoomPresence();
      multiplayerGameStarted = false;

      document.getElementById("createRoomBtn").style.display = "block";
      loadRooms();
      return;
    }

    const room = doc.data();

    if (!room || !Array.isArray(room.playerIds)) {
      currentRoomId = null;
      if (currentRoomListener) {
        currentRoomListener();
        currentRoomListener = null;
      }

      stopRoomCountdown();
      stopRoomPresence();
      multiplayerGameStarted = false;

      document.getElementById("createRoomBtn").style.display = "block";
      loadRooms();
      return;
    }

    if (room.gameState?.started) {
      
      return;
    }

    const newPlayerIds = room.playerIds.filter(pid => pid !== id);

    if (newPlayerIds.length === 0) {
      await roomRef.delete();
    } else {
      const newPlayerNames = { ...(room.playerNames || {}) };
      delete newPlayerNames[id];

      const updateData = {
        playerIds: newPlayerIds,
        playerNames: newPlayerNames,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      };

      if (newPlayerIds.length < 2) {
        updateData.startAt = null;
      }

      if (room.gameState?.playersData?.[id]) {
        updateData[`gameState.playersData.${id}`] = firebase.firestore.FieldValue.delete();
      }

      if (room.gameState?.playersReady?.[id] !== undefined) {
        updateData[`gameState.playersReady.${id}`] = firebase.firestore.FieldValue.delete();
      }

      await roomRef.update(updateData);
    }

    currentRoomId = null;
    resetServerClockSync();

    if (currentRoomListener) {
      currentRoomListener();
      currentRoomListener = null;
    }

    stopRoomCountdown();
    stopRoomPresence();
    multiplayerGameStarted = false;
    
    document.getElementById("createRoomBtn").style.display = "block";
    loadRooms();

  } catch (e) {
    console.error("Ошибка выхода из комнаты:", e);
  }
}
  
  async function startMultiplayerGame(roomId) {
  stopRoomCountdown();
  stopRoomPresence();
  stopRoomReadyPoll();
  stopGameCountdownStartListener();

  if (currentRoomListener) {
    currentRoomListener();
    currentRoomListener = null;
  }

  endGameShown = false;
  startRoomFinishWatcher(roomId);

  closeRooms();
  startGame();
}

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
    ctx.fill();
  }

  function drawExitButton() {

    ctx.fillStyle = "#dc3545";
    ctx.beginPath();
    ctx.moveTo(btnX + 10, btnY);
    ctx.lineTo(btnX + btnWidth - 10, btnY);
    ctx.quadraticCurveTo(btnX + btnWidth, btnY, btnX + btnWidth, btnY + 10);
    ctx.lineTo(btnX + btnWidth, btnY + btnHeight - 10);
    ctx.quadraticCurveTo(btnX + btnWidth, btnY + btnHeight, btnX + btnWidth - 10, btnY + btnHeight);
    ctx.lineTo(btnX + 10, btnY + btnHeight);
    ctx.quadraticCurveTo(btnX, btnY + btnHeight, btnX, btnY + btnHeight - 10);
    ctx.lineTo(btnX, btnY + 10);
    ctx.quadraticCurveTo(btnX, btnY, btnX + 10, btnY);
    ctx.closePath();
    ctx.fill();
    
    ctx.fillStyle = "#fff";
    ctx.font = "bold 16px Arial";
    ctx.textAlign = "center";

  }

  function drawStartTimer() {

    // Пока не получили общее серверное время старта,
    // показываем экран подготовки и ждём всех игроков.
    if (!syncedCountdownStartedAtMs) {
      const playerIds = Array.isArray(latestGameRoomState?.playerIds)
        ? latestGameRoomState.playerIds.filter(Boolean)
        : [];
      const playersReady = latestGameRoomState?.gameState?.playersReady || {};
      const readyCount = playerIds.filter(pid => playersReady[pid] === true).length;
      const totalCount = playerIds.length || 1;

      ctx.font = "bold 34px Arial";
      ctx.fillText("Загрузка игры...", canvas.width / 2, canvas.height / 2 - 16);

      ctx.font = "24px Arial";
      ctx.fillText(`Готово игроков: ${readyCount}/${totalCount}`, canvas.width / 2, canvas.height / 2 + 26);

    if (startTimer > 0) {

    }
  }

 async function markPlayerAsLost() {

async function markPendingDuelFinish() {
  if (!currentRoomId) return;

  const roomRef = db.collection("rooms").doc(currentRoomId);

  try {
    const doc = await roomRef.get();
    if (!doc.exists) return;

    const room = doc.data();
    const playersData = room?.gameState?.playersData || {};

    const alivePlayers = Object.entries(playersData).filter(([_, p]) => {
      return p && p.alive === true && p.leftRoom !== true;
    });

    const loserPlayers = Object.entries(playersData).filter(([_, p]) => {
      return p && p.lost === true && p.leftRoom !== true;
    });

    // кейс: остался 1 живой и 1 проигравший
    if (alivePlayers.length === 1 && loserPlayers.length === 1) {
      const winnerId = alivePlayers[0][0];
      const loserId = loserPlayers[0][0];
      const loserScore = Number(loserPlayers[0][1]?.score || 0);

      await roomRef.update({
        updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
        "gameState.pendingFinish": {
          active: true,
          winnerId,
          loserId,
          loserScore,
          resolved: false,
          createdAt: Date.now()
        }
      });
    }
  } catch (e) {
    console.error("Ошибка markPendingDuelFinish:", e);
  }
}
async function resolvePendingDuelFinishIfNeeded(roomRef, fallbackFinalScore) {
  if (!roomRef || !currentRoomId) return false;

  let resolved = false;
  let resolvedResultData = null;
  let resolvedScore = Number(fallbackFinalScore || 0);

  try {
    await db.runTransaction(async (transaction) => {
      const roomDoc = await transaction.get(roomRef);
      if (!roomDoc.exists) return;

      const room = roomDoc.data();
      if (!room?.gameState?.playersData) return;
      if (room.gameState.finished === true || room.status === "finished") return;

      const playersData = room.gameState.playersData || {};
      const pendingFinish = room.gameState.pendingFinish || null;

      const alivePlayers = Object.entries(playersData).filter(([_, p]) => {
        return p && p.alive === true && p.leftRoom !== true;
      });

      const loserPlayers = Object.entries(playersData).filter(([_, p]) => {
        return p && p.lost === true && p.leftRoom !== true;
      });

      const canResolveExistingPending =
        pendingFinish?.active === true &&
        pendingFinish.winnerId === playerId &&
        pendingFinish.resolved !== true;

      const isFallbackDuelState =
        alivePlayers.length === 1 &&
        loserPlayers.length === 1 &&
        alivePlayers[0][0] === playerId;

      if (!canResolveExistingPending && !isFallbackDuelState) {
        return;
      }

      const loserEntry = canResolveExistingPending
        ? loserPlayers.find(([pid]) => pid === pendingFinish.loserId) || loserPlayers[0]
        : loserPlayers[0];

      const loserId = loserEntry?.[0] || (canResolveExistingPending ? pendingFinish.loserId : null);
      const loserData = loserEntry?.[1] || {};
      const loserScore = canResolveExistingPending
        ? Number(pendingFinish.loserScore || loserData.score || 0)
        : Number(loserData.score || 0);

      const winnerData = playersData[playerId] || {};
      const winnerName = winnerData.name || room.playerNames?.[playerId] || name;
      const loserName = loserData.name || room.playerNames?.[loserId] || "Игрок";

      const finalScore = Math.max(Number(fallbackFinalScore || 0), loserScore + 1);
      resolvedScore = finalScore;
      score = finalScore;

      const finalResults = [
        {
          place: 1,
          name: winnerName,
          score: finalScore
        },
        {
          place: 2,
          name: loserName,
          score: loserScore
        }
      ];

      transaction.update(roomRef, {
        status: "finished",
        updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
        "gameState.finished": true,
        "gameState.started": false,
        "gameState.winner": winnerName,
        "gameState.results": finalResults,
        [`gameState.playersData.${playerId}.score`]: finalScore,
        [`gameState.playersData.${playerId}.firstObstacleResolved`]: true,
        "gameState.pendingFinish": {
          active: true,
          winnerId: playerId,
          loserId,
          loserScore,
          resolved: true,
          resolvedAt: Date.now(),
          finalWinnerScore: finalScore
        }
      });

      resolved = true;
      resolvedResultData = {
        winner: winnerName,
        results: finalResults
      };
    });
  } catch (e) {
    console.error("Ошибка resolvePendingDuelFinishIfNeeded:", e);
    return false;
  }

  if (!resolved) {
    return false;
  }

  winnerProcessing = true;
  await saveBestScore(resolvedScore);

  if (resolvedResultData && !endGameShown) {
    try {
      const finishedDoc = await roomRef.get();
      if (finishedDoc.exists) {
        await ensureCurrentMatchHistorySaved(currentRoomId, finishedDoc.data());
      }
    } catch (e) {
      console.error("Ошибка финального сохранения истории:", e);
    }

    showEndGameModal(resolvedResultData);
  }

  return true;
}


function buildDrawResultIfNeeded(allLosersSorted, roomData, pendingFinish) {
  if (!Array.isArray(allLosersSorted) || allLosersSorted.length < 2) {
    return null;
  }

  const first = allLosersSorted[0];
  const second = allLosersSorted[1];

  if (!first || !second) return null;

  const firstScore = Number(first[1]?.score || 0);
  const secondScore = Number(second[1]?.score || 0);
  const firstLostAt = Number(first[1]?.lostAt || 0);
  const secondLostAt = Number(second[1]?.lostAt || 0);
  const lostAtDiffMs = Math.abs(firstLostAt - secondLostAt);
  const isSimultaneousCrash = firstLostAt > 0 && secondLostAt > 0 && lostAtDiffMs <= 1200;

  // ничья только если у двух последних одинаковый счёт
  if (firstScore !== secondScore) {
    return null;
  }

  // Если pendingFinish уже успел записать временного победителя,
  // но оба игрока умерли почти одновременно и со счётом вровень,
  // это всё равно ничья.
  if (pendingFinish?.finalWinnerScore != null && !isSimultaneousCrash) {
    return null;
  }

  const results = [
    {
      place: 1,
      name: first[1]?.name || roomData.playerNames?.[first[0]] || "Игрок",
      score: firstScore
    },
    {
      place: 1,
      name: second[1]?.name || roomData.playerNames?.[second[0]] || "Игрок",
      score: secondScore
    }
  ];

  if (allLosersSorted[2]) {
    results.push({
      place: 3,
      name: allLosersSorted[2][1]?.name || roomData.playerNames?.[allLosersSorted[2][0]] || "Игрок",
      score: Number(allLosersSorted[2][1]?.score || 0)
    });
  }

  return {
    winnerLabel: "Ничья",
    results
  };
}

  (async () => {

    try {
      const doc = await roomRef.get();
      if (!doc.exists) return;

      const room = doc.data();
      const newPlayers = Array.isArray(room.playerIds)
        ? room.playerIds.filter(pid => pid !== exitingPlayerId)
        : [];

      if (newPlayers.length === 0) {
        await roomRef.delete();
        return;
      }

      const newPlayerNames = { ...(room.playerNames || {}) };
      delete newPlayerNames[exitingPlayerId];

      const updateData = {
        playerIds: newPlayers,
        playerNames: newPlayerNames,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
        [`gameState.playersData.${exitingPlayerId}.leftRoom`]: true,
        [`gameState.playersReady.${exitingPlayerId}`]: firebase.firestore.FieldValue.delete()
      };

      if (newPlayers.length < 2) {
        updateData.startAt = null;
      }

      await roomRef.update(updateData);
    } catch (e) {
      console.error("Ошибка выхода после поражения:", e);
    }
  })();

  leaveAfterLossInProgress = false;
}

});

const allLosersSorted = Object.entries(playersData)

      winnerScore = Math.max(winnerScore, loserScore + 1);

    } else {

    }

  winnerProcessing = true;

  // А вот leaderboard в главном меню обновляем только как рекорд

  }
      const finalResults = [

}

}

      await roomRef.update({

  "gameState.pendingFinish": firebase.firestore.FieldValue.delete(),
  [`gameState.playersData.${winnerId}.score`]: winnerScore
});

      await ensureCurrentMatchHistorySaved(currentRoomId, {

    }

    // =========================

    if (alivePlayers.length === 0 && allLosersSorted.length > 0) {
  winnerProcessing = true;

  // Сначала пробуем определить ничью
  const drawResult = buildDrawResultIfNeeded(allLosersSorted, roomData, pendingFinish);

  if (drawResult) {

}

if (!endGameShown) {

// Общая синхронная симуляция препятствий
let syncedCountdownStartedAtMs = null;
let spawnStarted = false;
let spawnAccumulator1 = 0;
let spawnAccumulator2 = 0;
let spawnAccumulator3 = 0;
const FIXED_STEP_MS = 1000 / 120;
const LANE1_SPAWN_MS = 1200;
const LANE2_SPAWN_MS = 1500;
const LANE3_SPAWN_MS = 1800;

function resetSpawnState() {
  spawnStarted = false;
  spawnAccumulator1 = 0;
  spawnAccumulator2 = 0;
  spawnAccumulator3 = 0;
}

function startSpawnIfNeeded() {
  if (spawnStarted) return;
  spawnStarted = true;

  spawnAccumulator1 = 0;
  spawnAccumulator2 = 0;
  spawnAccumulator3 = 0;

  spawnObstacle1();
  spawnObstacle2();
  spawnObstacle3();
}

function stepSimulation() {
  deltaTime = FIXED_STEP_MS / 16.67;

  updatePlayer();
  updateObstacles1();
  updateObstacles2();
  updateObstacles3();

  if (gameStarted) {
    gameSpeed += 0.00001;

    if (!isWatching1) {
      spawnAccumulator1 += FIXED_STEP_MS;
      while (spawnAccumulator1 >= LANE1_SPAWN_MS) {
        spawnAccumulator1 -= LANE1_SPAWN_MS;
        spawnObstacle1();
      }
    }

    if (!isWatching2) {
      spawnAccumulator2 += FIXED_STEP_MS;
      while (spawnAccumulator2 >= LANE2_SPAWN_MS) {
        spawnAccumulator2 -= LANE2_SPAWN_MS;
        spawnObstacle2();
      }
    }

    if (!isWatching3) {
      spawnAccumulator3 += FIXED_STEP_MS;
      while (spawnAccumulator3 >= LANE3_SPAWN_MS) {
        spawnAccumulator3 -= LANE3_SPAWN_MS;
        spawnObstacle3();
      }
    }
  }
}

async function startGameFlow() {
  syncedCountdownStartedAtMs = null;
  startTimer = 3;
  showStartText = true;
  gameStarted = false;
  simulationTick = 0;
  lastTargetTick = 0;
  lastCountdownSecond = null;
  resetSpawnState();

  lastTime = performance.now();
  requestAnimationFrame(loop);

  try {
    await prepareGameAssets();
  } catch (e) {
    console.error("Ошибка загрузки ассетов:", e);
  }

  await markPlayerReadyForGame(currentRoomId);

  stopRoomReadyPoll();
  stopGameCountdownStartListener();

  const roomRef = db.collection("rooms").doc(currentRoomId);

  // Слушаем документ комнаты в реальном времени до тех пор,
  // пока сервер не выставит ОБЩЕЕ countdownStartedAt.
  gameCountdownStartListener = roomRef.onSnapshot(async (doc) => {
    if (!doc.exists || !currentRoomId) return;

    try {
      const room = doc.data();
      if (!room) return;

      latestGameRoomState = room;
      syncServerClockFromRoom(room);

      const countdownStartedAt = getRoomTimeMs(room.gameState?.countdownStartedAt);

      if (!countdownStartedAt) {
        await tryStartSyncedCountdown(currentRoomId);
        return;
      }

      syncedCountdownStartedAtMs = countdownStartedAt;
      stopRoomReadyPoll();
      stopGameCountdownStartListener();
    } catch (e) {
      console.error("Ошибка gameCountdownStartListener:", e);
    }
  });

  // Резервный poll на случай редкого пропуска realtime-снапшота.
  roomReadyPollInterval = setInterval(async () => {
    if (!currentRoomId || syncedCountdownStartedAtMs) return;

    try {
      const doc = await roomRef.get();
      if (!doc.exists) return;

      const room = doc.data();
      if (!room) return;

      latestGameRoomState = room;
      syncServerClockFromRoom(room);

      const countdownStartedAt = getRoomTimeMs(room.gameState?.countdownStartedAt);

      if (!countdownStartedAt) {
        await tryStartSyncedCountdown(currentRoomId);
        return;
      }

      syncedCountdownStartedAtMs = countdownStartedAt;
      stopRoomReadyPoll();
      stopGameCountdownStartListener();
    } catch (e) {
      console.error("Ошибка roomReadyPoll:", e);
    }
  }, 250);
}

loop = function(currentTime) {
  const frameDeltaMs = Math.min(32, Math.max(0, currentTime - lastTime));
  lastTime = currentTime;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (syncedCountdownStartedAtMs) {
    const nowMs = getSyncedServerNowMs();
    const countdownElapsedMs = nowMs - (syncedCountdownStartedAtMs + GAME_READY_BUFFER_MS);

    if (countdownElapsedMs < 0) {
      startTimer = 3;
      showStartText = true;
      gameStarted = false;
    } else if (countdownElapsedMs < 3000) {
      const currentSecond = Math.max(0, 3 - Math.floor(countdownElapsedMs / 1000));
      if (lastCountdownSecond !== currentSecond) {
        lastCountdownSecond = currentSecond;
      }

      startTimer = currentSecond;
      showStartText = true;
      gameStarted = false;
    } else {
      if (!gameStarted) {
        frozenObstacle = null;
        obstacles1 = [];
        obstacles2 = [];
        obstacles3 = [];
        gameStarted = true;
        showStartText = false;
        simulationTick = 0;
        lastTargetTick = 0;
        resetSpawnState();
        startSpawnIfNeeded();
      }

      const gameElapsedMs = nowMs - (syncedCountdownStartedAtMs + GAME_READY_BUFFER_MS + 3000);
      const targetTick = Math.max(0, Math.floor(gameElapsedMs / FIXED_STEP_MS));
      let ticksToSimulate = Math.max(0, targetTick - lastTargetTick);

      if (ticksToSimulate > 0) {
        const hardCap = Math.max(1, Math.ceil(frameDeltaMs / FIXED_STEP_MS) + 8);
        ticksToSimulate = Math.min(ticksToSimulate, hardCap);
      }

      for (let i = 0; i < ticksToSimulate; i++) {
        simulationTick++;
        stepSimulation();
      }

      lastTargetTick += ticksToSimulate;
    }
  }

  drawRoad();
  drawObstacles1();
  drawObstacles2();
  drawObstacles3();
  drawPlayer();

  if (!gameStarted) {
    drawStartTimer();
  }

  ctx.fillStyle = "#fff";
  ctx.font = "20px Arial";
  ctx.textAlign = "left";
  ctx.fillText("Score: " + score, 20, 40);

  if (player.gameOver && !endGameShown) {
    drawGameOver();
  }

  if (!endGameShown) {
    drawExitButton();
  }

  requestAnimationFrame(loop);
};

startGameFlow();
}
